apiVersion: v1
kind: ConfigMap
metadata:
  name: financial-accounting-config
  labels:
    app: financial-accounting
    component: microservice
data:
  # Logging configuration
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Database connection pool settings
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"
  DB_CONN_MAX_IDLE_TIME: "10m"

  # gRPC server configuration
  GRPC_PORT: "50052"
  GRPC_MAX_CONCURRENT_STREAMS: "100"

  # OpenTelemetry configuration
  OTEL_SERVICE_NAME: "financial-accounting-service"
  OTEL_SAMPLING_RATE: "0.1"

  # Redis configuration
  REDIS_URL: "redis://redis:6379"

  # Authentication configuration
  AUTH_ENABLED: "true"
  AUTH_JWKS_URL: "http://keycloak:8080/realms/meridian/protocol/openid-connect/certs"

  # Feature flags
  FEATURE_INCOMPLETE_IMPLEMENTATION: "true"
  ENVIRONMENT: "development"
