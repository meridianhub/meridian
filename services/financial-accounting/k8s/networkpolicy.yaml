# Port: 50052 (ports.FinancialAccounting)
# Callers: current-account, payment-order
# Calls: (none - standalone gRPC service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: financial-accounting
  labels:
    app: financial-accounting
    component: microservice
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: financial-accounting
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow inbound gRPC from services that call financial-accounting
  - from:
    - podSelector:
        matchLabels:
          app: current-account
    - podSelector:
        matchLabels:
          app: payment-order
    ports:
    - protocol: TCP
      port: 50052

  # Allow Prometheus scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow database connections (CockroachDB)
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: cockroachdb
    ports:
    - protocol: TCP
      port: 26257

  # Allow Kafka connections
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
