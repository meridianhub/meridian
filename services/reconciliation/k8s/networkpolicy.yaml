# Port: 50060 (ports.Reconciliation)
# Callers: mcp-server (via api-gateway)
# Calls: position-keeping (50053), current-account (50051), reference-data (50059)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: reconciliation
  labels:
    app: reconciliation
    component: microservice
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: reconciliation
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow inbound gRPC from services that call reconciliation
  - from:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 50060

  # Allow Prometheus scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow database connections (CockroachDB)
  - to:
    - podSelector:
        matchLabels:
          app: cockroachdb
    ports:
    - protocol: TCP
      port: 26257

  # Allow Kafka connections
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092

  # Allow Redis connections (for distributed locking)
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Allow outbound gRPC to position-keeping
  - to:
    - podSelector:
        matchLabels:
          app: position-keeping
    ports:
    - protocol: TCP
      port: 50053

  # Allow outbound gRPC to current-account
  - to:
    - podSelector:
        matchLabels:
          app: current-account
    ports:
    - protocol: TCP
      port: 50051

  # Allow outbound gRPC to reference-data
  - to:
    - podSelector:
        matchLabels:
          app: reference-data
    ports:
    - protocol: TCP
      port: 50059
