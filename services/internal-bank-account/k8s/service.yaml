# Port Configuration: See shared/platform/ports/ports.go for canonical port assignments.
# This service uses ports.InternalBankAccount (50057) for gRPC.
apiVersion: v1
kind: Service
metadata:
  name: internal-bank-account
  labels:
    app: internal-bank-account
    component: microservice
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  ports:
  - name: grpc
    port: 50057
    targetPort: grpc
    protocol: TCP
  - name: http-metrics
    port: 8082
    targetPort: http-metrics
    protocol: TCP
  selector:
    app: internal-bank-account
