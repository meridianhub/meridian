# Port Configuration: See shared/platform/ports/ports.go for canonical port assignments.
# This service uses ports.Tenant (50056) for gRPC and ports.HTTPMetrics (9090) for Prometheus.
apiVersion: v1
kind: Service
metadata:
  name: tenant
  labels:
    app: tenant
    component: microservice
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  ports:
  - name: grpc
    port: 50056
    targetPort: grpc
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: tenant
