apiVersion: v1
kind: Service
metadata:
  name: tenant
  labels:
    app: tenant
    component: microservice
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  ports:
  - name: grpc
    port: 50056
    targetPort: grpc
    protocol: TCP
  selector:
    app: tenant
