# Port: 50056 (ports.Tenant)
# Callers: api-gateway (for tenant resolution)
# Calls: party (50055)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant
  labels:
    app: tenant
    component: microservice
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: tenant
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow inbound gRPC from services that call tenant
  - from:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 50056

  # Allow Prometheus scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 9090

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow database connections (CockroachDB)
  - to:
    - podSelector:
        matchLabels:
          app: cockroachdb
    ports:
    - protocol: TCP
      port: 26257

  # Allow Kafka connections
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092

  # Allow outbound gRPC to party
  - to:
    - podSelector:
        matchLabels:
          app: party
    ports:
    - protocol: TCP
      port: 50055
