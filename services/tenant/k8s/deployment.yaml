# Port Configuration: See shared/platform/ports/ports.go for canonical port assignments.
# This service uses ports.Tenant (50056) for gRPC and ports.HTTPMetrics (9090) for Prometheus.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant
  labels:
    app: tenant
    component: microservice
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenant
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tenant
        component: microservice
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: tenant
        image: tenant:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 50056
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        envFrom:
        - configMapRef:
            name: tenant-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tenant-db
              key: DATABASE_URL
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Worker configuration for tenant provisioning
        # Duration format: Valid Go duration strings (e.g., "10s", "1m", "500ms")
        - name: PROVISIONING_WORKER_POLL_INTERVAL
          value: "10s"
        # Maximum number of retry attempts for failed provisioning operations
        - name: PROVISIONING_MAX_RETRIES
          value: "5"
        # Initial delay before first retry (exponential backoff base)
        # Duration format: Valid Go duration strings (e.g., "2s", "500ms")
        - name: PROVISIONING_RETRY_BASE_DELAY
          value: "2s"
        # Maximum delay between retry attempts (exponential backoff cap)
        # Duration format: Valid Go duration strings (e.g., "30s", "1m")
        - name: PROVISIONING_RETRY_MAX_DELAY
          value: "30s"
        # Maximum number of concurrent tenant provisioning operations
        - name: PROVISIONING_MAX_CONCURRENT
          value: "5"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          grpc:
            port: 50056
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          grpc:
            port: 50056
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          grpc:
            port: 50056
          initialDelaySeconds: 0
          periodSeconds: 2
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      terminationGracePeriodSeconds: 30
