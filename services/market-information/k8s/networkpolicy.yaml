# Port: 50058 (ports.MarketInformation)
# Callers: event-router, mcp-server (via api-gateway)
# Calls: (none - standalone gRPC service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: market-information
  labels:
    app: market-information
    component: microservice
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: market-information
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow inbound gRPC from services that call market-information
  - from:
    - podSelector:
        matchLabels:
          app: event-router
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 50058

  # Allow Prometheus scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 9090

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow database connections (CockroachDB)
  - to:
    - podSelector:
        matchLabels:
          app: cockroachdb
    ports:
    - protocol: TCP
      port: 26257

  # Allow Kafka connections
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
