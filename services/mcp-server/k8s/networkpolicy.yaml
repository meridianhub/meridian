# Port: (no known inbound gRPC port - mcp-server exposes MCP protocol to AI assistants)
# Callers: external AI assistant clients (via Ingress if exposed)
# Calls: api-gateway (8080) - all backend calls go through the gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-server
  labels:
    app: mcp-server
    component: microservice
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: mcp-server
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow inbound from Ingress controller (if mcp-server is externally accessible)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080

  # Allow Prometheus scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow outbound to api-gateway (all service calls go via gateway)
  - to:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 8080
