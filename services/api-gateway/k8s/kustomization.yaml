apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: api-gateway-base

resources:
- configmap.yaml
- deployment.yaml
- service.yaml
- ingress.yaml
- networkpolicy.yaml
# secret.yaml is generated from secret.yaml.example via scripts/setup-local-secrets.sh
# and excluded from git via .gitignore. In CI, use external secret management.
