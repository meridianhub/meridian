apiVersion: v1
kind: Service
metadata:
  name: position-keeping
  labels:
    app: position-keeping
    component: microservice
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  ports:
  - name: grpc
    port: 50053
    targetPort: grpc
    protocol: TCP
  selector:
    app: position-keeping
