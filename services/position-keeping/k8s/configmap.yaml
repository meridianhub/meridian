apiVersion: v1
kind: ConfigMap
metadata:
  name: position-keeping-config
  labels:
    app: position-keeping
    component: microservice
data:
  # Logging configuration
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Database connection pool settings
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"
  DB_CONN_MAX_IDLE_TIME: "10m"

  # gRPC server configuration
  GRPC_PORT: "50053"
  GRPC_MAX_CONCURRENT_STREAMS: "100"

  # Redis configuration for idempotency
  REDIS_ENABLED: "true"
  REDIS_ADDRESS: "redis:6379"

  # Account validation - validates accounts exist before creating position logs
  ACCOUNT_VALIDATION_ENABLED: "true"
  CURRENT_ACCOUNT_SERVICE_URL: "current-account:50051"
  INTERNAL_ACCOUNT_SERVICE_URL: "internal-account:50057"

  # OpenTelemetry configuration
  OTEL_SERVICE_NAME: "position-keeping-service"
  OTEL_SAMPLING_RATE: "0.1"
