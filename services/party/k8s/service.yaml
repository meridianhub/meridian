# Port Configuration: See shared/platform/ports/ports.go for canonical port assignments.
# This service uses ports.Party for gRPC.
apiVersion: v1
kind: Service
metadata:
  name: party
  labels:
    app: party
    component: microservice
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  ports:
  - name: grpc
    port: 50055
    targetPort: grpc
    protocol: TCP
  selector:
    app: party
