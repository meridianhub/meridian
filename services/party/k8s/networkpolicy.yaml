# Port: 50055 (ports.Party)
# Callers: current-account, payment-order, tenant, api-gateway (gateway label)
# Calls: CockroachDB (26257), Kafka (9092) - infrastructure only, no service-to-service gRPC
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: party
  labels:
    app: party
    component: microservice
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: party
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow inbound gRPC from services that call party
  - from:
    - podSelector:
        matchLabels:
          app: current-account
    - podSelector:
        matchLabels:
          app: payment-order
    - podSelector:
        matchLabels:
          app: tenant
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 50055

  # Allow Prometheus scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow database connections (CockroachDB)
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: cockroachdb
    ports:
    - protocol: TCP
      port: 26257

  # Allow Kafka connections
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
