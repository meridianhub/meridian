apiVersion: v1
kind: ConfigMap
metadata:
  name: internal-account-config
  labels:
    app: internal-account
    component: microservice
data:
  # Logging configuration
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Database connection pool settings
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"
  DB_CONN_MAX_IDLE_TIME: "10m"

  # gRPC server configuration
  GRPC_PORT: "50057"
  GRPC_MAX_CONCURRENT_STREAMS: "100"

  # HTTP metrics server configuration
  METRICS_PORT: "8082"

  # OpenTelemetry configuration
  OTEL_SERVICE_NAME: "internal-account-service"
  OTEL_SAMPLING_RATE: "0.1"

  # Authentication configuration
  # Set to "true" to require JWT validation on gRPC calls
  AUTH_ENABLED: "false"
  # AUTH_JWKS_URL: "http://keycloak:8080/realms/meridian/protocol/openid-connect/certs"
