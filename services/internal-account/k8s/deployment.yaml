# Port Configuration: See shared/platform/ports/ports.go for canonical port assignments.
# This service uses ports.InternalAccount (50057) for gRPC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-account
  labels:
    app: internal-account
    component: microservice
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: internal-account
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: internal-account
        component: microservice
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: wait-for-cockroachdb
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo 'Waiting for CockroachDB...'
          until nc -z cockroachdb 26257; do
            echo 'CockroachDB not ready, retrying in 2s'
            sleep 2
          done
          echo 'CockroachDB is ready'
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
      containers:
      - name: internal-account
        image: internal-account:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 50057
          protocol: TCP
        - name: http-metrics
          containerPort: 8082
          protocol: TCP
        envFrom:
        - configMapRef:
            name: internal-account-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: internal-account-db
              key: DATABASE_URL
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          grpc:
            port: 50057
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          grpc:
            port: 50057
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          grpc:
            port: 50057
          initialDelaySeconds: 0
          periodSeconds: 2
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      terminationGracePeriodSeconds: 30
