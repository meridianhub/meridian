# SECURITY NOTE: This secret contains development credentials only.
# For production deployments:
# - Use external secret management (e.g., Sealed Secrets, External Secrets Operator)
# - Rotate credentials regularly
# - Use RBAC to restrict secret access
# - Enable encryption at rest for secrets
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-db
  labels:
    app: control-plane
type: Opaque
stringData:
  # Local development connection string - CockroachDB in insecure mode
  # Shares meridian_platform database with tenant service
  DATABASE_URL: "postgres://meridian_platform_user@cockroachdb:26257/meridian_platform?sslmode=disable"
