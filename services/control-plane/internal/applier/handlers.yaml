# Control Plane Manifest Handler Schemas
# These schemas define the type signatures for apply_manifest saga handlers.

service: control_plane
version: "1.0"

handlers:
  # Reference Data - Instrument Management
  reference_data.register_instrument:
    description: "Register a new instrument definition in Reference Data service"
    params:
      instrument_code:
        type: string
        required: true
        description: "Unique instrument code (e.g., USD, KWH)"
      display_name:
        type: string
        required: false
        description: "Human-readable instrument name"
      dimension:
        type: string
        required: false
        description: "Physical dimension (CURRENCY, ENERGY, etc.)"
      decimal_places:
        type: int64
        required: false
        description: "Decimal precision (0-18)"
      description:
        type: string
        required: false
        description: "Instrument description"
    returns:
      instrument_code:
        type: string
        description: "The registered instrument code"
      status:
        type: string
        description: "Registration status (REGISTERED)"
    compensate: reference_data.delete_instrument

  reference_data.delete_instrument:
    description: "Delete an instrument (compensation for register)"
    compensation_strategy: none
    params:
      instrument_code:
        type: string
        required: true
        description: "Instrument code to delete"
    returns:
      instrument_code:
        type: string
        description: "The deleted instrument code"
      status:
        type: string
        description: "Deletion status (DELETED)"

  # Reference Data - Account Type Management
  reference_data.register_account_type:
    description: "Register a new account type definition in Reference Data service"
    params:
      code:
        type: string
        required: true
        description: "Unique account type code (e.g., CUSTOMER_CURRENT)"
      display_name:
        type: string
        required: true
        description: "Human-readable account type name"
      behavior_class:
        type: enum
        values: [CUSTOMER, CLEARING, NOSTRO, VOSTRO, HOLDING, SUSPENSE, REVENUE, EXPENSE, INVENTORY]
        required: true
        description: "Accounting behavior class"
      normal_balance:
        type: enum
        values: [DEBIT, CREDIT]
        required: true
        description: "Normal balance direction"
      instrument_code:
        type: string
        required: true
        description: "Default instrument code for this account type (e.g., GBP)"
      description:
        type: string
        required: false
        description: "Account type description"
      default_saga_prefix:
        type: string
        required: false
        description: "Saga prefix for operations on accounts of this type"
      default_conversion_method:
        type: string
        required: false
        description: "Named valuation method for conversion (resolved to UUID by handler)"
      validation_cel:
        type: string
        required: false
        description: "CEL expression for validating account operations"
      eligibility_cel:
        type: string
        required: false
        description: "CEL expression for determining account eligibility"
      attribute_schema:
        type: map
        required: false
        description: "JSON Schema defining valid attributes for this account type"
      valuation_methods:
        type: array
        required: false
        description: "List of valuation method templates (each with input_instrument and method_name)"
    returns:
      code:
        type: string
        description: "The registered account type code"
      version:
        type: int32
        description: "The version of the registered account type definition"
    compensate: reference_data.delete_account_type

  reference_data.delete_account_type:
    description: "Delete an account type (compensation for register)"
    compensation_strategy: none
    params:
      code:
        type: string
        required: true
        description: "Account type code to delete"
    returns:
      code:
        type: string
        description: "The deleted account type code"
      status:
        type: string
        description: "Deletion status (DELETED)"

  # Reference Data - Valuation Rules
  reference_data.register_valuation_rule:
    description: "Register a valuation rule for cross-instrument conversion"
    compensation_strategy: none
    params:
      from_instrument:
        type: string
        required: true
        description: "Source instrument code"
      to_instrument:
        type: string
        required: true
        description: "Target instrument code"
      rule_type:
        type: string
        required: false
        description: "Rule type (FIXED_RATE, MARKET, etc.)"
      expression:
        type: string
        required: false
        description: "CEL expression for valuation computation"
      description:
        type: string
        required: false
        description: "Rule description"
    returns:
      from_instrument:
        type: string
        description: "Source instrument code"
      to_instrument:
        type: string
        description: "Target instrument code"
      status:
        type: string
        description: "Registration status (REGISTERED)"

  # Reference Data - Saga Definition
  reference_data.register_saga_definition:
    description: "Register a saga definition in the saga registry"
    compensation_strategy: none
    params:
      saga_name:
        type: string
        required: true
        description: "Saga identifier name"
      display_name:
        type: string
        required: false
        description: "Human-readable saga name"
      description:
        type: string
        required: false
        description: "Saga description"
      script:
        type: string
        required: false
        description: "Starlark script content"
      version:
        type: string
        required: false
        description: "Saga version (semver format)"
    returns:
      saga_name:
        type: string
        description: "The registered saga name"
      status:
        type: string
        description: "Registration status (REGISTERED)"

  # Operational Gateway - Provider Connection Management
  operational_gateway.upsert_connection:
    description: "Create or update a provider connection in the Operational Gateway service"
    compensation_strategy: none
    params:
      connection_id:
        type: string
        required: true
        description: "Stable connection identifier from the manifest (e.g., 'stripe-payments')"
      provider_name:
        type: string
        required: true
        description: "Human-readable provider name (e.g., 'Stripe')"
      provider_type:
        type: string
        required: false
        description: "Machine-readable provider category (e.g., 'payment_gateway')"
      protocol:
        type: enum
        values: [PROVIDER_PROTOCOL_HTTPS, PROVIDER_PROTOCOL_GRPC, PROVIDER_PROTOCOL_WEBHOOK, PROVIDER_PROTOCOL_MQTT, PROVIDER_PROTOCOL_AMQP]
        required: true
        description: "Transport protocol for dispatching to this provider"
      base_url:
        type: string
        required: true
        description: "Root URL of the provider's API endpoint"
      auth_type:
        type: enum
        values: [api_key, basic, oauth2, hmac, mtls]
        required: true
        description: "Authentication variant identifier"
      auth_config:
        type: map
        required: true
        description: "Authentication configuration fields (variant-specific)"
      retry_policy:
        type: map
        required: false
        description: "Retry policy fields: max_attempts, initial_backoff_seconds, max_backoff_seconds, backoff_multiplier"
      rate_limit_config:
        type: map
        required: false
        description: "Rate limit fields: requests_per_second, burst_size"
    returns:
      connection_id:
        type: string
        description: "The upserted connection UUID"
      status:
        type: string
        description: "Upsert status (UPSERTED)"

  # Operational Gateway - Instruction Route Management
  operational_gateway.upsert_route:
    description: "Create or update an instruction route in the Operational Gateway service"
    compensation_strategy: none
    params:
      instruction_type:
        type: string
        required: true
        description: "Instruction type this route handles (e.g., 'payment.initiate')"
      connection_id:
        type: string
        required: true
        description: "Primary provider connection UUID for dispatch"
      fallback_connection_id:
        type: string
        required: false
        description: "Optional fallback connection UUID when primary is unhealthy"
      outbound_mapping:
        type: string
        required: false
        description: "MappingDefinition name for outbound payload transformation"
      inbound_mapping:
        type: string
        required: false
        description: "MappingDefinition name for inbound response transformation"
      http_method:
        type: string
        required: false
        description: "HTTP method for HTTPS/WEBHOOK protocols (e.g., POST, PUT)"
      path_template:
        type: string
        required: false
        description: "URL path template appended to the connection base_url"
    returns:
      instruction_type:
        type: string
        description: "The upserted instruction type"
      status:
        type: string
        description: "Upsert status (UPSERTED)"

  # Internal Account - Account Provisioning
  internal_account.initiate:
    description: "Initiate a new internal account"
    compensation_strategy: none
    params:
      account_code:
        type: string
        required: true
        description: "Business-friendly account code"
      name:
        type: string
        required: true
        description: "Human-readable account name"
      account_type:
        type: string
        required: true
        description: "Account type (CLEARING, NOSTRO, etc.)"
      instrument_code:
        type: string
        required: true
        description: "Instrument code (e.g., USD, KWH)"
      description:
        type: string
        required: false
        description: "Account description"
    returns:
      account_id:
        type: string
        description: "Generated account identifier"
      account_code:
        type: string
        description: "Echo of account code"
      name:
        type: string
        description: "Echo of account name"
      account_type:
        type: string
        description: "Echo of account type"
      status:
        type: string
        description: "Account status (ACTIVE)"
      instrument_code:
        type: string
        description: "Echo of instrument code"
