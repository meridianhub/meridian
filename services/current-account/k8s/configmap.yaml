apiVersion: v1
kind: ConfigMap
metadata:
  name: current-account-config
  labels:
    app: current-account
    component: microservice
data:
  # Logging configuration
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Database connection pool settings
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"
  DB_CONN_MAX_IDLE_TIME: "10m"

  # gRPC server configuration
  GRPC_PORT: "50051"
  GRPC_MAX_CONCURRENT_STREAMS: "100"

  # Redis configuration
  REDIS_URL: "redis://redis:6379"

  # OpenTelemetry configuration
  OTEL_SERVICE_NAME: "current-account-service"
  OTEL_SAMPLING_RATE: "0.1"

  # Kafka configuration for event publishing
  # Bootstrap servers should be overridden per environment
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_PRODUCER_ACKS: "all"
  KAFKA_PRODUCER_RETRIES: "3"

  # Webhook notification configuration
  # Timeout for individual webhook HTTP requests
  WEBHOOK_REQUEST_TIMEOUT: "5s"
  # Maximum retry attempts for failed webhook deliveries
  WEBHOOK_MAX_RETRIES: "3"

  # Saga script assets directory (must match Dockerfile COPY destination)
  SAGA_ASSET_DIR: "/saga-assets"

  # Authentication configuration
  # Set to "true" to require JWT validation on gRPC calls
  AUTH_ENABLED: "true"
  AUTH_JWKS_URL: "http://keycloak:8080/realms/meridian/protocol/openid-connect/certs"
