version: v2
plugins:
  # Pin specific versions for reproducible builds
  # Protocol Buffers Go plugin - generates .pb.go files
  - remote: buf.build/protocolbuffers/go:v1.36.4
    out: api/proto
    opt:
      - paths=source_relative

  # gRPC Go plugin - generates _grpc.pb.go files
  - remote: buf.build/grpc/go:v1.5.1
    out: api/proto
    opt:
      - paths=source_relative

  # Note: buf-validate uses runtime validation via github.com/bufbuild/protovalidate-go
  # No code generation plugin needed - validation happens at runtime
