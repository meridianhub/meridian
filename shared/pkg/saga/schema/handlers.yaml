# Platform Default Handler Schemas
# These schemas define the type signatures for all platform-provided saga handlers.
# Handlers are invoked from Starlark scripts via invoke_handler("handler.name", params).
#
# Handler Evolution:
#   Handlers support versioning and conversion rules for backwards-compatible evolution.
#   When a handler is renamed or its parameters change, add a `conversions` block:
#
#   Example:
#     service_name.new_handler:
#       version: 2
#       params: { ... }
#       conversions:
#         - from_version: 1
#           from_name: service_name.old_handler
#           param_mapping:
#             new_param: old_param      # maps old param names to new ones
#           defaults:
#             new_required_param: "'default_value'"
#           sunset: "3.0"              # version when old name is removed
#
#   Deprecated handlers (still present but discouraged):
#     service_name.old_handler:
#       deprecated: true
#       ...

service: platform
version: "1.0"

handlers:
  # Position Keeping Service
  position_keeping.initiate_log:
    description: "Initiate a position log entry for a DEBIT or CREDIT transaction"
    params:
      position_id:
        type: string
        required: true
        description: "Unique identifier for the position (alias: account_id)"
      account_id:
        type: string
        required: false
        description: "Alternative name for position_id, used by deposit/withdrawal scripts"
      amount:
        type: Decimal
        required: true
        description: "Transaction amount (must be positive)"
      instrument_code:
        type: string
        required: false
        description: "Instrument code (e.g., GBP, kWh). Replaces currency field."
      currency:
        type: string
        required: false
        description: "Deprecated: use instrument_code instead. Currency code (e.g., GBP, USD)"
      direction:
        type: enum
        values: [DEBIT, CREDIT]
        required: true
        description: "Direction of the transaction"
      valuation_analysis:
        type: map
        required: false
        description: "Optional valuation analysis metadata (from atomic valuation) - stored in position attributes for audit trail"
    returns:
      log_id:
        type: string
        description: "Generated log entry identifier (UUID)"
      position_id:
        type: string
        description: "Echo of the input position ID"
      amount:
        type: Decimal
        description: "Echo of the input amount"
      direction:
        type: string
        description: "Echo of the input direction"
      status:
        type: string
        description: "Status of the log entry (INITIATED)"
    compensate: position_keeping.cancel_log

  position_keeping.update_log:
    description: "Update an existing position log entry"
    compensation_strategy: none
    params:
      log_id:
        type: string
        required: true
        description: "Identifier of the log entry to update"
    returns:
      log_id:
        type: string
        description: "Echo of the input log ID"
      status:
        type: string
        description: "Status of the log entry (UPDATED)"

  position_keeping.cancel_log:
    description: "Cancel a position log entry (compensation handler)"
    compensation_strategy: none
    params:
      log_id:
        type: string
        required: true
        description: "Identifier of the log entry to cancel"
    returns:
      log_id:
        type: string
        description: "Echo of the input log ID"
      status:
        type: string
        description: "Status of the log entry (CANCELLED)"

  # Financial Accounting Service
  financial_accounting.post_entries:
    description: "Post double-entry accounting entries to the ledger"
    params:
      entries:
        type: array
        required: true
        description: "Array of accounting entries to post"
    returns:
      posting_ids:
        type: array
        description: "Array of generated posting IDs (UUIDs)"
      status:
        type: string
        description: "Status of the posting (POSTED)"
    compensate: financial_accounting.reverse_entries

  financial_accounting.reverse_entries:
    description: "Reverse previously posted accounting entries (compensation handler)"
    compensation_strategy: none
    params:
      posting_ids:
        type: array
        required: true
        description: "Array of posting IDs to reverse"
    returns:
      original_posting_ids:
        type: array
        description: "Echo of the input posting IDs"
      status:
        type: string
        description: "Status of the reversal (REVERSED)"

  financial_accounting.create_booking:
    description: "Create a booking log entry for audit purposes"
    compensation_strategy: none
    params:
      description:
        type: string
        required: true
        description: "Human-readable description of the booking"
    returns:
      booking_id:
        type: string
        description: "Generated booking identifier (UUID)"
      description:
        type: string
        description: "Echo of the input description"
      status:
        type: string
        description: "Status of the booking (CREATED)"

  financial_accounting.initiate_booking_log:
    description: "Initiate a booking log for a deposit or withdrawal transaction"
    compensation_strategy: none
    params:
      account_id:
        type: string
        required: true
        description: "Account identifier for the booking"
      instrument_code:
        type: string
        required: false
        description: "Instrument code (e.g., GBP, kWh). Replaces currency field."
      currency:
        type: string
        required: false
        description: "Deprecated: use instrument_code instead. Currency code (e.g., GBP, USD)"
      transaction_id:
        type: string
        required: true
        description: "Unique transaction identifier"
      transaction_type:
        type: string
        required: true
        description: "Type of transaction (e.g., DEPOSIT, WITHDRAWAL)"
    returns:
      booking_log_id:
        type: string
        description: "Generated booking log identifier (UUID)"
      status:
        type: string
        description: "Status of the booking log (INITIATED)"

  financial_accounting.capture_posting:
    description: "Capture a single-sided posting entry within a booking log"
    params:
      booking_log_id:
        type: string
        required: true
        description: "Booking log to attach this posting to"
      account_id:
        type: string
        required: true
        description: "Account identifier for the posting"
      amount:
        type: Decimal
        required: true
        description: "Posting amount (must be positive)"
      instrument_code:
        type: string
        required: false
        description: "Instrument code (e.g., GBP, kWh). Replaces currency field."
      currency:
        type: string
        required: false
        description: "Deprecated: use instrument_code instead. Currency code (e.g., GBP, USD)"
      direction:
        type: enum
        values: [DEBIT, CREDIT]
        required: true
        description: "Direction of the posting"
      transaction_id:
        type: string
        required: true
        description: "Unique transaction identifier"
      posting_type:
        type: string
        required: true
        description: "Type of posting (e.g., debit, credit)"
    returns:
      posting_id:
        type: string
        description: "Generated posting identifier (UUID)"
      status:
        type: string
        description: "Status of the posting (CAPTURED)"
    compensate: financial_accounting.compensate_posting

  financial_accounting.compensate_posting:
    description: "Compensate (reverse) a captured posting entry"
    compensation_strategy: none
    params:
      booking_log_id:
        type: string
        required: true
        description: "Booking log containing the posting to compensate"
      account_id:
        type: string
        required: true
        description: "Account identifier for the compensation posting"
      amount:
        type: Decimal
        required: true
        description: "Compensation amount (must be positive)"
      instrument_code:
        type: string
        required: false
        description: "Instrument code (e.g., GBP, kWh). Replaces currency field."
      currency:
        type: string
        required: false
        description: "Deprecated: use instrument_code instead. Currency code (e.g., GBP, USD)"
      direction:
        type: enum
        values: [DEBIT, CREDIT]
        required: true
        description: "Direction of the compensation (reversed from original)"
      transaction_id:
        type: string
        required: true
        description: "Unique transaction identifier"
      posting_type:
        type: string
        required: true
        description: "Type of posting being compensated (e.g., debit, credit)"
    returns:
      posting_id:
        type: string
        description: "Generated compensation posting identifier (UUID)"
      status:
        type: string
        description: "Status of the compensation posting (COMPENSATED)"

  financial_accounting.update_booking_log:
    description: "Update the status of an existing booking log"
    compensation_strategy: none
    params:
      booking_log_id:
        type: string
        required: true
        description: "Identifier of the booking log to update"
      status:
        type: string
        required: true
        description: "New status for the booking log (e.g., POSTED)"
    returns:
      booking_log_id:
        type: string
        description: "Echo of the input booking log ID"
      status:
        type: string
        description: "Echo of the updated status"

  # Current Account Service
  current_account.create_lien:
    description: "Create a lien (hold) on an account for a specified amount"
    params:
      account_id:
        type: string
        required: true
        description: "Identifier of the account to place lien on"
      amount:
        type: Decimal
        required: true
        description: "Amount to hold (must be positive)"
    returns:
      lien_id:
        type: string
        description: "Generated lien identifier (UUID)"
      account_id:
        type: string
        description: "Echo of the input account ID"
      amount:
        type: Decimal
        description: "Echo of the input amount"
      status:
        type: string
        description: "Status of the lien (ACTIVE)"
    compensate: current_account.terminate_lien

  current_account.execute_lien:
    description: "Execute (consume) a previously created lien"
    compensation_strategy: none
    params:
      lien_id:
        type: string
        required: true
        description: "Identifier of the lien to execute"
    returns:
      lien_id:
        type: string
        description: "Echo of the input lien ID"
      status:
        type: string
        description: "Status of the lien (EXECUTED)"

  current_account.terminate_lien:
    description: "Terminate (release) a lien without execution (compensation handler)"
    compensation_strategy: none
    params:
      lien_id:
        type: string
        required: true
        description: "Identifier of the lien to terminate"
    returns:
      lien_id:
        type: string
        description: "Echo of the input lien ID"
      status:
        type: string
        description: "Status of the lien (TERMINATED)"

  current_account.control:
    description: "Perform lifecycle control action on an account (FREEZE, UNFREEZE, CLOSE)"
    compensation_strategy: saga_managed
    params:
      account_id:
        type: string
        required: true
        description: "Identifier of the account to control"
      action:
        type: enum
        values: [FREEZE, UNFREEZE, CLOSE]
        required: true
        description: "Control action to perform"
      reason:
        type: string
        required: true
        description: "Reason for the control action (min 10 chars for FREEZE/CLOSE)"
    returns:
      account_id:
        type: string
        description: "Echo of the input account ID"
      new_status:
        type: string
        description: "Account status after the action (ACTIVE, FROZEN, CLOSED)"
      action_timestamp:
        type: string
        description: "ISO 8601 timestamp of when the action was executed"

  current_account.save:
    description: "Persist current account metadata for a transaction"
    compensation_strategy: none
    params:
      account_id:
        type: string
        required: true
        description: "Identifier of the account to save"
      transaction_id:
        type: string
        required: true
        description: "Identifier of the transaction triggering the save"
    returns:
      account_id:
        type: string
        description: "Echo of the input account ID"
      status:
        type: string
        description: "Status of the save operation (SAVED)"

  # Valuation Engine Service
  valuation_engine.valuate:
    description: "Valuate an instrument at a specific point in time"
    compensation_strategy: none
    params:
      instrument:
        type: string
        required: true
        description: "Instrument identifier or code"
      quantity:
        type: Decimal
        required: true
        description: "Quantity to valuate"
      context_type:
        type: string
        required: true
        description: "Valuation context (e.g., MARK_TO_MARKET, FAIR_VALUE)"
    returns:
      instrument:
        type: string
        description: "Echo of the input instrument"
      quantity:
        type: Decimal
        description: "Echo of the input quantity"
      unit_price:
        type: Decimal
        description: "Price per unit of the instrument"
      value:
        type: Decimal
        description: "Total value (quantity * unit_price)"
      context_type:
        type: string
        description: "Echo of the input context type"
      currency:
        type: string
        description: "Currency of the valuation"
      valued_at:
        type: string
        description: "Timestamp when valuation was computed"

  # Repository Service
  repository.save:
    description: "Persist an entity to the repository"
    compensation_strategy: none
    params:
      entity_type:
        type: string
        required: true
        description: "Type of entity being saved (e.g., Account, Transaction)"
      entity:
        type: map
        required: true
        description: "Entity data to persist"
    returns:
      entity_id:
        type: string
        description: "Generated or existing entity identifier (UUID)"
      entity_type:
        type: string
        description: "Echo of the input entity type"
      entity:
        type: map
        description: "Echo of the saved entity"
      status:
        type: string
        description: "Status of the save operation (SAVED)"

  # Notification Service
  notification.send:
    description: "Send a notification to a recipient"
    compensation_strategy: none
    params:
      type:
        type: string
        required: true
        description: "Notification type (e.g., EMAIL, SMS, PUSH)"
      recipient:
        type: string
        required: true
        description: "Recipient identifier (email, phone, user ID)"
    returns:
      notification_id:
        type: string
        description: "Generated notification identifier (UUID)"
      type:
        type: string
        description: "Echo of the input notification type"
      recipient:
        type: string
        description: "Echo of the input recipient"
      status:
        type: string
        description: "Status of the notification (SENT)"

  # Payment Order Service
  payment_order.create_lien:
    description: "Create a bucket-aware lien (hold) for a payment order"
    params:
      account_id:
        type: string
        required: true
        description: "Debtor account identifier"
      amount_cents:
        type: int64
        required: true
        description: "Amount in minor currency units (cents)"
      currency:
        type: string
        required: true
        description: "Currency code (e.g., GBP, USD)"
      payment_order_id:
        type: string
        required: true
        description: "Identifier of the payment order"
      instrument_code:
        type: string
        required: false
        description: "Instrument code for bucket-aware solvency evaluation"
      payment_attributes:
        type: map
        required: false
        description: "Attributes for CEL bucket expression evaluation"
    returns:
      lien_id:
        type: string
        description: "Generated lien identifier (UUID)"
      bucket_id:
        type: string
        description: "Bucket identifier used for solvency evaluation (UUID)"
      status:
        type: string
        description: "Status of the lien (ACTIVE)"
    compensate: payment_order.terminate_lien

  payment_order.terminate_lien:
    description: "Terminate (release) a payment order lien (compensation handler)"
    compensation_strategy: none
    params:
      lien_id:
        type: string
        required: true
        description: "Identifier of the lien to terminate"
      reason:
        type: string
        required: false
        description: "Reason for termination"
    returns:
      lien_id:
        type: string
        description: "Echo of the input lien ID"
      status:
        type: string
        description: "Status of the lien (TERMINATED)"

  payment_order.send_to_gateway:
    description: "Send a payment order to the external payment gateway"
    compensation_strategy: saga_managed
    external: true
    params:
      payment_order_id:
        type: string
        required: true
        description: "Identifier of the payment order"
      debtor_account_id:
        type: string
        required: true
        description: "Debtor account identifier"
      creditor_reference:
        type: string
        required: true
        description: "Creditor reference for the payment"
      amount_cents:
        type: int64
        required: true
        description: "Amount in minor currency units (cents)"
      currency:
        type: string
        required: true
        description: "Currency code (e.g., GBP, USD)"
      idempotency_key:
        type: string
        required: true
        description: "Idempotency key for gateway deduplication"
    returns:
      gateway_reference_id:
        type: string
        description: "Gateway-assigned reference identifier (UUID)"
      gateway_status:
        type: string
        description: "Status from the gateway (ACCEPTED)"

  payment_order.post_ledger_entries:
    description: "Post ledger entries for a confirmed payment order"
    compensation_strategy: none
    params:
      payment_order_id:
        type: string
        required: true
        description: "Identifier of the payment order"
      debtor_account_id:
        type: string
        required: true
        description: "Debtor account identifier"
      gateway_reference_id:
        type: string
        required: true
        description: "Gateway-assigned reference identifier"
      amount_cents:
        type: int64
        required: true
        description: "Amount in minor currency units (cents)"
      currency:
        type: string
        required: true
        description: "Currency code (e.g., GBP, USD)"
      idempotency_key:
        type: string
        required: true
        description: "Idempotency key for ledger deduplication"
      internal_clearing_enabled:
        type: bool
        required: false
        description: "Whether to use 4-posting internal clearing flow (default: false)"
    returns:
      booking_log_id:
        type: string
        description: "Generated booking log identifier (UUID)"
      status:
        type: string
        description: "Status of the ledger posting (POSTED)"

  payment_order.execute_lien:
    description: "Execute (finalize) a payment order lien after ledger posting"
    compensation_strategy: none
    params:
      lien_id:
        type: string
        required: true
        description: "Identifier of the lien to execute"
    returns:
      execution_status:
        type: string
        description: "Status of the lien execution (EXECUTED)"

  # Party Service
  party.get_default_payment_method:
    description: "Retrieve the default payment method for a party"
    compensation_strategy: none
    params:
      party_id:
        type: string
        required: true
        description: "Party identifier (UUID)"
    returns:
      provider:
        type: string
        description: "Payment provider (e.g., stripe)"
      provider_customer_id:
        type: string
        description: "Provider-assigned customer identifier"
      provider_method_id:
        type: string
        description: "Provider-assigned payment method identifier"
      method_type:
        type: string
        description: "Payment method type (e.g., card, bank_account, sepa)"

  # Account Reconciliation Service
  reconciliation.initiate_run:
    description: "Initiate a new settlement reconciliation run"
    params:
      account_id:
        type: string
        required: true
        description: "Account identifier to reconcile"
      scope:
        type: enum
        values: [ACCOUNT, INSTRUMENT, PORTFOLIO, FULL]
        required: false
        description: "Reconciliation scope (default: ACCOUNT)"
      settlement_type:
        type: enum
        values: [DAILY, WEEKLY, MONTHLY, ON_DEMAND, END_OF_DAY, REAL_TIME]
        required: false
        description: "Settlement cycle type"
      initiated_by:
        type: string
        required: true
        description: "User or system starting the run"
    returns:
      run_id:
        type: string
        description: "Generated settlement run identifier (UUID)"
      status:
        type: string
        description: "Status of the run (PENDING)"
    compensate: reconciliation.cancel_run

  reconciliation.execute_run:
    description: "Trigger execution of a pending settlement run"
    compensation_strategy: none
    params:
      run_id:
        type: string
        required: true
        description: "Identifier of the settlement run to execute"
    returns:
      run_id:
        type: string
        description: "Echo of the input run ID"
      status:
        type: string
        description: "Status of the run (RUNNING)"

  reconciliation.retrieve_run:
    description: "Retrieve a settlement run summary"
    compensation_strategy: none
    params:
      run_id:
        type: string
        required: true
        description: "Identifier of the settlement run to retrieve"
    returns:
      run_id:
        type: string
        description: "Echo of the input run ID"
      status:
        type: string
        description: "Current status of the run"
      variance_count:
        type: int64
        description: "Number of variances detected"

  reconciliation.cancel_run:
    description: "Cancel a settlement run (compensation handler)"
    compensation_strategy: none
    params:
      run_id:
        type: string
        required: true
        description: "Identifier of the settlement run to cancel"
      reason:
        type: string
        required: false
        description: "Reason for cancellation"
    returns:
      run_id:
        type: string
        description: "Echo of the input run ID"
      status:
        type: string
        description: "Status of the run (CANCELLED)"

  reconciliation.assert_balance:
    description: "Evaluate a balance assertion against current positions"
    compensation_strategy: none
    params:
      account_id:
        type: string
        required: true
        description: "Account identifier to assert"
      instrument_code:
        type: string
        required: true
        description: "Asset type to assert (e.g., GBP, KWH)"
      expression:
        type: string
        required: true
        description: "Assertion rule (CEL expression)"
      expected_balance:
        type: string
        required: true
        description: "Expected balance as decimal string"
    returns:
      assertion_id:
        type: string
        description: "Generated assertion identifier (UUID)"
      status:
        type: string
        description: "Assertion result (PASSED, FAILED)"

  reconciliation.initiate_dispute:
    description: "Raise a formal dispute against a detected variance"
    compensation_strategy: none
    params:
      variance_id:
        type: string
        required: true
        description: "Identifier of the variance being disputed"
      run_id:
        type: string
        required: true
        description: "Identifier of the settlement run"
      account_id:
        type: string
        required: true
        description: "Account identifier"
      reason:
        type: string
        required: true
        description: "Reason for the dispute"
      raised_by:
        type: string
        required: true
        description: "User or system raising the dispute"
    returns:
      dispute_id:
        type: string
        description: "Generated dispute identifier (UUID)"
      status:
        type: string
        description: "Status of the dispute (OPEN)"

  # Operational Gateway Service
  operational_gateway.dispatch_instruction:
    description: "Queue an instruction for dispatch to an external provider"
    params:
      instruction_type:
        type: string
        required: true
        description: "Type of instruction (e.g., payment.collect, notification.sms)"
      payload:
        type: map
        required: true
        description: "Instruction-specific data sent to the provider"
      priority:
        type: enum
        values: [LOW, NORMAL, HIGH, CRITICAL]
        required: false
        description: "Dispatch priority (default: NORMAL)"
      correlation_id:
        type: string
        required: false
        description: "Links to originating saga/event for distributed tracing"
      causation_id:
        type: string
        required: false
        description: "Identifies the event or command that caused this instruction"
      scheduled_at:
        type: string
        required: false
        description: "ISO 8601 timestamp: when to dispatch (null = immediate)"
    returns:
      instruction_id:
        type: string
        description: "UUID of the created instruction"
      status:
        type: string
        description: "Status of the instruction (PENDING)"
    compensate: operational_gateway.cancel_instruction

  operational_gateway.cancel_instruction:
    description: "Cancel a pending instruction before it is dispatched (compensation handler)"
    compensation_strategy: none
    params:
      instruction_id:
        type: string
        required: true
        description: "UUID of the instruction to cancel"
      reason:
        type: string
        required: false
        description: "Reason for cancellation (for audit trail)"
    returns:
      instruction_id:
        type: string
        description: "Echo of the input instruction ID"
      status:
        type: string
        description: "Status of the instruction (CANCELLED)"

  operational_gateway.get_instruction:
    description: "Get instruction status and details by ID"
    compensation_strategy: none
    params:
      instruction_id:
        type: string
        required: true
        description: "UUID of the instruction to retrieve"
    returns:
      instruction_id:
        type: string
        description: "UUID of the instruction"
      instruction_type:
        type: string
        description: "Type of instruction"
      status:
        type: string
        description: "Current lifecycle status of the instruction"

  # Financial Gateway Service
  financial_gateway.dispatch_payment:
    description: "Dispatch a payment to an external provider via the Financial Gateway"
    params:
      payment_order_id:
        type: string
        required: true
        description: "Identifier of the payment order"
      amount_minor_units:
        type: int64
        required: true
        description: "Amount in minor currency units (e.g., cents)"
      currency:
        type: string
        required: true
        description: "Currency code (e.g., GBP, USD)"
      customer_reference:
        type: string
        required: true
        description: "Provider-assigned customer identifier"
      payment_method_reference:
        type: string
        required: true
        description: "Provider-assigned payment method identifier"
      idempotency_key:
        type: string
        required: true
        description: "Idempotency key for gateway deduplication"
      rail:
        type: string
        required: true
        description: "Payment rail to use (e.g., STRIPE, ADYEN)"
      metadata:
        type: map
        required: false
        description: "Additional metadata to pass to the provider (e.g., debtor_account_id, creditor_reference)"
    returns:
      provider_reference_id:
        type: string
        description: "Provider-assigned reference identifier (e.g., Stripe PaymentIntent ID)"
      status:
        type: string
        description: "Status of the payment dispatch (e.g., ACCEPTED, PENDING)"
      platform_fee_minor_units:
        type: int64
        description: "Platform fee charged for this payment in minor currency units"
    compensate: financial_gateway.cancel_payment

  financial_gateway.cancel_payment:
    description: "Cancel a pending payment dispatch (compensation handler)"
    compensation_strategy: none
    params:
      payment_order_id:
        type: string
        required: true
        description: "Identifier of the payment order to cancel"
      reason:
        type: string
        required: false
        description: "Reason for cancellation (for audit trail)"
    returns:
      payment_order_id:
        type: string
        description: "Echo of the input payment order ID"
      status:
        type: string
        description: "Status of the payment (CANCELLED)"

  financial_gateway.dispatch_refund:
    description: "Dispatch a refund for a previously processed payment via the Financial Gateway"
    compensation_strategy: none
    params:
      payment_order_id:
        type: string
        required: true
        description: "Identifier of the original payment order to refund"
      refund_amount_minor_units:
        type: int64
        required: true
        description: "Refund amount in minor currency units (e.g., cents)"
      reason:
        type: string
        required: false
        description: "Reason for the refund"
      idempotency_key:
        type: string
        required: true
        description: "Idempotency key for refund deduplication"
    returns:
      refund_reference_id:
        type: string
        description: "Provider-assigned refund reference identifier"
      status:
        type: string
        description: "Status of the refund dispatch (e.g., ACCEPTED, PENDING)"

  # Forecasting Service
  forecasting.compute_forward_curve:
    description: "Trigger forward curve computation from market data for a given strategy and instrument"
    compensation_strategy: saga_managed
    params:
      strategy_name:
        type: string
        required: true
        description: "Name of the forecasting strategy to execute"
      instrument_code:
        type: string
        required: true
        description: "Instrument code to compute the forward curve for (e.g., KWH, GBP)"
      from_date:
        type: string
        required: true
        description: "Start date for the forward curve period (ISO 8601 date)"
      to_date:
        type: string
        required: true
        description: "End date for the forward curve period (ISO 8601 date)"
    returns:
      curve_id:
        type: string
        description: "Generated forward curve identifier (UUID)"
      strategy_name:
        type: string
        description: "Echo of the input strategy name"
      instrument_code:
        type: string
        description: "Echo of the input instrument code"
      status:
        type: string
        description: "Status of the computation (COMPLETED)"

  # Market Information Service
  market_information.publish_observation:
    description: "Publish a price or rate observation to a market data set"
    compensation_strategy: saga_managed
    params:
      dataset_code:
        type: string
        required: true
        description: "Code of the data set to publish to"
      dataset_version:
        type: int64
        required: true
        description: "Version of the data set schema"
      value:
        type: Decimal
        required: true
        description: "Observed value (price, rate, etc.)"
      quality_level:
        type: enum
        values: [ESTIMATE, COEFFICIENT, ACTUAL, REVISED]
        required: true
        description: "Data quality level of the observation"
      valid_from:
        type: string
        required: true
        description: "Start of the validity period (ISO 8601 timestamp)"
      valid_to:
        type: string
        required: true
        description: "End of the validity period (ISO 8601 timestamp)"
    returns:
      observation_id:
        type: string
        description: "Generated observation identifier (UUID)"
      dataset_code:
        type: string
        description: "Echo of the input data set code"
      status:
        type: string
        description: "Status of the observation (PUBLISHED)"

  market_information.query_latest:
    description: "Query the latest observation for a market data set"
    compensation_strategy: none
    params:
      dataset_code:
        type: string
        required: true
        description: "Code of the data set to query"
      as_of:
        type: string
        required: false
        description: "Point-in-time for the query (ISO 8601 timestamp, default: now)"
    returns:
      observation_id:
        type: string
        description: "Identifier of the latest observation"
      dataset_code:
        type: string
        description: "Echo of the input data set code"
      value:
        type: Decimal
        description: "Observed value"
      quality_level:
        type: string
        description: "Quality level of the observation"
      valid_from:
        type: string
        description: "Start of validity period"
      valid_to:
        type: string
        description: "End of validity period"

  market_information.manage_dataset:
    description: "Create or update a market data set definition"
    compensation_strategy: saga_managed
    params:
      dataset_code:
        type: string
        required: true
        description: "Unique code for the data set"
      display_name:
        type: string
        required: true
        description: "Human-readable name for the data set"
      dimension:
        type: string
        required: true
        description: "Physical dimension (CURRENCY, ENERGY, etc.)"
      unit:
        type: string
        required: true
        description: "Unit of measurement (e.g., GBP, KWH, TONNE_CO2E)"
    returns:
      dataset_code:
        type: string
        description: "Echo of the input data set code"
      dataset_version:
        type: int64
        description: "Current version of the data set schema after the operation"
      status:
        type: string
        description: "Status of the operation (CREATED or UPDATED)"

  # Reference Data Service
  reference_data.register_instrument:
    description: "Register a new instrument definition in Reference Data service"
    params:
      instrument_code:
        type: string
        required: true
        description: "Unique instrument code (e.g., USD, KWH)"
      display_name:
        type: string
        required: false
        description: "Human-readable instrument name"
      dimension:
        type: string
        required: false
        description: "Physical dimension (CURRENCY, ENERGY, etc.)"
      decimal_places:
        type: int64
        required: false
        description: "Decimal precision (0-18)"
      description:
        type: string
        required: false
        description: "Instrument description"
    returns:
      instrument_code:
        type: string
        description: "The registered instrument code"
      status:
        type: string
        description: "Registration status (REGISTERED)"
    compensate: reference_data.delete_instrument

  reference_data.delete_instrument:
    description: "Delete an instrument (compensation for register)"
    compensation_strategy: none
    params:
      instrument_code:
        type: string
        required: true
        description: "Instrument code to delete"
    returns:
      instrument_code:
        type: string
        description: "The deleted instrument code"
      status:
        type: string
        description: "Deletion status (DELETED)"

  reference_data.register_account_type:
    description: "Register a new account type definition in Reference Data service"
    params:
      code:
        type: string
        required: true
        description: "Unique account type code (e.g., CUSTOMER_CURRENT)"
      display_name:
        type: string
        required: true
        description: "Human-readable account type name"
      behavior_class:
        type: enum
        values: [CUSTOMER, CLEARING, NOSTRO, VOSTRO, HOLDING, SUSPENSE, REVENUE, EXPENSE, INVENTORY]
        required: true
        description: "Accounting behavior class"
      normal_balance:
        type: enum
        values: [DEBIT, CREDIT]
        required: true
        description: "Normal balance direction"
      instrument_code:
        type: string
        required: true
        description: "Default instrument code for this account type (e.g., GBP)"
      description:
        type: string
        required: false
        description: "Account type description"
      default_saga_prefix:
        type: string
        required: false
        description: "Saga prefix for operations on accounts of this type"
      default_conversion_method:
        type: string
        required: false
        description: "Named valuation method for conversion (resolved to UUID by handler)"
      validation_cel:
        type: string
        required: false
        description: "CEL expression for validating account operations"
      eligibility_cel:
        type: string
        required: false
        description: "CEL expression for determining account eligibility"
      attribute_schema:
        type: map
        required: false
        description: "JSON Schema defining valid attributes for this account type"
      valuation_methods:
        type: array
        required: false
        description: "List of valuation method templates (each with input_instrument and method_name)"
    returns:
      code:
        type: string
        description: "The registered account type code"
      version:
        type: int32
        description: "The version of the registered account type definition"
    compensate: reference_data.delete_account_type

  reference_data.delete_account_type:
    description: "Delete an account type (compensation for register)"
    compensation_strategy: none
    params:
      code:
        type: string
        required: true
        description: "Account type code to delete"
    returns:
      code:
        type: string
        description: "The deleted account type code"
      status:
        type: string
        description: "Deletion status (DELETED)"

  reference_data.register_valuation_rule:
    description: "Register a valuation rule for cross-instrument conversion"
    compensation_strategy: none
    params:
      from_instrument:
        type: string
        required: true
        description: "Source instrument code"
      to_instrument:
        type: string
        required: true
        description: "Target instrument code"
      rule_type:
        type: string
        required: false
        description: "Rule type (FIXED_RATE, MARKET, etc.)"
      expression:
        type: string
        required: false
        description: "CEL expression for valuation computation"
      description:
        type: string
        required: false
        description: "Rule description"
    returns:
      from_instrument:
        type: string
        description: "Source instrument code"
      to_instrument:
        type: string
        description: "Target instrument code"
      status:
        type: string
        description: "Registration status (REGISTERED)"

  reference_data.register_saga_definition:
    description: "Register a saga definition in the saga registry"
    compensation_strategy: none
    params:
      saga_name:
        type: string
        required: true
        description: "Saga identifier name"
      display_name:
        type: string
        required: false
        description: "Human-readable saga name"
      description:
        type: string
        required: false
        description: "Saga description"
      script:
        type: string
        required: false
        description: "Starlark script content"
      version:
        type: string
        required: false
        description: "Saga version (semver format)"
    returns:
      saga_name:
        type: string
        description: "The registered saga name"
      status:
        type: string
        description: "Registration status (REGISTERED)"

  # Internal Account Service
  internal_account.initiate:
    description: "Initiate a new internal account"
    compensation_strategy: none
    params:
      account_code:
        type: string
        required: true
        description: "Business-friendly account code"
      name:
        type: string
        required: true
        description: "Human-readable account name"
      product_type_code:
        type: string
        required: true
        description: "Product type code from the Product Directory (e.g., CLEARING, NOSTRO)"
      instrument_code:
        type: string
        required: true
        description: "Instrument code (e.g., USD, KWH)"
      description:
        type: string
        required: false
        description: "Account description"
    returns:
      account_id:
        type: string
        description: "Generated account identifier"
      account_code:
        type: string
        description: "Echo of account code"
      name:
        type: string
        description: "Echo of account name"
      behavior_class:
        type: string
        description: "Behavior class derived from product type (e.g., NOSTRO, CLEARING)"
      status:
        type: string
        description: "Account status (ACTIVE)"
      instrument_code:
        type: string
        description: "Echo of instrument code"
