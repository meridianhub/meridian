apiVersion: v1
kind: Service
metadata:
  name: payment-order
  labels:
    app: payment-order
    component: microservice
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  ports:
  - name: grpc
    port: 50054
    targetPort: grpc
    protocol: TCP
  selector:
    app: payment-order
