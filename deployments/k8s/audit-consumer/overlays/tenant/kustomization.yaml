apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: audit-consumer-tenant

namespace: meridian

labels:
- pairs:
    app: audit-consumer
    service: tenant
    managed-by: kustomize

resources:
- ../../base

namePrefix: tenant-

# Service-specific configuration
configMapGenerator:
- name: audit-consumer-config
  behavior: merge
  literals:
  - service_name=tenant
  - audit_topic=audit.events.tenant.v1
  - kafka_group_id=audit-consumer-tenant
  - kafka_client_id=audit-consumer-tenant

# Tenant service has LOWER audit volume - conservative scaling
patches:
# Lower replica count
- target:
    kind: Deployment
    name: audit-consumer
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 2

# Standard resource limits
- target:
    kind: Deployment
    name: audit-consumer
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

# Standard HPA limits
- target:
    kind: HorizontalPodAutoscaler
    name: audit-consumer
  patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 2
    - op: replace
      path: /spec/maxReplicas
      value: 8

images:
- name: audit-consumer
  newTag: tenant-v1.0.0
