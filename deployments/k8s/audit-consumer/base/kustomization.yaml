apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: audit-consumer-base

namespace: default

labels:
- pairs:
    app: audit-consumer
    component: audit
    managed-by: kustomize

resources:
- serviceaccount.yaml
- configmap.yaml
- deployment.yaml
- service.yaml
- hpa.yaml
# secret.yaml is generated from secret.yaml.example
# and excluded from git via .gitignore
# In production, use external secret management (e.g., Sealed Secrets, External Secrets Operator)

images:
- name: audit-consumer
  newTag: latest

configMapGenerator:
- name: audit-consumer-version
  literals:
  - version=dev
  - commit=unknown
  - build_date=unknown

generatorOptions:
  disableNameSuffixHash: false
  labels:
    app: audit-consumer
