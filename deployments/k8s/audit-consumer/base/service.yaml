# Port Configuration: See shared/platform/ports/ports.go for canonical port assignments.
# This service uses ports.Gateway for HTTP health/metrics endpoints.
apiVersion: v1
kind: Service
metadata:
  name: audit-consumer
  labels:
    app: audit-consumer
    component: audit
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: audit-consumer
    component: audit
