apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: meridian
  namespace: production
  labels:
    app: meridian
    component: ledger
    environment: production
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: meridian
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow HTTP traffic from within the cluster
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8080  # HTTP API
    - protocol: TCP
      port: 9090  # gRPC

  # Allow traffic from monitoring/observability systems
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080  # Metrics endpoint

  egress:
  # Allow DNS resolution (CoreDNS typically runs in kube-system)
  # Note: Using empty selector as kube-system doesn't have standard labels
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53

  # Allow database connections (CockroachDB)
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: cockroachdb
    ports:
    - protocol: TCP
      port: 26257  # CockroachDB SQL port

  # Allow Kafka connections
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092  # Kafka broker

  # Allow Redis connections
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379  # Redis

  # Allow HTTPS outbound (for external APIs only, not cluster-internal)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        # Exclude private IP ranges to prevent data exfiltration to compromised pods
        - 10.0.0.0/8        # Private Class A
        - 172.16.0.0/12     # Private Class B
        - 192.168.0.0/16    # Private Class C
        - 169.254.0.0/16    # Link-local
        - 127.0.0.0/8       # Loopback
    ports:
    - protocol: TCP
      port: 443

  # Block all other traffic by default
