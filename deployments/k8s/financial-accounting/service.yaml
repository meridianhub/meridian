apiVersion: v1
kind: Service
metadata:
  name: financial-accounting
  labels:
    app: financial-accounting
    component: microservice
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  ports:
  - name: grpc
    port: 50052
    targetPort: grpc
    protocol: TCP
  selector:
    app: financial-accounting
