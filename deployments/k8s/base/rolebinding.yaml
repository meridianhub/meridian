apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: meridian
  labels:
    app: meridian
    component: ledger
    managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: meridian
subjects:
- kind: ServiceAccount
  name: meridian
  namespace: default  # Will be overridden by Kustomize overlays (dev/staging/production)
