# Port Configuration: See shared/platform/ports/ports.go for canonical port assignments.
# This service uses ports.Gateway for HTTP health/metrics endpoints.
apiVersion: v1
kind: Service
metadata:
  name: audit-worker
  labels:
    app: audit-worker
    component: audit
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: audit-worker
    component: audit
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  sessionAffinity: None
