apiVersion: v1
kind: Service
metadata:
  name: audit-worker
  labels:
    app: audit-worker
    component: audit
    tier: backend
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for gRPC client-side load balancing
  selector:
    app: audit-worker
    component: audit
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: grpc
    port: 9090
    targetPort: grpc
    protocol: TCP
  sessionAffinity: None
