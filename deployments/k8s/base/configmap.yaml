apiVersion: v1
kind: ConfigMap
metadata:
  name: meridian-config
  labels:
    app: meridian
    component: ledger
data:
  log_level: "info"
  log_format: "json"
  port: "8080"
  grpc_port: "9090"
  metrics_enabled: "true"
  metrics_path: "/metrics"
  health_check_path: "/health"
  readiness_check_path: "/health/ready"
  liveness_check_path: "/health/live"
  startup_check_path: "/health/startup"
