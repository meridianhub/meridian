apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-worker-config
  labels:
    app: audit-worker
    component: audit
data:
  log_level: "info"
  log_format: "json"
  port: "8080"
  grpc_port: "9090"
  metrics_enabled: "true"
  metrics_path: "/metrics"
  health_check_path: "/health"
  readiness_check_path: "/health/ready"
  liveness_check_path: "/health/live"
  startup_check_path: "/health/startup"
  # Schema to process audit entries from (required)
  # For local dev, use public schema since we don't have schema-per-tenant
  AUDIT_SCHEMA: "public"
