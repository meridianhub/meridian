# Zookeeper Helm values for local development
# Optimized for fast startup and minimal resource usage

# Single-node deployment for local development
replicaCount: 1

# Resource limits for local development
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Persistence disabled for faster startup
persistence:
  enabled: false

# Authentication disabled for local development
auth:
  enabled: false

# Service configuration
service:
  type: ClusterIP
  ports:
    client: 2181

# Metrics disabled for local development
metrics:
  enabled: false

# Health checks
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
