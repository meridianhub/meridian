# Kafka Helm values for local development
# Optimized for fast startup and minimal resource usage

# Single-node deployment for local development
replicaCount: 1

# Zookeeper connection
zookeeper:
  enabled: false  # Using external Zookeeper deployed separately
externalZookeeper:
  servers:
    - zookeeper.default.svc.cluster.local:2181

# Resource limits for local development
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Persistence disabled for faster startup
persistence:
  enabled: false

# Authentication disabled for local development
auth:
  clientProtocol: plaintext
  interBrokerProtocol: plaintext

# Service configuration
service:
  type: ClusterIP
  ports:
    client: 9092

# Kafka configuration
config: |
  auto.create.topics.enable=true
  delete.topic.enable=true
  log.retention.hours=1
  log.retention.bytes=1073741824
  log.segment.bytes=268435456
  num.partitions=3
  default.replication.factor=1
  offsets.topic.replication.factor=1
  transaction.state.log.replication.factor=1
  transaction.state.log.min.isr=1

# Listeners configuration for local access
listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT
  external:
    protocol: PLAINTEXT

# Advertised listeners
advertisedListeners:
  - PLAINTEXT://localhost:9092

# Metrics disabled for local development
metrics:
  kafka:
    enabled: false
  jmx:
    enabled: false

# Health checks
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# Topic configuration for development
provisioning:
  enabled: false
  topics: []
