# Confluent Platform Helm values for local development
# Optimized for fast startup and minimal resource usage

## Zookeeper - Single node for local dev
cp-zookeeper:
  enabled: true
  servers: 1  # Single node for local
  heapOptions: "-Xms256M -Xmx256M"
  persistence:
    enabled: false  # Disable persistence for faster startup
  podDisruptionBudget:
    enabled: false  # Not needed for local dev
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## Kafka - Single broker for local dev
cp-kafka:
  enabled: true
  brokers: 1  # Single broker for local
  heapOptions: "-Xms512M -Xmx512M"
  persistence:
    enabled: false  # Disable persistence for faster startup
  podDisruptionBudget:
    enabled: false  # Not needed for local dev
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  configurationOverrides:
    "offsets.topic.replication.factor": "1"
    "transaction.state.log.replication.factor": "1"
    "transaction.state.log.min.isr": "1"
    "default.replication.factor": "1"
    "min.insync.replicas": "1"

## Disable other Confluent components for local dev
cp-schema-registry:
  enabled: false

cp-kafka-rest:
  enabled: false

cp-kafka-connect:
  enabled: false

cp-ksql-server:
  enabled: false

cp-control-center:
  enabled: false
