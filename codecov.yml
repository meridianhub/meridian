coverage:
  status:
    project:
      default:
        target: 75%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 70%
        informational: false

ignore:
  - "**/*.pb.go"
  - "**/*.pb.validate.go"
  - "**/*_grpc.pb.go"
  - "**/mocks/**"
  - "utilities/**"
  - "frontend/src/api/gen/**"

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true

flags:
  unittests:
    paths:
      - "services/"
      - "shared/"
    carryforward: true
  integration:
    paths:
      - "services/"
      - "shared/"
    carryforward: true
  frontend:
    paths:
      - "frontend/src/"
    carryforward: true
