coverage:
  status:
    project:
      default:
        target: 75%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 70%
        informational: false

ignore:
  - "**/*.pb.go"
  - "**/*.pb.validate.go"
  - "**/*_grpc.pb.go"
  - "**/mocks/**"
  - "utilities/**"
  - "frontend/src/api/gen/**"
  - "services/mcp-server/cmd/wire.go"

comment:
  layout: "condensed_header, condensed_files, components, condensed_footer"
  behavior: default
  require_changes: true
  show_carryforward_flags: true

flags:
  unittests:
    paths:
      - "services/"
      - "shared/"
    carryforward: true
  integration:
    paths:
      - "services/"
      - "shared/"
    carryforward: true
  frontend:
    paths:
      - "frontend/src/"
    carryforward: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
        threshold: 2%
  individual_components:
