# Meridian local development stack
#
# Services:
#   cockroachdb  - CockroachDB single-node (insecure) on port 26257, UI on 8080
#   migrate      - One-shot migration runner; exits 0 when all migrations applied
#   meridian     - Unified binary; starts after migrations complete
#   seed         - One-shot seed runner; creates dev tenant and applies manifest (idempotent)
#   frontend     - Vite dev server with HMR on port 5173
#
# Usage:
#   docker compose -f deploy/dev/docker-compose.yml up
#
# Ports:
#   26257 - CockroachDB SQL (postgres wire protocol)
#   8080  - CockroachDB web UI
#   50051 - meridian gRPC
#   8090  - meridian HTTP gateway
#   5173  - frontend (Vite dev server)

services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v24.1
    command: start-single-node --insecure
    ports:
      - "127.0.0.1:26257:26257"
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - cockroachdb_data:/cockroach/cockroach-data

  migrate:
    build:
      context: ../..
      dockerfile: cmd/meridian/Dockerfile
    command: ["--migrate"]
    depends_on:
      cockroachdb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://root@cockroachdb:26257/defaultdb?sslmode=disable"
    restart: on-failure

  meridian:
    build:
      context: ../..
      dockerfile: cmd/meridian/Dockerfile
    depends_on:
      cockroachdb:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:50051:50051"
      - "127.0.0.1:8090:8090"
    environment:
      AUTH_MODE: disabled
      BILLING_ENABLED: "false"
      DATABASE_URL: "postgres://root@cockroachdb:26257/defaultdb?sslmode=disable"
      ENVIRONMENT: development
      KAFKA_ENABLED: "false"
      LOG_LEVEL: info
      REDIS_ENABLED: "false"

  seed:
    build:
      context: ../..
      dockerfile: cmd/meridian/Dockerfile
    entrypoint: ["/seed-dev"]
    command:
      - "--manifest=/manifests/energy.json"
    depends_on:
      meridian:
        condition: service_started
    environment:
      GATEWAY_URL: "http://meridian:8090"
      GRPC_ADDR: "meridian:50051"
    volumes:
      - ../../examples/manifests:/manifests:ro
    restart: "no"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run generate && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      meridian:
        condition: service_started
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ../../frontend:/app
      - ../../api/proto:/api/proto:ro
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: "http://localhost:8090"

volumes:
  cockroachdb_data:
  frontend_node_modules:
