# Meridian demo deployment stack
#
# Services:
#   postgres    - PostgreSQL 16 (internal only, not exposed to host)
#   meridian    - Unified binary with embedded Dex OIDC; starts after postgres is healthy
#   caddy       - Reverse proxy; exposes 80/443, terminates TLS via Cloudflare Origin Certificate
#   mcp-server  - MCP server for AI integration (internal, proxied via Caddy)
#
# Usage:
#   cp deploy/demo/.env.demo.example /opt/meridian/.env
#   # Edit /opt/meridian/.env with actual values
#   docker compose --env-file /opt/meridian/.env -f /opt/meridian/docker-compose.yml up -d
#
# Directory layout expected on the host:
#   /opt/meridian/.env            - Filled-in environment file
#   /opt/meridian/Caddyfile       - Caddy configuration
#   /opt/meridian/init-databases.sql - Per-service database init (runs on first Postgres boot)
#   /opt/meridian/frontend/       - Built frontend static files (deployed by CI)
#   /opt/meridian/certs/          - Cloudflare Origin Certificate files
#     origin-cert.pem
#     origin-key.pem

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the env file}
      POSTGRES_DB: ${POSTGRES_DB:-meridian}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/meridian/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meridian} -d ${POSTGRES_DB:-meridian}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Not exposed to host — accessed only by meridian on the internal network

  # Dex OIDC is embedded in the meridian binary (no sidecar container needed).
  # See ADR-0036 for rationale.

  meridian:
    image: ${MERIDIAN_IMAGE:-ghcr.io/meridianhub/meridian:demo}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- Application ---
      ENVIRONMENT: ${ENVIRONMENT:-demo}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # --- Database driver ---
      DB_DRIVER: postgres

      # --- Database ---
      # The unified binary derives per-service database names from a single base DSN.
      # Per-service databases are created by init-databases.sql on first Postgres boot.
      DATABASE_URL: postgres://${POSTGRES_USER:-meridian}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the env file}@postgres:5432/${POSTGRES_DB:-meridian}?sslmode=disable

      # --- Authentication (embedded Dex OIDC server) ---
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      DEX_ISSUER: ${DEX_ISSUER:-https://${BASE_DOMAIN:-demo.meridianhub.cloud}/dex}
      DEX_BASE_DOMAIN: ${BASE_DOMAIN:-demo.meridianhub.cloud}
      API_KEYS: ${API_KEYS:-}
      BASE_DOMAIN: ${BASE_DOMAIN:-demo.meridianhub.cloud}
      LOCAL_DEV_MODE: ${LOCAL_DEV_MODE:-false}

      # --- Demo users (identity bootstrap) ---
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-}
      DEMO_OPERATOR_EMAIL: ${DEMO_OPERATOR_EMAIL:-}
      DEMO_OPERATOR_PASSWORD: ${DEMO_OPERATOR_PASSWORD:-}
      DEMO_OPERATOR_TENANT: ${DEMO_OPERATOR_TENANT:-}

      # --- Feature flags ---
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      SCHEMA_PROVISIONING_ENABLED: ${SCHEMA_PROVISIONING_ENABLED:-true}

      # --- Multi-tenancy ---
      MASTER_TENANT_ID: ${MASTER_TENANT_ID:-meridian_master}

      # --- Clearing accounts ---
      DEPOSIT_CLEARING_ACCOUNT_ID: ${DEPOSIT_CLEARING_ACCOUNT_ID:-}

      # --- Connection pool ---
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-5m}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-10m}
    # Note: The meridian image uses gcr.io/distroless/static-debian12 (no shell,
    # no wget), so a CMD-SHELL healthcheck cannot run. Health is monitored via
    # the gRPC health check service on port 50051. Caddy uses service_started
    # and retries upstream connections itself during meridian startup.
    # Not exposed to host — accessed only by caddy on the internal network

  mcp-server:
    image: ${MERIDIAN_IMAGE:-ghcr.io/meridianhub/meridian:demo}
    entrypoint: ["/mcp-server"]
    restart: unless-stopped
    depends_on:
      meridian:
        condition: service_started
    environment:
      # --- MCP Transport ---
      MCP_TRANSPORT: http
      MCP_PORT: "8090"
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-meridian-mcp}
      MCP_BASE_URL: ${MCP_BASE_URL:?MCP_BASE_URL must be set in the env file (e.g. https://your-domain)}

      # --- Meridian API ---
      MERIDIAN_API_URL: meridian:50051
      MERIDIAN_API_KEY: ${MERIDIAN_API_KEY:?MERIDIAN_API_KEY must be set in the env file}

      # --- Application ---
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # --- OAuth 2.1 + OIDC (optional) ---
      MCP_OAUTH_ENABLED: ${MCP_OAUTH_ENABLED:-false}
      MCP_OAUTH_CLIENT_ID: ${MCP_OAUTH_CLIENT_ID:-meridian-mcp}
      MCP_BASE_DOMAIN: ${BASE_DOMAIN:-}

      # --- Tenant defaults (single-tenant demo mode) ---
      MCP_DEFAULT_TENANT_SLUG: ${MCP_DEFAULT_TENANT_SLUG:-}       # e.g. "volterra" — used when no tenant subdomain is present

      # --- Dex OIDC (delegates authentication to embedded Dex when MCP_OAUTH_ENABLED=true) ---
      MCP_DEX_ISSUER_URL: ${MCP_DEX_ISSUER_URL:-}                 # e.g. https://demo.meridianhub.cloud/dex (Dex is embedded in meridian binary)
      MCP_DEX_CLIENT_ID: ${MCP_DEX_CLIENT_ID:-meridian-service}   # Dex static client ID
      MCP_DEX_CALLBACK_URL: ${MCP_DEX_CALLBACK_URL:-}             # e.g. https://demo.meridianhub.cloud/oauth/callback

      # --- JWT signing (shared with BFF for session interoperability) ---
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
      JWT_SIGNING_KEY_ID: ${JWT_SIGNING_KEY_ID:-meridian-1}
      JWT_SIGNING_ISSUER: ${JWT_SIGNING_ISSUER:-meridian}

      # --- Bearer token validation ---
      MCP_JWKS_URL: ${MCP_JWKS_URL:-}                             # e.g. https://demo.meridianhub.cloud/api/auth/jwks
    # Not exposed to host — accessed only by caddy on the internal network
    # Caddy proxies /mcp to this container

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      meridian:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/meridian/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/meridian/certs:/etc/caddy/certs:ro
      - /opt/meridian/frontend:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
