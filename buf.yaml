version: v2
modules:
  - path: api/proto
deps:
  - buf.build/bufbuild/protovalidate
  - buf.build/googleapis/googleapis
  - buf.build/grpc-ecosystem/grpc-gateway
lint:
  use:
    # Core categories for comprehensive linting
    - MINIMAL        # Minimal set of critical rules (package checks)
    - BASIC          # Basic proto style (field casing, enum zero values, etc.)
    - STANDARD       # Standard buf lint rules (includes BASIC + additional rules)
    - COMMENTS       # Comment formatting and requirements for all proto elements
    - UNARY_RPC      # Enforce unary RPC patterns (no streaming)
  except:
    # Development exceptions - will be removed for production
    - PACKAGE_VERSION_SUFFIX  # Allow packages without version suffix during initial development
  # Strict enforcement of naming conventions and proto style
  enum_zero_value_suffix: _UNSPECIFIED
  rpc_allow_same_request_response: false
  rpc_allow_google_protobuf_empty_requests: true
  rpc_allow_google_protobuf_empty_responses: true
  service_suffix: Service

breaking:
  use:
    - FILE           # File-level breaking change detection
    - WIRE_JSON      # Wire and JSON compatibility
    - WIRE           # Wire-level compatibility only
  except:
    - EXTENSION_MESSAGE_NO_DELETE  # Allow during initial development
  ignore:
    # Intentional breaking change: Multi-asset support (internal-account task 19)
    # Changes: currency → instrument_code, MoneyAmount → InstrumentAmount
    # All consumers updated in this PR - see services/current-account/service/lien_service.go
    - api/proto/meridian/position_keeping/v1/position_keeping.proto
    # Intentional breaking change: ValuationFeature extraction (valuation-engine task 12)
    # Types moved from current_account.proto to shared valuation_feature/v1/ package
    - api/proto/meridian/current_account/v1/current_account.proto
    # Intentional breaking change: Service rename (asset-agnostic-accounts task 6)
    # Package renamed from internal_bank_account to internal_account
    # All consumers updated in this PR
    - api/proto/meridian/internal_bank_account/v1/internal_bank_account.proto
  ignore_unstable_packages: true
