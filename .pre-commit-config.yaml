# Pre-commit hooks for Meridian project
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # Protobuf validation with buf
  - repo: https://github.com/bufbuild/buf
    rev: v1.47.2
    hooks:
      - id: buf-lint
        name: Lint protobuf files
        description: Run buf lint to validate protobuf style and correctness
        files: \.proto$

      - id: buf-breaking
        name: Check for breaking proto changes
        description: Run buf breaking to detect incompatible schema changes
        files: \.proto$
        args: ['--against', '.git#branch=develop']
        # Only run on branches (skip if develop branch doesn't exist locally)
        stages: [pre-commit]

  # Go formatting and linting
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.62.2
    hooks:
      - id: golangci-lint
        name: golangci-lint
        description: Fast linters runner for Go
        entry: golangci-lint run --fix
        types: [go]
        language: system
        pass_filenames: false

  # General file quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]

      - id: end-of-file-fixer
        name: Fix end of files

      - id: check-yaml
        name: Check YAML syntax
        args: [--unsafe]  # Allow custom YAML tags

      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=500]

      - id: check-merge-conflict
        name: Check for merge conflicts

      - id: detect-private-key
        name: Detect private keys

  # Markdown formatting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        name: Lint markdown files
        args: [--fix, --disable, MD013, MD033, MD041]
        # MD013: Line length
        # MD033: Inline HTML
        # MD041: First line in file should be top-level heading

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] Auto-fix from pre-commit hooks
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] Update pre-commit hook versions'
