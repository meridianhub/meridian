instruments:
  - code: TOKEN
    name: Compute Token
    type: INSTRUMENT_TYPE_COMMODITY
    dimensions:
      unit: tokens
      precision: 0

sagas:
  - name: dynamic_capacity_billing
    trigger: "event:position-keeping.transaction-captured.v1"
    filter: "event.instrument_code == 'TOKEN' && event.direction == 'DEBIT'"
