accountTypes:
  - code: CUSTOMER_CURRENT
    name: Customer Current Account
    normalBalance: NORMAL_BALANCE_DEBIT
    allowedInstruments: [GBP, USD, EUR]
    policies:
      validation: "amount > 0"
      bucketing: ""
  - code: PAYMENT_CLEARING
    name: Payment Clearing Account
    normalBalance: NORMAL_BALANCE_CREDIT
    allowedInstruments: [GBP, USD, EUR]
    policies:
      validation: ""
      bucketing: ""

sagas:
  - name: stripe_payment_via_gateway
    trigger: "api:/v1/payments/stripe"
  - name: stripe_payment_received
    trigger: "webhook:stripe.payment_intent.succeeded"

# Payment collection uses the Financial Gateway, not the Operational Gateway.
# The Financial Gateway provides typed payment APIs
# (financial_gateway.dispatch_payment) with built-in Stripe integration
# and payment lifecycle management.
#
# The Operational Gateway is for general-purpose external provider
# integrations (APIs, webhooks, MQTT, AMQP) and explicitly rejects
# payment.* instruction types.
#
# See stripe_payment_via_gateway.star for financial_gateway.dispatch_payment()
# usage. stripe_payment_received.star is a webhook handler that records
# confirmed payments in the ledger (no gateway dispatch needed).
paymentRails:
  - provider: stripe
    mode: CONNECT_MODE_STANDARD
    accountId: "acct_REPLACE_WITH_REAL_ID"
    webhookEndpointSecret: "sm://stripe/webhook_secret"
    payoutSchedule: PAYOUT_SCHEDULE_DAILY
    supportedMethods: [card]
