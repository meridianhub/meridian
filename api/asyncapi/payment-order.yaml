          correlation_id:
            type: string
            format: uuid
            description: Links related events across services
          tenant_id:
            type: string
            description: Tenant identifier for multi-tenant isolation
      payload:
        $ref: '#/components/schemas/PaymentOrderCancelled'
    PaymentOrderReversed:
      name: "PaymentOrderReversed"
      title: "PaymentOrderReversed"
      description: "Published when a completed payment order is reversed"
      contentType: application/protobuf
      bindings:
        kafka:
          key:
            type: string
            description: "payment_order_id"
      headers:
        type: object
        properties:
          event_type:
            type: string
            description: Logical event type identifier
          correlation_id:
            type: string
            format: uuid
            description: Links related events across services
          tenant_id:
            type: string
            description: Tenant identifier for multi-tenant isolation
      payload:
        $ref: '#/components/schemas/PaymentOrderReversed'
  schemas:
    PaymentOrderInitiated:
      type: object
      description: "Derived from protobuf message meridian.events.v1.PaymentOrderInitiatedEvent"
      properties:
        event_id:
          type: string
        payment_order_id:
          type: string
        debtor_account_id:
          type: string
        creditor_reference:
          type: string
        amount:
          type: string
        correlation_id:
          type: string
        causation_id:
          type: string
        timestamp:
          type: string
        version:
          type: integer
        idempotency_key:
          type: string
