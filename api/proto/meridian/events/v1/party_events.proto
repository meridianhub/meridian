syntax = "proto3";

package meridian.events.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/events/v1;eventsv1";

// PartyCreatedEvent is published when a new party is registered in the system.
// Consumers can use this event to react to new party creation, such as
// initialising downstream records or triggering onboarding workflows.
message PartyCreatedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // party_id identifies the newly created party
  string party_id = 2 [(buf.validate.field).string = {
    uuid: true
  }];

  // party_type identifies the classification of the party (e.g., "INDIVIDUAL", "ORGANISATION")
  string party_type = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // legal_name is the registered legal name of the party
  string legal_name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // status is the initial lifecycle status of the party
  string status = 5 [(buf.validate.field).string = {
    max_len: 50
  }];

  // correlation_id links related events across services
  string correlation_id = 6 [(buf.validate.field).string = {
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 7 [(buf.validate.field).string = {
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 8 [(buf.validate.field).required = true];
}

// PartyUpdatedEvent is published when an existing party's details are modified.
// Consumers can use this event to synchronise derived records with updated party data.
message PartyUpdatedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // party_id identifies the party that was updated
  string party_id = 2 [(buf.validate.field).string = {
    uuid: true
  }];

  // party_type identifies the classification of the party
  string party_type = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // status is the current lifecycle status of the party after the update
  string status = 4 [(buf.validate.field).string = {
    max_len: 50
  }];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 6 [(buf.validate.field).string = {
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 7 [(buf.validate.field).required = true];
}

// PartyControlledEvent is published when a control action is applied to a party
// (e.g., SUSPEND, TERMINATE, REACTIVATE). Downstream services can use this event
// to react to party lifecycle changes, such as freezing linked accounts when a
// party is terminated.
message PartyControlledEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // party_id identifies the party that was controlled
  string party_id = 2 [(buf.validate.field).string = {
    uuid: true
  }];

  // control_action is the action applied (e.g., "SUSPEND", "TERMINATE", "REACTIVATE")
  string control_action = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // new_status is the party's status after the control action
  string new_status = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // reason explains why the control action was taken
  string reason = 5 [(buf.validate.field).string = {
    max_len: 1000
  }];

  // actor_id identifies who performed the control action
  string actor_id = 6 [(buf.validate.field).string = {
    max_len: 255
  }];

  // correlation_id links related events across services
  string correlation_id = 7 [(buf.validate.field).string = {
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 8 [(buf.validate.field).string = {
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 9 [(buf.validate.field).required = true];
}

// PartyVerificationCompletedEvent is published when a KYC/AML verification
// transitions to a terminal state (APPROVED, REJECTED, or MANUAL_REVIEW).
// This event enables downstream services to react to verification outcomes,
// such as updating party status or triggering additional workflows.
message PartyVerificationCompletedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // party_id identifies the party that was verified
  string party_id = 2 [(buf.validate.field).string = {
    uuid: true
  }];

  // verification_id is the provider's external verification identifier
  string verification_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // provider identifies the KYC/AML provider (e.g., "onfido", "jumio")
  string provider = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // status is the terminal verification status
  // Valid values: APPROVED, REJECTED, MANUAL_REVIEW
  string status = 5 [(buf.validate.field).string = {
    in: ["APPROVED", "REJECTED", "MANUAL_REVIEW"]
  }];

  // risk_score from the provider, normalized to 0.0-1.0 range (optional)
  // Higher scores indicate higher risk
  optional double risk_score = 6 [(buf.validate.field).double = {
    gte: 0.0
    lte: 1.0
  }];

  // reason provides context for the verification outcome (optional)
  optional string reason = 7 [(buf.validate.field).string = {
    max_len: 1000
  }];

  // completed_at is when the verification reached terminal state
  google.protobuf.Timestamp completed_at = 8 [(buf.validate.field).required = true];

  // correlation_id links related events across services
  string correlation_id = 9 [(buf.validate.field).string = {
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 10 [(buf.validate.field).string = {
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 11 [(buf.validate.field).required = true];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 12 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for provider-specific data and debugging
  map<string, string> metadata = 13;
}
