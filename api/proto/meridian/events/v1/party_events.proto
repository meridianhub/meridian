syntax = "proto3";

package meridian.events.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/events/v1;eventsv1";

// PartyVerificationCompletedEvent is published when a KYC/AML verification
// transitions to a terminal state (APPROVED, REJECTED, or MANUAL_REVIEW).
// This event enables downstream services to react to verification outcomes,
// such as updating party status or triggering additional workflows.
message PartyVerificationCompletedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // party_id identifies the party that was verified
  string party_id = 2 [(buf.validate.field).string = {
    uuid: true
  }];

  // verification_id is the provider's external verification identifier
  string verification_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // provider identifies the KYC/AML provider (e.g., "onfido", "jumio")
  string provider = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // status is the terminal verification status
  // Valid values: APPROVED, REJECTED, MANUAL_REVIEW
  string status = 5 [(buf.validate.field).string = {
    in: ["APPROVED", "REJECTED", "MANUAL_REVIEW"]
  }];

  // risk_score from the provider, normalized to 0.0-1.0 range (optional)
  // Higher scores indicate higher risk
  optional double risk_score = 6 [(buf.validate.field).double = {
    gte: 0.0
    lte: 1.0
  }];

  // reason provides context for the verification outcome (optional)
  optional string reason = 7 [(buf.validate.field).string = {
    max_len: 1000
  }];

  // completed_at is when the verification reached terminal state
  google.protobuf.Timestamp completed_at = 8 [(buf.validate.field).required = true];

  // correlation_id links related events across services
  string correlation_id = 9 [(buf.validate.field).string = {
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 10 [(buf.validate.field).string = {
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 11 [(buf.validate.field).required = true];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 12 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for provider-specific data and debugging
  map<string, string> metadata = 13;
}
