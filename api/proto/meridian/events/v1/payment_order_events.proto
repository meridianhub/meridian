syntax = "proto3";

package meridian.events.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/events/v1;eventsv1";

// PaymentOrderInitiatedEvent is published when a payment order is created.
// This triggers the saga to reserve funds via a lien on the debtor account.
message PaymentOrderInitiatedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // payment_order_id is the unique identifier for this payment order.
  string payment_order_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // debtor_account_id is the internal account ID from which funds are debited.
  string debtor_account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // creditor_reference is the external account identifier (IBAN format).
  string creditor_reference = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 34
    pattern: "^[A-Z]{2}[0-9]{2}[A-Z0-9]{1,30}$"
  }];

  // amount is the payment amount.
  meridian.common.v1.MoneyAmount amount = 5 [(buf.validate.field).required = true];

  // correlation_id links related events across services
  string correlation_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 8 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 9 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 10 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 11;
}

// PaymentOrderReservedEvent is published when funds have been reserved via a lien.
// This triggers the saga to send the payment to the external gateway.
message PaymentOrderReservedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // payment_order_id is the unique identifier for this payment order.
  string payment_order_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // debtor_account_id is the internal account ID from which funds are debited.
  string debtor_account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // lien_id references the reservation created in CurrentAccount.
  string lien_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the reserved amount.
  meridian.common.v1.MoneyAmount amount = 5 [(buf.validate.field).required = true];

  // correlation_id links related events across services
  string correlation_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 8 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 9 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 10 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 11;
}

// PaymentOrderExecutingEvent is published when a payment has been sent to the gateway.
// The saga now awaits an async callback from the gateway.
message PaymentOrderExecutingEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // payment_order_id is the unique identifier for this payment order.
  string payment_order_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // gateway_reference_id is the external ID from the payment gateway.
  string gateway_reference_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // correlation_id links related events across services
  string correlation_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 7 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 8 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 9;
}

// PaymentOrderCompletedEvent is published when a payment order is successfully settled.
// This triggers ledger booking via FinancialAccounting and releases the lien.
message PaymentOrderCompletedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // payment_order_id is the unique identifier for this payment order.
  string payment_order_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // debtor_account_id is the internal account ID from which funds were debited.
  string debtor_account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the payment amount.
  meridian.common.v1.MoneyAmount amount = 4 [(buf.validate.field).required = true];

  // lien_id references the reservation that was executed.
  string lien_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // gateway_reference_id is the external ID from the payment gateway.
  string gateway_reference_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // ledger_booking_id references the FinancialAccounting booking log.
  string ledger_booking_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // correlation_id links related events across services
  string correlation_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 10 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 11 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 12 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 13;
}

// PaymentOrderFailedEvent is published when a payment order fails at any stage.
// This triggers compensation (e.g., releasing the lien if reserved).
message PaymentOrderFailedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // payment_order_id is the unique identifier for this payment order.
  string payment_order_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // debtor_account_id is the internal account ID.
  string debtor_account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the payment amount.
  meridian.common.v1.MoneyAmount amount = 4 [(buf.validate.field).required = true];

  // failure_reason describes why the payment failed.
  string failure_reason = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 1000
  }];

  // error_code provides a machine-readable error identifier.
  string error_code = 6 [(buf.validate.field).string = {
    max_len: 50
  }];

  // failed_at_status indicates which saga stage the failure occurred.
  string failed_at_status = 7 [(buf.validate.field).string = {
    in: ["INITIATED", "RESERVED", "EXECUTING"]
  }];

  // lien_id references the reservation to be released (if applicable).
  string lien_id = 8 [(buf.validate.field).string = {
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 10 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 11 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 12 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 13 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 14;
}

// PaymentOrderCancelledEvent is published when a payment order is cancelled.
// This triggers compensation to release the lien if funds were reserved.
message PaymentOrderCancelledEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // payment_order_id is the unique identifier for this payment order.
  string payment_order_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // debtor_account_id is the internal account ID.
  string debtor_account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the payment amount (included for complete audit record).
  meridian.common.v1.MoneyAmount amount = 4 [(buf.validate.field).required = true];

  // cancellation_reason explains why the payment was cancelled.
  string cancellation_reason = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // cancelled_by identifies who cancelled the payment.
  string cancelled_by = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // lien_id references the reservation to be released (if applicable).
  string lien_id = 7 [(buf.validate.field).string = {
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 10 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 11 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 12 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 13;
}

// PaymentOrderReversedEvent is published when a completed payment order is reversed.
// This is used for post-completion compensation (e.g., refunds, chargebacks).
// Triggers compensating ledger entries in FinancialAccounting.
message PaymentOrderReversedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // payment_order_id is the unique identifier for this payment order.
  string payment_order_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // debtor_account_id is the internal account ID that was originally debited.
  string debtor_account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the original payment amount being reversed.
  meridian.common.v1.MoneyAmount amount = 4 [(buf.validate.field).required = true];

  // reversal_reason explains why the payment was reversed.
  string reversal_reason = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // reversed_by identifies who initiated the reversal.
  string reversed_by = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // original_ledger_booking_id references the original FinancialAccounting booking.
  string original_ledger_booking_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // compensating_ledger_booking_id references the new compensating booking.
  string compensating_ledger_booking_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // correlation_id links related events across services
  string correlation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 10 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 11 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 12 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 13 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 14;
}
