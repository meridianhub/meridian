syntax = "proto3";

package meridian.events.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/error.proto";
import "meridian/quantity/v1/quantity.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/events/v1;eventsv1";

// TransactionCapturedEvent represents a new financial position log entry captured
// in the position keeping system. This is published when a transaction is first
// recorded in the system (draft state).
message TransactionCapturedEvent {
  // log_id uniquely identifies the financial position log
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this transaction affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // transaction_id identifies the transaction being captured
  string transaction_id = 3 [(buf.validate.field).string = {uuid: true}];

  // amount_cents is the transaction amount in cents (or smallest currency unit)
  int64 amount_cents = 4 [(buf.validate.field).int64 = {gt: 0}];

  // instrument_code is the ISO 4217 currency code or other instrument identifier (e.g., "GBP", "USD").
  // Replaces the deprecated currency enum field.
  string instrument_code = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // direction indicates debit or credit
  string direction = 6 [(buf.validate.field).string = {
    in: [
      "DEBIT",
      "CREDIT"
    ]
  }];

  // source indicates where the transaction originated
  string source = 7 [(buf.validate.field).string = {
    in: [
      "MANUAL",
      "AUTOMATED",
      "IMPORTED",
      "RECONCILIATION",
      "ADJUSTMENT",
      "CURRENT_ACCOUNT",
      "FINANCIAL_ACCOUNTING"
    ]
  }];

  // description provides human-readable context
  string description = 8 [(buf.validate.field).string = {max_len: 500}];

  // reference is an external reference identifier
  string reference = 9 [(buf.validate.field).string = {max_len: 100}];

  // correlation_id links related events across services
  string correlation_id = 10 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 11 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 12 [(buf.validate.field).int64 = {gte: 1}];

  // instrument_amount is the multi-asset representation of the transaction amount.
  // This field provides full instrument metadata (code, version, precision) for
  // the Universal Asset System. For monetary transactions, amount_cents and currency
  // fields above are also populated for backward compatibility.
  meridian.quantity.v1.InstrumentAmount instrument_amount = 13;
}

// TransactionAmendedEvent represents an amendment to an existing transaction.
// Published when a reconciled transaction is amended before posting.
message TransactionAmendedEvent {
  // log_id uniquely identifies the financial position log being amended
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this transaction affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // reason for the amendment
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // amended_by identifies who made the amendment
  string amended_by = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 7 [(buf.validate.field).int64 = {gte: 1}];
}

// TransactionReconciledEvent represents a transaction that has been reconciled
// against external records. Published when reconciliation is complete.
message TransactionReconciledEvent {
  // log_id uniquely identifies the financial position log
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this transaction affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // reconciliation_status indicates the reconciliation outcome
  string reconciliation_status = 3 [(buf.validate.field).string = {
    in: [
      "unreconciled",
      "auto_reconciled",
      "manually_reconciled",
      "reconciled_with_discrepancy"
    ]
  }];

  // reason provides context for the reconciliation
  string reason = 4 [(buf.validate.field).string = {max_len: 500}];

  // reconciled_by identifies who performed reconciliation
  string reconciled_by = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 7 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 8 [(buf.validate.field).int64 = {gte: 1}];
}

// TransactionPostedEvent represents a transaction that has been posted to the
// general ledger. This is a final state - no further modifications are allowed.
message TransactionPostedEvent {
  // log_id uniquely identifies the financial position log
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this transaction affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // posting_reference is the ledger posting reference
  string posting_reference = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // reason provides context for posting
  string reason = 4 [(buf.validate.field).string = {max_len: 500}];

  // posted_by identifies who posted the transaction
  string posted_by = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 7 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 8 [(buf.validate.field).int64 = {gte: 1}];
}

// TransactionRejectedEvent represents a transaction that was rejected during
// validation or processing. Terminal state.
message TransactionRejectedEvent {
  // log_id uniquely identifies the financial position log
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this transaction affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // reason explains why the transaction was rejected
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // rejected_by identifies who rejected the transaction
  string rejected_by = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 7 [(buf.validate.field).int64 = {gte: 1}];
}

// TransactionFailedEvent represents a transaction that failed during processing.
// Published when technical failures occur.
message TransactionFailedEvent {
  // log_id uniquely identifies the financial position log
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this transaction affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // failure_reason explains the technical failure
  string failure_reason = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // error_code provides a machine-readable error identifier (deprecated, use error_code_enum)
  string error_code = 4 [deprecated = true];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 7 [(buf.validate.field).int64 = {gte: 1}];

  // error_code_enum provides a machine-readable error identifier
  meridian.common.v1.ErrorCode error_code_enum = 8 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// TransactionCancelledEvent represents a transaction that was cancelled.
// Published when a transaction is cancelled before posting.
message TransactionCancelledEvent {
  // log_id uniquely identifies the financial position log
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this transaction affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // reason explains why the transaction was cancelled
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // cancelled_by identifies who cancelled the transaction
  string cancelled_by = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 7 [(buf.validate.field).int64 = {gte: 1}];
}

// OpeningBalanceRecordedEvent represents an opening balance recorded during
// account migration. Published when a legacy account is migrated with an initial
// balance without full transaction history.
message OpeningBalanceRecordedEvent {
  // log_id uniquely identifies the financial position log created
  string log_id = 1 [(buf.validate.field).string = {uuid: true}];

  // account_id identifies the account this opening balance affects
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // amount_cents is the opening balance amount in cents (or smallest currency unit)
  // May be negative for overdrawn accounts
  int64 amount_cents = 3;

  // instrument_code is the ISO 4217 currency code or other instrument identifier (e.g., "GBP", "USD").
  // Replaces the deprecated currency enum field.
  string instrument_code = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // effective_date is when the opening balance becomes effective
  google.protobuf.Timestamp effective_date = 5 [(buf.validate.field).required = true];

  // migration_reference identifies the migration source or batch
  string migration_reference = 6 [(buf.validate.field).string = {max_len: 255}];

  // correlation_id links related events across services
  string correlation_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 8 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 9 [(buf.validate.field).int64 = {gte: 1}];

  // instrument_amount is the multi-asset representation of the opening balance.
  // This field provides full instrument metadata (code, version, precision) for
  // the Universal Asset System.
  meridian.quantity.v1.InstrumentAmount instrument_amount = 10;
}

// BulkTransactionCapturedEvent represents multiple transactions captured
// in a single batch operation. Useful for bulk imports or batch reconciliation.
message BulkTransactionCapturedEvent {
  // batch_id uniquely identifies this batch operation
  string batch_id = 1 [(buf.validate.field).string = {uuid: true}];

  // transaction_count is the number of transactions in this batch
  int32 transaction_count = 2 [(buf.validate.field).int32 = {gte: 1}];

  // log_ids lists all financial position logs created in this batch
  repeated string log_ids = 3 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 10000
  }];

  // source indicates where the bulk operation originated
  string source = 4 [(buf.validate.field).string = {
    in: [
      "MANUAL",
      "AUTOMATED",
      "IMPORTED",
      "RECONCILIATION",
      "ADJUSTMENT",
      "CURRENT_ACCOUNT",
      "FINANCIAL_ACCOUNTING"
    ]
  }];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];

  // version supports optimistic concurrency control
  int64 version = 7 [(buf.validate.field).int64 = {gte: 1}];
}
