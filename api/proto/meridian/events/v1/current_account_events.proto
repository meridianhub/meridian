syntax = "proto3";

package meridian.events.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";
import "meridian/quantity/v1/quantity.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/events/v1;eventsv1";

// AccountCreatedEvent represents a new current account facility created
// in the system. Published when an account is successfully initiated.
// This is the first event in an account's lifecycle.
message AccountCreatedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id uniquely identifies the current account facility
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_identification is the IBAN or account number
  string account_identification = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 34  // IBAN max length
  }];

  // base_instrument_code is the account's base instrument code (e.g., "GBP", "USD").
  // Replaces the deprecated base_currency enum field.
  string base_instrument_code = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // account_status is the initial status (typically ACTIVE)
  string account_status = 5 [(buf.validate.field).string = {
    in: ["ACTIVE", "FROZEN", "CLOSED", "SUSPENDED"]
  }];

  // product_reference identifies the account product type
  string product_reference = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // customer_reference identifies the account owner
  string customer_reference = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // created_by identifies who created the account
  string created_by = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 10 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 11 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 12 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 13 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 14;
}

// AccountStatusChangedEvent represents a status transition for an account
// (e.g., ACTIVE -> FROZEN, FROZEN -> ACTIVE, ACTIVE -> CLOSED).
// Published when account status changes due to administrative action.
message AccountStatusChangedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id uniquely identifies the current account facility
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // previous_status is the status before this change
  string previous_status = 3 [(buf.validate.field).string = {
    in: ["ACTIVE", "FROZEN", "CLOSED", "SUSPENDED"]
  }];

  // new_status is the status after this change
  string new_status = 4 [(buf.validate.field).string = {
    in: ["ACTIVE", "FROZEN", "CLOSED", "SUSPENDED"]
  }];

  // reason explains why the status changed
  string reason = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // changed_by identifies who made the status change
  string changed_by = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 9 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 10 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 11 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 12;
}

// AccountFrozenEvent represents a temporary suspension of an account facility.
// Published when an account transitions from ACTIVE to FROZEN status.
// This is a reversible operation - the account can be unfrozen later.
message AccountFrozenEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id uniquely identifies the current account facility
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // reason explains why the account was frozen
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // frozen_at is the timestamp when the account was frozen
  google.protobuf.Timestamp frozen_at = 4 [(buf.validate.field).required = true];

  // frozen_by identifies who froze the account
  string frozen_by = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 8 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 9 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 10 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 11;
}

