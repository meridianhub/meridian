  google.protobuf.Timestamp unfrozen_at = 3 [(buf.validate.field).required = true];

  // unfrozen_by identifies who unfroze the account
  string unfrozen_by = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 7 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 8 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 9 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 10;
}

// AccountClosedEvent represents a terminal state where an account facility
// is permanently closed. This is an irreversible operation.
message AccountClosedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id uniquely identifies the current account facility
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // closing_balance is the final balance at closure (no sign constraint - can be negative)
  meridian.quantity.v1.InstrumentAmount closing_balance = 3 [(buf.validate.field).required = true];

  // closure_reason explains why the account was closed
  string closure_reason = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // closed_by identifies who closed the account
  string closed_by = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // closure_date is the effective date of closure
  google.protobuf.Timestamp closure_date = 6 [(buf.validate.field).required = true];

  // correlation_id links related events across services
  string correlation_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 9 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 10 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 11 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 12;
}

// TransactionInitiatedEvent represents a transaction initiated on a current account.
// Published by CurrentAccount service after validating the transaction request
// but before the transaction is processed by downstream services.
// This event triggers FinancialAccounting to create booking logs and
// PositionKeeping to update transaction logs.
message TransactionInitiatedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id identifies the account affected by this transaction
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // transaction_id uniquely identifies this transaction
  string transaction_id = 3 [(buf.validate.field).string = {
    uuid: true
  }];

  // transaction_type indicates the type of transaction
  string transaction_type = 4 [(buf.validate.field).string = {
    in: ["DEPOSIT", "WITHDRAWAL", "TRANSFER", "FEE", "INTEREST", "ADJUSTMENT"]
  }];

  // transaction_amount is the amount being transacted (must be positive)
  meridian.quantity.v1.InstrumentAmount transaction_amount = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "positive_transaction_amount"
      message: "transaction amount must be greater than zero"
      expression: "this.amount.matches('^[1-9][0-9]*(\\\\.[0-9]+)?$') || this.amount.matches('^0\\\\.[0-9]*[1-9][0-9]*$')"
    }
  ];

  // posting_direction indicates debit or credit
  meridian.common.v1.PostingDirection posting_direction = 6 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // value_date is the effective date for this transaction
  google.protobuf.Timestamp value_date = 7 [(buf.validate.field).required = true];

  // description provides human-readable context
  string description = 8 [(buf.validate.field).string = {
    max_len: 500
  }];

  // reference is an external reference identifier
  string reference = 9 [(buf.validate.field).string = {
    max_len: 100
  }];

  // initiated_by identifies who initiated the transaction
  string initiated_by = 10 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 11 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 12 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 13 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 14 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 15 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 16;
}

// TransactionCompletedEvent represents a transaction that has been successfully
// processed by all downstream services (FinancialAccounting and PositionKeeping).
// This is published by CurrentAccount service after receiving confirmation
// from both downstream services.
message TransactionCompletedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id identifies the account affected by this transaction
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // transaction_id uniquely identifies this transaction
  string transaction_id = 3 [(buf.validate.field).string = {
    uuid: true
  }];

  // booking_log_id references the financial accounting booking log
  string booking_log_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // position_log_id references the position keeping position log
  string position_log_id = 5 [(buf.validate.field).string = {
    uuid: true
  }];

  // new_balance is the account balance after this transaction (no sign constraint - can be negative for overdraft)
  meridian.quantity.v1.InstrumentAmount new_balance = 6 [(buf.validate.field).required = true];

  // new_available_balance is the available balance after this transaction (no sign constraint - can be negative for overdraft)
  meridian.quantity.v1.InstrumentAmount new_available_balance = 7 [(buf.validate.field).required = true];

  // completion_reason provides context for completion
  string completion_reason = 8 [(buf.validate.field).string = {
    max_len: 500
  }];

  // correlation_id links related events across services
  string correlation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 10 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 11 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 12 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 13 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 14;
}

// AccountTransactionFailedEvent represents an account transaction that failed during orchestration.
// Published when either FinancialAccounting or PositionKeeping rejects the transaction
// or when a technical failure occurs during saga orchestration.
// Note: Distinct from PositionKeeping's TransactionFailedEvent which is position-specific.
message AccountTransactionFailedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id identifies the account affected by this transaction
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // transaction_id uniquely identifies this transaction
  string transaction_id = 3 [(buf.validate.field).string = {
    uuid: true
  }];

  // failure_reason explains why the transaction failed
  string failure_reason = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // error_code provides a machine-readable error identifier
  string error_code = 5 [(buf.validate.field).string = {
    max_len: 50
  }];

  // failed_service indicates which service reported the failure
  string failed_service = 6 [(buf.validate.field).string = {
    in: ["CURRENT_ACCOUNT", "FINANCIAL_ACCOUNTING", "POSITION_KEEPING"]
  }];

  // correlation_id links related events across services
  string correlation_id = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 9 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 10 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 11 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 12;
}

// WithdrawalStatusUpdatedEvent represents a status change for a withdrawal
// on a current account. Published when a withdrawal transitions to a new
// status (e.g., COMPLETED) via the outbox pattern for reliable delivery.
message WithdrawalStatusUpdatedEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // withdrawal_id identifies the withdrawal being updated
  string withdrawal_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // account_id identifies the account associated with the withdrawal
  string account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // status is the new withdrawal status
  string status = 4 [(buf.validate.field).string = {
    in: ["INITIATED", "PENDING", "COMPLETED", "FAILED", "CANCELLED"]
  }];

  // correlation_id links related events across services
  string correlation_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 7 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 8 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 9 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 10;
}

// OverdraftConfiguredEvent represents configuration or update of overdraft
// facility for an account. Published when overdraft limits are set or changed.
message OverdraftConfiguredEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id identifies the account being configured
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // overdraft_enabled indicates if overdraft is active
  bool overdraft_enabled = 3;

  // overdraft_limit is the maximum overdraft amount allowed (must be non-negative)
  meridian.quantity.v1.InstrumentAmount overdraft_limit = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "non_negative_overdraft_limit"
      message: "overdraft limit must be greater than or equal to zero"
      expression: "this.amount.matches('^[0-9]+(\\\\.[0-9]+)?$')"
    }
  ];

  // previous_limit is the overdraft limit before this change (optional, non-negative)
  meridian.quantity.v1.InstrumentAmount previous_limit = 5 [
    (buf.validate.field).cel = {
      id: "non_negative_previous_limit"
      message: "previous limit must be greater than or equal to zero"
      expression: "this.amount.matches('^[0-9]+(\\\\.[0-9]+)?$')"
    }
  ];

  // interest_rate is the annual interest rate for overdraft (basis points)
  int32 interest_rate_basis_points = 6 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100000  // Max 1000% (100000 basis points)
  }];

  // configured_by identifies who configured the overdraft
  string configured_by = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // correlation_id links related events across services
  string correlation_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 10 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 11 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 12 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 13;
}

// OverdraftLimitExceededEvent represents an attempt to exceed the configured
// overdraft limit. Published when a transaction is rejected due to insufficient
// funds including overdraft.
message OverdraftLimitExceededEvent {
  // event_id uniquely identifies this event instance
  string event_id = 1 [(buf.validate.field).string = {
    uuid: true
  }];

  // account_id identifies the account
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // transaction_id identifies the rejected transaction
  string transaction_id = 3 [(buf.validate.field).string = {
    uuid: true
  }];

  // attempted_amount is the amount that was attempted (must be positive)
  meridian.quantity.v1.InstrumentAmount attempted_amount = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "positive_attempted_amount"
      message: "attempted amount must be greater than zero"
      expression: "this.amount.matches('^[1-9][0-9]*(\\\\.[0-9]+)?$') || this.amount.matches('^0\\\\.[0-9]*[1-9][0-9]*$')"
    }
  ];

  // current_balance is the balance at time of rejection (no sign constraint - can be negative)
  meridian.quantity.v1.InstrumentAmount current_balance = 5 [(buf.validate.field).required = true];

  // overdraft_limit is the configured overdraft limit (must be non-negative)
  meridian.quantity.v1.InstrumentAmount overdraft_limit = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "non_negative_overdraft_limit"
      message: "overdraft limit must be greater than or equal to zero"
      expression: "this.amount.matches('^[0-9]+(\\\\.[0-9]+)?$')"
    }
  ];

  // shortage is the amount by which the limit was exceeded (must be positive)
  meridian.quantity.v1.InstrumentAmount shortage = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "positive_shortage"
      message: "shortage must be greater than zero"
      expression: "this.amount.matches('^[1-9][0-9]*(\\\\.[0-9]+)?$') || this.amount.matches('^0\\\\.[0-9]*[1-9][0-9]*$')"
    }
  ];

  // correlation_id links related events across services
  string correlation_id = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // causation_id identifies the event or command that caused this event
  string causation_id = 9 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // timestamp when the event was created
  google.protobuf.Timestamp timestamp = 10 [(buf.validate.field).required = true];

  // version is the aggregate version for optimistic locking
  int64 version = 11 [(buf.validate.field).int64 = {gte: 1}];

  // idempotency_key for deduplication (optional)
  string idempotency_key = 12 [(buf.validate.field).string = {
    max_len: 255
  }];

  // metadata for tracing and debugging
  map<string, string> metadata = 13;
}
