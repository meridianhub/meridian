syntax = "proto3";

package meridian.events.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/events/v1;eventsv1";

// DepositEvent represents a deposit transaction that occurred on a current account.
// Published by CurrentAccount service, consumed by FinancialAccounting service
// for double-entry ledger posting.
message DepositEvent {
  // account_id is the account that received the deposit
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount_cents is the deposit amount in cents (or smallest currency unit)
  int64 amount_cents = 2 [(buf.validate.field).int64 = {gt: 0}];

  // instrument_code is the ISO 4217 currency code or other instrument identifier (e.g., "GBP", "USD").
  // Replaces the deprecated currency enum field.
  string instrument_code = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // correlation_id links this event to the originating transaction
  string correlation_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // value_date is when the deposit should be valued
  google.protobuf.Timestamp value_date = 5 [(buf.validate.field).required = true];

  // timestamp is when the event was created
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];
}
