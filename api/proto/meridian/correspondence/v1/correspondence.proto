syntax = "proto3";

package meridian.correspondence.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/correspondence/v1;correspondencev1";

// OpenAPI specification metadata for Correspondence Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Correspondence Service API"
    version: "1.0"
    description: "BIAN-aligned correspondence management for outbound communications, "
                 "delivery tracking, and communication preference management. "
                 "Supports multi-channel delivery (email, SMS) with consent enforcement "
                 "and suppression handling."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
  responses: {
    key: "401"
    value: {
      description: "Unauthorized - Missing or invalid Bearer token"
    }
  }
  responses: {
    key: "403"
    value: {
      description: "Forbidden - Insufficient permissions for this operation"
    }
  }
};

// CorrespondenceCategory classifies the purpose of a correspondence for
// consent enforcement and routing rules.
enum CorrespondenceCategory {
  // CORRESPONDENCE_CATEGORY_UNSPECIFIED means the category is unknown.
  CORRESPONDENCE_CATEGORY_UNSPECIFIED = 0;
  // CORRESPONDENCE_CATEGORY_TRANSACTIONAL is for transaction-triggered notifications
  // (e.g., payment confirmations, invoice delivery). Always delivered regardless of
  // marketing preferences.
  CORRESPONDENCE_CATEGORY_TRANSACTIONAL = 1;
  // CORRESPONDENCE_CATEGORY_OPERATIONAL is for platform operational messages
  // (e.g., maintenance notices, security alerts). Delivered unless globally unsubscribed.
  CORRESPONDENCE_CATEGORY_OPERATIONAL = 2;
  // CORRESPONDENCE_CATEGORY_MARKETING is for promotional and marketing communications.
  // Requires explicit opt-in consent.
  CORRESPONDENCE_CATEGORY_MARKETING = 3;
}

// CorrespondenceStatus tracks the lifecycle of an outbound correspondence
// from initiation through delivery.
enum CorrespondenceStatus {
  // CORRESPONDENCE_STATUS_UNSPECIFIED means the status is unknown.
  CORRESPONDENCE_STATUS_UNSPECIFIED = 0;
  // CORRESPONDENCE_STATUS_QUEUED means the correspondence is queued for delivery.
  CORRESPONDENCE_STATUS_QUEUED = 1;
  // CORRESPONDENCE_STATUS_SUPPRESSED means delivery was suppressed due to a suppression rule
  // (e.g., prior bounce or complaint).
  CORRESPONDENCE_STATUS_SUPPRESSED = 2;
  // CORRESPONDENCE_STATUS_OPTED_OUT means the recipient has opted out of this category.
  CORRESPONDENCE_STATUS_OPTED_OUT = 3;
  // CORRESPONDENCE_STATUS_SENT means the correspondence was sent to the delivery provider.
  CORRESPONDENCE_STATUS_SENT = 4;
  // CORRESPONDENCE_STATUS_DELIVERED means the provider confirmed delivery to the recipient.
  CORRESPONDENCE_STATUS_DELIVERED = 5;
  // CORRESPONDENCE_STATUS_BOUNCED means delivery failed (hard or soft bounce).
  CORRESPONDENCE_STATUS_BOUNCED = 6;
  // CORRESPONDENCE_STATUS_COMPLAINED means the recipient marked the message as spam.
  CORRESPONDENCE_STATUS_COMPLAINED = 7;
}

// DeliveryStatus represents status values reported by external delivery providers
// via webhook callbacks.
enum DeliveryStatus {
  // DELIVERY_STATUS_UNSPECIFIED means the status is unknown.
  DELIVERY_STATUS_UNSPECIFIED = 0;
  // DELIVERY_STATUS_DELIVERED means the provider confirmed successful delivery.
  DELIVERY_STATUS_DELIVERED = 1;
  // DELIVERY_STATUS_BOUNCED means delivery failed permanently or temporarily.
  DELIVERY_STATUS_BOUNCED = 2;
  // DELIVERY_STATUS_COMPLAINED means the recipient reported the message as spam.
  DELIVERY_STATUS_COMPLAINED = 3;
  // DELIVERY_STATUS_REJECTED means the provider rejected the message before delivery attempt.
  DELIVERY_STATUS_REJECTED = 4;
}

// InitiateOutboundRequest sends an outbound correspondence via the specified channel.
message InitiateOutboundRequest {
  // The party to receive the correspondence.
  string recipient_party_id = 1 [(buf.validate.field).required = true];
  // Delivery channel (e.g., "EMAIL", "SMS").
  string channel = 2 [(buf.validate.field).required = true];
  // Name of the template to render for this correspondence.
  string template_name = 3 [(buf.validate.field).required = true];
  // Key-value data to populate the template.
  google.protobuf.Struct template_data = 4;
  // Client-provided idempotency key to prevent duplicate sends.
  meridian.common.v1.IdempotencyKey idempotency_key = 5 [(buf.validate.field).required = true];
  // Category for consent enforcement and routing. Must not be UNSPECIFIED.
  CorrespondenceCategory category = 6 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
}

// InitiateOutboundResponse returns the result of initiating outbound correspondence.
message InitiateOutboundResponse {
  // Unique identifier for the created correspondence.
  string correspondence_id = 1;
  // Current status after initiation (QUEUED, SUPPRESSED, or OPTED_OUT).
  CorrespondenceStatus status = 2 [(buf.validate.field).enum = {defined_only: true}];
  // Reason for suppression, if the correspondence was not queued.
  string suppression_reason = 3;
}

// RetrieveOutboundRequest retrieves the status of a previously sent correspondence.
message RetrieveOutboundRequest {
  // The correspondence to retrieve.
  string correspondence_id = 1 [(buf.validate.field).required = true];
}

// RetrieveOutboundResponse returns the full details of a correspondence.
message RetrieveOutboundResponse {
  // Unique identifier for the correspondence.
  string correspondence_id = 1;
  // The party who received the correspondence.
  string recipient_party_id = 2;
  // Delivery channel used.
  string channel = 3;
  // Template used to render the correspondence.
  string template_name = 4;
  // Category of the correspondence.
  CorrespondenceCategory category = 5;
  // Current lifecycle status.
  CorrespondenceStatus status = 6 [(buf.validate.field).enum = {defined_only: true}];
  // When the correspondence was created.
  google.protobuf.Timestamp created_at = 7;
  // When the correspondence was sent to the provider.
  google.protobuf.Timestamp sent_at = 8;
}

// RecordDeliveryStatusRequest records a delivery status update from a provider webhook.
message RecordDeliveryStatusRequest {
  // Provider-assigned message identifier.
  string provider_id = 1 [(buf.validate.field).required = true];
  // Delivery status reported by the provider. Must not be UNSPECIFIED.
  DeliveryStatus status = 2 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  // Additional metadata from the provider.
  google.protobuf.Struct provider_metadata = 3;
}

// RecordDeliveryStatusResponse returns the result of recording a delivery status.
message RecordDeliveryStatusResponse {
  // Whether this status update caused a suppression entry to be added
  // (e.g., a bounce or complaint triggered automatic suppression).
  bool suppression_added = 1;
}

// GetCommunicationPreferencesRequest retrieves communication preferences for a party.
message GetCommunicationPreferencesRequest {
  // The party whose preferences to retrieve.
  string party_id = 1 [(buf.validate.field).required = true];
}

// CommunicationPreference represents a single channel+category preference
// with full audit trail. Used in read responses only.
message CommunicationPreference {
  // The communication channel (e.g., "EMAIL", "SMS").
  string channel = 1;
  // The correspondence category this preference applies to.
  CorrespondenceCategory category = 2;
  // Whether the party has opted in to this channel+category combination.
  bool opted_in = 3;
  // When consent was granted for this preference.
  google.protobuf.Timestamp consent_granted_at = 4;
  // Source of consent (e.g., "web_form", "api", "customer_portal").
  string consent_source = 5;
  // The consent text that was presented to the party.
  string consent_text = 6;
}

// CommunicationPreferenceUpdate represents a preference change for a single
// channel+category pair. Audit fields (consent_source, consent_text) are
// provided at the request level and applied uniformly to all preference updates.
message CommunicationPreferenceUpdate {
  // The communication channel (e.g., "EMAIL", "SMS").
  string channel = 1 [(buf.validate.field).required = true];
  // The correspondence category this preference applies to. Must not be UNSPECIFIED.
  CorrespondenceCategory category = 2 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  // Whether the party is opting in to this channel+category combination.
  bool opted_in = 3;
}

// GetCommunicationPreferencesResponse returns a party's communication preferences.
message GetCommunicationPreferencesResponse {
  // Individual channel+category preferences with audit trail.
  repeated CommunicationPreference preferences = 1;
  // Whether the party has globally unsubscribed from all non-transactional communications.
  bool global_unsubscribe = 2;
}

// UpdateCommunicationPreferencesRequest updates a party's communication preferences.
// Uses replace semantics: the supplied list fully replaces all existing preferences
// for the specified channel+category pairs. Pairs not included in the list are
// left unchanged. To remove a preference, include it with opted_in=false.
message UpdateCommunicationPreferencesRequest {
  // The party whose preferences to update.
  string party_id = 1 [(buf.validate.field).required = true];
  // The preferences to upsert. Each entry updates (or creates) the preference for
  // the given channel+category pair. Existing pairs not listed here are preserved.
  repeated CommunicationPreferenceUpdate preferences = 2;
  // Whether to globally unsubscribe from all non-transactional communications.
  // When true, overrides per-channel opt-in for OPERATIONAL and MARKETING categories.
  // TRANSACTIONAL correspondence is always delivered regardless of this flag.
  bool global_unsubscribe = 3;
  // Source of consent for this update (e.g., "web_form", "api", "customer_portal").
  // Applied to all preference changes in this request.
  string consent_source = 4 [(buf.validate.field).required = true];
  // The consent text presented to the party for this update.
  // Applied to all preference changes in this request.
  string consent_text = 5 [(buf.validate.field).required = true];
}

// UpdateCommunicationPreferencesResponse returns the full set of preferences after the update.
message UpdateCommunicationPreferencesResponse {
  // The complete set of preferences after applying the update, with audit trail.
  repeated CommunicationPreference preferences = 1;
}

// CorrespondenceService manages outbound correspondence delivery, status tracking,
// and communication preference management. Aligned with the BIAN Customer Workbench
// and Party Reference Data Directory service domains.
service CorrespondenceService {
  // InitiateOutbound sends an outbound correspondence via the specified channel.
  // Checks consent and suppression rules before queuing delivery.
  rpc InitiateOutbound(InitiateOutboundRequest) returns (InitiateOutboundResponse) {
    option (google.api.http) = {
      post: "/v1/correspondence/outbound"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Initiate outbound correspondence"
      description: "Sends an outbound correspondence via the specified channel. "
                   "Validates consent and suppression rules before queuing."
      responses: {
        key: "201"
        value: {
          description: "Correspondence initiated successfully"
        }
      }
    };
  }

  // RetrieveOutbound returns the current status and details of a correspondence.
  rpc RetrieveOutbound(RetrieveOutboundRequest) returns (RetrieveOutboundResponse) {
    option (google.api.http) = {
      get: "/v1/correspondence/outbound/{correspondence_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Retrieve outbound correspondence"
      description: "Returns the full details and current delivery status of a correspondence."
      responses: {
        key: "404"
        value: {
          description: "Correspondence not found"
        }
      }
    };
  }

  // RecordDeliveryStatus records a delivery status update from a provider webhook.
  // May trigger automatic suppression for bounces or complaints.
  rpc RecordDeliveryStatus(RecordDeliveryStatusRequest) returns (RecordDeliveryStatusResponse) {
    option (google.api.http) = {
      post: "/v1/correspondence/delivery-status"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Record delivery status"
      description: "Records a delivery status update from an email or SMS provider webhook. "
                   "Bounces and complaints may trigger automatic suppression."
    };
  }

  // GetCommunicationPreferences retrieves a party's communication preferences.
  rpc GetCommunicationPreferences(GetCommunicationPreferencesRequest) returns (GetCommunicationPreferencesResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}/communication-preferences"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get communication preferences"
      description: "Returns the communication preferences for a party, including "
                   "per-channel and per-category opt-in status with full audit trail."
      responses: {
        key: "404"
        value: {
          description: "Party not found"
        }
      }
    };
  }

  // UpdateCommunicationPreferences updates a party's communication preferences.
  // Uses upsert semantics: listed channel+category pairs are updated; unlisted pairs
  // are preserved. Records consent metadata for audit trail compliance.
  rpc UpdateCommunicationPreferences(UpdateCommunicationPreferencesRequest) returns (UpdateCommunicationPreferencesResponse) {
    option (google.api.http) = {
      put: "/v1/parties/{party_id}/communication-preferences"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update communication preferences"
      description: "Updates a party's communication preferences using upsert semantics. "
                   "Listed channel+category pairs are created or updated; unlisted pairs "
                   "are preserved. Records consent source and text for regulatory audit trail."
    };
  }
}
