syntax = "proto3";

package meridian.party.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "meridian/quantity/v1/quantity.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/party/v1;partyv1";

// OpenAPI specification metadata for Party Reference Data Directory Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Party Reference Data Directory Service API"
    version: "1.0"
    description: "BIAN-compliant party reference data management for customers, "
                 "counterparties, and other legal entities involved in banking operations."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
};

// PartyType defines the legal classification of a party per BIAN specification.
enum PartyType {
  // PARTY_TYPE_UNSPECIFIED means the party type is unknown.
  PARTY_TYPE_UNSPECIFIED = 0;
  // PARTY_TYPE_PERSON is a natural person (individual).
  PARTY_TYPE_PERSON = 1;
  // PARTY_TYPE_ORGANIZATION is a legal entity (company, partnership, etc.).
  PARTY_TYPE_ORGANIZATION = 2;
}

// PartyStatus defines the lifecycle state of a party in the reference data directory.
enum PartyStatus {
  // PARTY_STATUS_UNSPECIFIED means the status is unknown.
  PARTY_STATUS_UNSPECIFIED = 0;
  // PARTY_STATUS_ACTIVE means the party is active and can participate in banking operations.
  PARTY_STATUS_ACTIVE = 1;
  // PARTY_STATUS_RESTRICTED means the party has limited access (e.g., pending KYC review).
  PARTY_STATUS_RESTRICTED = 2;
  // PARTY_STATUS_SUSPENDED means the party is temporarily suspended (e.g., compliance investigation).
  PARTY_STATUS_SUSPENDED = 3;
  // PARTY_STATUS_TERMINATED means the party relationship has ended.
  PARTY_STATUS_TERMINATED = 4;
}

// ExternalReferenceType defines the type of external identifier for a party.
enum ExternalReferenceType {
  // EXTERNAL_REFERENCE_TYPE_UNSPECIFIED means the reference type is unknown.
  EXTERNAL_REFERENCE_TYPE_UNSPECIFIED = 0;
  // EXTERNAL_REFERENCE_TYPE_COMPANIES_HOUSE is a UK Companies House registration number.
  EXTERNAL_REFERENCE_TYPE_COMPANIES_HOUSE = 1;
  // EXTERNAL_REFERENCE_TYPE_NATIONAL_ID is a national identity document number.
  EXTERNAL_REFERENCE_TYPE_NATIONAL_ID = 2;
  // EXTERNAL_REFERENCE_TYPE_LEI is a Legal Entity Identifier (ISO 17442).
  EXTERNAL_REFERENCE_TYPE_LEI = 3;
  // EXTERNAL_REFERENCE_TYPE_TAX_ID is a tax identification number.
  EXTERNAL_REFERENCE_TYPE_TAX_ID = 4;
}

// ControlAction defines the lifecycle control actions for party management.
enum ControlAction {
  // CONTROL_ACTION_UNSPECIFIED means the action is unknown.
  CONTROL_ACTION_UNSPECIFIED = 0;
  // CONTROL_ACTION_RESTRICT limits party access (e.g., pending KYC review).
  CONTROL_ACTION_RESTRICT = 1;
  // CONTROL_ACTION_SUSPEND temporarily disables party operations.
  CONTROL_ACTION_SUSPEND = 2;
  // CONTROL_ACTION_ACTIVATE re-enables party operations.
  CONTROL_ACTION_ACTIVATE = 3;
  // CONTROL_ACTION_TERMINATE permanently ends the party relationship.
  CONTROL_ACTION_TERMINATE = 4;
}

// RelationshipType defines the type of association between parties.
enum RelationshipType {
  // RELATIONSHIP_TYPE_UNSPECIFIED means the relationship type is unknown.
  RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  // RELATIONSHIP_TYPE_SPOUSE is a spousal relationship (for individuals).
  RELATIONSHIP_TYPE_SPOUSE = 1;
  // RELATIONSHIP_TYPE_DEPENDENT is a dependent relationship (for individuals).
  RELATIONSHIP_TYPE_DEPENDENT = 2;
  // RELATIONSHIP_TYPE_BUSINESS_PARTNER is a business partnership relationship.
  RELATIONSHIP_TYPE_BUSINESS_PARTNER = 3;
  // RELATIONSHIP_TYPE_GUARANTOR is a guarantor relationship.
  RELATIONSHIP_TYPE_GUARANTOR = 4;
  // RELATIONSHIP_TYPE_BENEFICIAL_OWNER is a beneficial ownership relationship.
  RELATIONSHIP_TYPE_BENEFICIAL_OWNER = 5;
  // RELATIONSHIP_TYPE_SYNDICATE_PARTICIPANT is a syndicate participation relationship.
  RELATIONSHIP_TYPE_SYNDICATE_PARTICIPANT = 6;
  // RELATIONSHIP_TYPE_SYNDICATE_HOST is a syndicate hosting relationship.
  RELATIONSHIP_TYPE_SYNDICATE_HOST = 7;
}

// AssociationStatus defines the lifecycle state of a party association.
enum AssociationStatus {
  // ASSOCIATION_STATUS_UNSPECIFIED means the status is unknown.
  ASSOCIATION_STATUS_UNSPECIFIED = 0;
  // ASSOCIATION_STATUS_ACTIVE means the association is currently active.
  ASSOCIATION_STATUS_ACTIVE = 1;
  // ASSOCIATION_STATUS_SUSPENDED means the association is temporarily suspended.
  ASSOCIATION_STATUS_SUSPENDED = 2;
  // ASSOCIATION_STATUS_TERMINATED means the association has been permanently ended.
  ASSOCIATION_STATUS_TERMINATED = 3;
}

// Party represents a legal entity in the BIAN Party Reference Data Directory.
// A party can be a person (natural) or organization (legal entity).
//
// NOTE: Business Qualifier data (Reference, Associations, Demographics, BankRelations)
// is NOT included in Party responses. Use the dedicated BQ retrieval operations:
// - RetrieveReference: Get reference data (employment, income, etc.)
// - RetrieveAssociations: Get party relationships (spouse, dependents, etc.)
// - RetrieveDemographics: Get demographic data (date of birth, nationality, etc.)
// - RetrieveBankRelation: Get bank relationship details (customer since, segment, etc.)
message Party {
  // party_id is the unique identifier for this party (alphanumeric with hyphens/underscores).
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // party_type is the legal classification of the party.
  PartyType party_type = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];

  // legal_name is the official registered name of the party.
  string legal_name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // display_name is a shorter name for UI display purposes (optional).
  string display_name = 4 [(buf.validate.field).string = {max_len: 100}];

  // status is the current lifecycle state of the party.
  PartyStatus status = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];

  // external_reference is the identifier from an external system (e.g., Companies House number).
  string external_reference = 6 [(buf.validate.field).string = {max_len: 100}];

  // external_reference_type indicates the type of external reference provided.
  ExternalReferenceType external_reference_type = 7 [(buf.validate.field).enum = {defined_only: true}];

  // created_at is when the party was registered in the directory.
  google.protobuf.Timestamp created_at = 8;

  // updated_at is when the party record was last modified.
  google.protobuf.Timestamp updated_at = 9;

  // version is for optimistic locking.
  int32 version = 10 [(buf.validate.field).int32 = {gte: 0}];

  // attributes contains structured key-value metadata for this party,
  // validated against the party type's attribute_schema at registration and update time.
  repeated meridian.quantity.v1.AttributeEntry attributes = 11;
}

// RegisterPartyRequest is the request to register a new party in the directory.
message RegisterPartyRequest {
  // party_type is the legal classification of the party.
  PartyType party_type = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];

  // legal_name is the official registered name of the party.
  string legal_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // display_name is a shorter name for UI display purposes (optional).
  string display_name = 3 [(buf.validate.field).string = {max_len: 100}];

  // external_reference is the identifier from an external system (optional).
  string external_reference = 4 [(buf.validate.field).string = {max_len: 100}];

  // external_reference_type indicates the type of external reference provided.
  ExternalReferenceType external_reference_type = 5 [(buf.validate.field).enum = {defined_only: true}];

  // attributes contains structured key-value metadata for this party.
  repeated meridian.quantity.v1.AttributeEntry attributes = 6;
}

// RegisterPartyResponse is the response after registering a party.
message RegisterPartyResponse {
  // party is the newly registered party.
  Party party = 1 [(buf.validate.field).required = true];
}

// RetrievePartyRequest is the request to retrieve a party by ID.
message RetrievePartyRequest {
  // party_id is the unique identifier of the party to retrieve.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// RetrievePartyResponse is the response containing the requested party.
message RetrievePartyResponse {
  // party is the requested party.
  Party party = 1 [(buf.validate.field).required = true];
}

// UpdatePartyRequest is the request to update party details (BIAN UpCR).
// When update_mask is provided, only the specified fields are updated.
// When update_mask is empty or not provided, only display_name is updated.
// Supported update_mask paths: "display_name", "attributes".
message UpdatePartyRequest {
  // party_id is the unique identifier of the party to update.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // update_mask specifies which fields to update (partial update support).
  // Supported paths: "display_name", "attributes".
  google.protobuf.FieldMask update_mask = 2;

  // legal_name is the updated official registered name (optional).
  string legal_name = 3 [(buf.validate.field).string = {max_len: 255}];

  // display_name is the updated display name (optional).
  string display_name = 4 [(buf.validate.field).string = {max_len: 100}];

  // external_reference is the updated external identifier (optional).
  string external_reference = 5 [(buf.validate.field).string = {max_len: 100}];

  // external_reference_type is the updated reference type (optional).
  ExternalReferenceType external_reference_type = 6 [(buf.validate.field).enum = {defined_only: true}];

  // version is for optimistic locking.
  int32 version = 7 [(buf.validate.field).int32 = {gte: 0}];

  // attributes contains structured key-value metadata to set on the party.
  // Validated against the tenant's PartyTypeDefinition schema when present.
  repeated meridian.quantity.v1.AttributeEntry attributes = 8;
}

// UpdatePartyResponse is the response after updating a party.
message UpdatePartyResponse {
  // party is the updated party.
  Party party = 1 [(buf.validate.field).required = true];
}

// ControlPartyRequest is the request to control party lifecycle (BIAN CoCR).
message ControlPartyRequest {
  // party_id is the unique identifier of the party to control.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // control_action is the lifecycle action to perform.
  ControlAction control_action = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];

  // reason is an explanation for the control action (for audit trail).
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // actor_id identifies who is performing the control action.
  string actor_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// ControlPartyResponse is the response after controlling a party.
message ControlPartyResponse {
  // party is the updated party with new status.
  Party party = 1 [(buf.validate.field).required = true];

  // action_timestamp is when the control action was executed.
  google.protobuf.Timestamp action_timestamp = 2 [(buf.validate.field).required = true];
}

// --- Business Qualifier: Reference ---

// UpdateReferenceRequest is the request to update party reference data (BQ).
message UpdateReferenceRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // government_id is the government-issued identifier.
  string government_id = 2 [(buf.validate.field).string = {max_len: 100}];

  // tax_reference is the tax identification number.
  string tax_reference = 3 [(buf.validate.field).string = {max_len: 100}];

  // issuing_authority is the entity that issued the reference.
  string issuing_authority = 4 [(buf.validate.field).string = {max_len: 255}];

  // expiry_date is when the reference expires (YYYY-MM-DD format).
  string expiry_date = 5 [(buf.validate.field).string = {pattern: "^\\d{4}-\\d{2}-\\d{2}$"}];
}

// UpdateReferenceResponse is the response after updating reference data.
message UpdateReferenceResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // government_id is the updated government identifier.
  string government_id = 2;

  // tax_reference is the updated tax reference.
  string tax_reference = 3;

  // issuing_authority is the updated issuing authority.
  string issuing_authority = 4;

  // expiry_date is the updated expiry date.
  string expiry_date = 5;

  // updated_at is when the reference was last updated.
  google.protobuf.Timestamp updated_at = 6 [(buf.validate.field).required = true];
}

// RetrieveReferenceRequest is the request to retrieve party reference data.
message RetrieveReferenceRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// RetrieveReferenceResponse is the response containing reference data.
message RetrieveReferenceResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // government_id is the government-issued identifier.
  string government_id = 2;

  // tax_reference is the tax identification number.
  string tax_reference = 3;

  // issuing_authority is the entity that issued the reference.
  string issuing_authority = 4;

  // expiry_date is when the reference expires.
  string expiry_date = 5;

  // updated_at is when the reference was last updated.
  google.protobuf.Timestamp updated_at = 6;
}

// --- Business Qualifier: Associations ---

// RegisterAssociationsRequest is the request to register a party association (BQ).
message RegisterAssociationsRequest {
  // party_id is the unique identifier of the primary party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // related_party_id is the identifier of the related party.
  string related_party_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // relationship_type is the type of relationship.
  RelationshipType relationship_type = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];

  // metadata contains syndicate structuring data (e.g., allocation_share, role).
  google.protobuf.Struct metadata = 4;

  // status is the lifecycle state of this association (defaults to ACTIVE if not specified).
  AssociationStatus status = 5;

  // effective_from is when this association becomes effective.
  google.protobuf.Timestamp effective_from = 6;

  // effective_to is when this association expires (null means indefinite).
  google.protobuf.Timestamp effective_to = 7;
}

// RegisterAssociationsResponse is the response after registering an association.
message RegisterAssociationsResponse {
  // association_id is the unique identifier for this association.
  string association_id = 1;

  // party_id is the primary party identifier.
  string party_id = 2;

  // related_party_id is the related party identifier.
  string related_party_id = 3;

  // relationship_type is the type of relationship.
  RelationshipType relationship_type = 4;

  // created_at is when the association was created.
  google.protobuf.Timestamp created_at = 5 [(buf.validate.field).required = true];

  // metadata contains syndicate structuring data.
  google.protobuf.Struct metadata = 6;

  // status is the lifecycle state of the association.
  AssociationStatus status = 7;

  // effective_from is when this association became effective.
  google.protobuf.Timestamp effective_from = 8;

  // effective_to is when this association expires.
  google.protobuf.Timestamp effective_to = 9;
}

// UpdateAssociationsRequest is the request to update a party association.
message UpdateAssociationsRequest {
  // association_id is the unique identifier of the association to update.
  string association_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // relationship_type is the updated relationship type.
  RelationshipType relationship_type = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// UpdateAssociationsResponse is the response after updating an association.
message UpdateAssociationsResponse {
  // association_id is the association identifier.
  string association_id = 1;

  // party_id is the primary party identifier.
  string party_id = 2;

  // related_party_id is the related party identifier.
  string related_party_id = 3;

  // relationship_type is the updated relationship type.
  RelationshipType relationship_type = 4;

  // updated_at is when the association was last updated.
  google.protobuf.Timestamp updated_at = 5 [(buf.validate.field).required = true];
}

// RetrieveAssociationsRequest is the request to retrieve party associations.
message RetrieveAssociationsRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// RetrieveAssociationsResponse is the response containing party associations.
message RetrieveAssociationsResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // associations is the list of party associations.
  repeated Association associations = 2;
}

// Association represents a relationship between two parties.
message Association {
  // association_id is the unique identifier for this association.
  string association_id = 1;

  // related_party_id is the identifier of the related party.
  string related_party_id = 2;

  // relationship_type is the type of relationship.
  RelationshipType relationship_type = 3;

  // created_at is when the association was created.
  google.protobuf.Timestamp created_at = 4;

  // updated_at is when the association was last updated.
  google.protobuf.Timestamp updated_at = 5;

  // metadata contains syndicate structuring data (e.g., allocation_share, role).
  google.protobuf.Struct metadata = 6;

  // status is the lifecycle state of this association.
  AssociationStatus status = 7;

  // effective_from is when this association became effective.
  google.protobuf.Timestamp effective_from = 8;

  // effective_to is when this association expires (null means indefinite).
  google.protobuf.Timestamp effective_to = 9;

  // party_id is the identifier of the party that holds this association.
  string party_id = 10;
}

// --- Business Qualifier: Demographics ---

// ExchangeDemographicsRequest is the request to verify demographics data (BQ).
message ExchangeDemographicsRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // verification_data is the demographics data to verify.
  string verification_data = 2 [(buf.validate.field).string = {max_len: 1000}];
}

// ExchangeDemographicsResponse is the response after demographics verification.
message ExchangeDemographicsResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // verification_status is the result of verification.
  string verification_status = 2;

  // verification_timestamp is when verification occurred.
  google.protobuf.Timestamp verification_timestamp = 3 [(buf.validate.field).required = true];
}

// UpdateDemographicsRequest is the request to update demographics data.
message UpdateDemographicsRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // socio_economic_data is socio-economic classification data.
  string socio_economic_data = 2 [(buf.validate.field).string = {max_len: 500}];

  // employment_history is employment information.
  string employment_history = 3 [(buf.validate.field).string = {max_len: 1000}];
}

// UpdateDemographicsResponse is the response after updating demographics.
message UpdateDemographicsResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // socio_economic_data is the updated socio-economic data.
  string socio_economic_data = 2;

  // employment_history is the updated employment history.
  string employment_history = 3;

  // updated_at is when demographics were last updated.
  google.protobuf.Timestamp updated_at = 4 [(buf.validate.field).required = true];
}

// RetrieveDemographicsRequest is the request to retrieve demographics data.
message RetrieveDemographicsRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// RetrieveDemographicsResponse is the response containing demographics data.
message RetrieveDemographicsResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // socio_economic_data is the socio-economic classification.
  string socio_economic_data = 2;

  // employment_history is employment information.
  string employment_history = 3;

  // updated_at is when demographics were last updated.
  google.protobuf.Timestamp updated_at = 4;
}

// --- Business Qualifier: BankRelations ---

// UpdateBankRelationsRequest is the request to update bank relationship data (BQ).
message UpdateBankRelationsRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_officer_id is the assigned account officer identifier.
  string account_officer_id = 2 [(buf.validate.field).string = {max_len: 100}];

  // relationship_manager_id is the assigned relationship manager identifier.
  string relationship_manager_id = 3 [(buf.validate.field).string = {max_len: 100}];

  // assigned_branch is the primary branch for this party.
  string assigned_branch = 4 [(buf.validate.field).string = {max_len: 100}];
}

// UpdateBankRelationsResponse is the response after updating bank relations.
message UpdateBankRelationsResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // account_officer_id is the updated account officer identifier.
  string account_officer_id = 2;

  // relationship_manager_id is the updated relationship manager identifier.
  string relationship_manager_id = 3;

  // assigned_branch is the updated assigned branch.
  string assigned_branch = 4;

  // updated_at is when bank relations were last updated.
  google.protobuf.Timestamp updated_at = 5 [(buf.validate.field).required = true];
}

// RetrieveBankRelationsRequest is the request to retrieve bank relationship data.
message RetrieveBankRelationsRequest {
  // party_id is the unique identifier of the party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// RetrieveBankRelationsResponse is the response containing bank relationship data.
message RetrieveBankRelationsResponse {
  // party_id is the party identifier.
  string party_id = 1;

  // account_officer_id is the assigned account officer identifier.
  string account_officer_id = 2;

  // relationship_manager_id is the assigned relationship manager identifier.
  string relationship_manager_id = 3;

  // assigned_branch is the primary branch for this party.
  string assigned_branch = 4;

  // updated_at is when bank relations were last updated.
  google.protobuf.Timestamp updated_at = 5;
}

// --- Business Qualifier: Syndicate Participants ---

// ListPartiesRequest is the request to list parties with pagination and filtering.
message ListPartiesRequest {
  // page_size is the maximum number of parties to return per page (default 25, max 100).
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];

  // page_token is the cursor token from a previous response to get the next page.
  // Leave empty to get the first page.
  string page_token = 2;

  // party_type filters results to a specific party classification (optional).
  PartyType party_type = 3 [(buf.validate.field).enum = {defined_only: true}];

  // status filters results to parties with a specific status (optional).
  PartyStatus status = 4 [(buf.validate.field).enum = {defined_only: true}];

  // search_query filters results by case-insensitive substring match on legal_name or display_name.
  string search_query = 5 [(buf.validate.field).string = {max_len: 255}];
}

// ListPartiesResponse is the paginated response containing parties.
message ListPartiesResponse {
  // parties is the list of parties for this page.
  repeated Party parties = 1;

  // next_page_token is the cursor to fetch the next page.
  // Empty when there are no more results.
  string next_page_token = 2;

  // total_count is the total number of parties matching the filter criteria.
  int64 total_count = 3;
}

// ListParticipantsRequest is the request to list active participants for a syndicate.
message ListParticipantsRequest {
  // org_party_id is the identifier of the syndicate (organization party).
  string org_party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // relationship_type filters participants by relationship type.
  RelationshipType relationship_type = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// ListParticipantsResponse is the response containing active participants.
message ListParticipantsResponse {
  // participants is the list of active participant associations.
  repeated Association participants = 1;
}

// GetStructuringDataRequest is the request to retrieve structuring metadata for a participant.
message GetStructuringDataRequest {
  // party_id is the identifier of the participant party.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // org_party_id is the identifier of the syndicate (organization party).
  string org_party_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // relationship_type is the type of relationship to query.
  RelationshipType relationship_type = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// GetStructuringDataResponse is the response containing the structuring metadata.
message GetStructuringDataResponse {
  // metadata contains the structuring data (e.g., allocation_share, role).
  google.protobuf.Struct metadata = 1;
}

// --- Business Qualifier: PaymentMethods ---

// PaymentMethodProvider defines supported external payment providers.
enum PaymentMethodProvider {
  // PAYMENT_METHOD_PROVIDER_UNSPECIFIED means the provider is unknown.
  PAYMENT_METHOD_PROVIDER_UNSPECIFIED = 0;
  // PAYMENT_METHOD_PROVIDER_STRIPE is the Stripe payment provider.
  PAYMENT_METHOD_PROVIDER_STRIPE = 1;
}

// PaymentMethodType defines the type of payment method.
enum PaymentMethodType {
  // PAYMENT_METHOD_TYPE_UNSPECIFIED means the type is unknown.
  PAYMENT_METHOD_TYPE_UNSPECIFIED = 0;
  // PAYMENT_METHOD_TYPE_CARD is a credit or debit card.
  PAYMENT_METHOD_TYPE_CARD = 1;
  // PAYMENT_METHOD_TYPE_BANK_ACCOUNT is a bank account (ACH, wire).
  PAYMENT_METHOD_TYPE_BANK_ACCOUNT = 2;
  // PAYMENT_METHOD_TYPE_SEPA is a SEPA direct debit mandate.
  PAYMENT_METHOD_TYPE_SEPA = 3;
}

// PaymentMethodStatus defines the lifecycle state of a payment method.
enum PaymentMethodStatus {
  // PAYMENT_METHOD_STATUS_UNSPECIFIED means the status is unknown.
  PAYMENT_METHOD_STATUS_UNSPECIFIED = 0;
  // PAYMENT_METHOD_STATUS_ACTIVE means the payment method is usable.
  PAYMENT_METHOD_STATUS_ACTIVE = 1;
  // PAYMENT_METHOD_STATUS_EXPIRED means the payment method has expired.
  PAYMENT_METHOD_STATUS_EXPIRED = 2;
  // PAYMENT_METHOD_STATUS_REMOVED means the payment method has been soft-deleted.
  PAYMENT_METHOD_STATUS_REMOVED = 3;
}

// PartyPaymentMethod represents a tokenized payment method linked to a party.
message PartyPaymentMethod {
  // id is the unique identifier for this payment method.
  string id = 1;

  // party_id is the party this payment method belongs to.
  string party_id = 2;

  // provider is the external payment provider.
  PaymentMethodProvider provider = 3;

  // provider_customer_id is the provider's customer token (e.g., cus_xxx).
  string provider_customer_id = 4;

  // provider_method_id is the provider's payment method token (e.g., pm_xxx).
  string provider_method_id = 5;

  // method_type is the type of payment method.
  PaymentMethodType method_type = 6;

  // is_default indicates whether this is the party's default payment method.
  bool is_default = 7;

  // metadata contains non-sensitive display information (last4, brand, etc.).
  map<string, string> metadata = 8;

  // status is the current lifecycle state.
  PaymentMethodStatus status = 9;

  // version is for optimistic locking.
  int64 version = 10;

  // created_at is when the payment method was created.
  google.protobuf.Timestamp created_at = 11;

  // updated_at is when the payment method was last updated.
  google.protobuf.Timestamp updated_at = 12;
}

// AddPaymentMethodRequest is the request to add a payment method to a party.
message AddPaymentMethodRequest {
  // party_id is the party to add the payment method to.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // provider is the external payment provider.
  PaymentMethodProvider provider = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // provider_customer_id is the provider's customer token (e.g., cus_xxx).
  string provider_customer_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // provider_method_id is the provider's payment method token (e.g., pm_xxx).
  string provider_method_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // method_type is the type of payment method.
  PaymentMethodType method_type = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // is_default indicates whether this should be the party's default payment method.
  bool is_default = 6;

  // metadata contains non-sensitive display information (last4, brand, etc.).
  map<string, string> metadata = 7;
}

// RemovePaymentMethodRequest is the request to remove (soft-delete) a payment method.
message RemovePaymentMethodRequest {
  // id is the unique identifier of the payment method to remove.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // version is for optimistic locking.
  int64 version = 2 [(buf.validate.field).int64 = {gte: 1}];
}

// RemovePaymentMethodResponse is the response after removing a payment method.
message RemovePaymentMethodResponse {}

// SetDefaultPaymentMethodRequest is the request to set a payment method as default.
message SetDefaultPaymentMethodRequest {
  // id is the unique identifier of the payment method to set as default.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// ListPaymentMethodsRequest is the request to list payment methods for a party.
message ListPaymentMethodsRequest {
  // party_id is the party whose payment methods to list.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// ListPaymentMethodsResponse is the response containing payment methods.
message ListPaymentMethodsResponse {
  // payment_methods is the list of active payment methods.
  repeated PartyPaymentMethod payment_methods = 1;
}

// GetDefaultPaymentMethodRequest is the request to get the default payment method for a party.
message GetDefaultPaymentMethodRequest {
  // party_id is the party whose default payment method to retrieve.
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// AddPaymentMethodResponse is the response after adding a payment method.
message AddPaymentMethodResponse {
  // payment_method is the newly created payment method.
  PartyPaymentMethod payment_method = 1 [(buf.validate.field).required = true];
}

// SetDefaultPaymentMethodResponse is the response after setting the default payment method.
message SetDefaultPaymentMethodResponse {
  // payment_method is the payment method that was set as default.
  PartyPaymentMethod payment_method = 1 [(buf.validate.field).required = true];
}

// GetDefaultPaymentMethodResponse is the response containing the default payment method.
message GetDefaultPaymentMethodResponse {
  // payment_method is the default payment method.
  PartyPaymentMethod payment_method = 1 [(buf.validate.field).required = true];
}

// --- Party Type Definitions ---

// PartyTypeDefinition defines a tenant-configurable schema for a party type,
// including JSON Schema for attribute validation and CEL expressions for
// cross-field validation, account eligibility, and custom error messages.
message PartyTypeDefinition {
  // id is the unique identifier for this party type definition.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // tenant_id is the tenant that owns this party type definition.
  string tenant_id = 2 [(buf.validate.field).string = {min_len: 1}];

  // party_type is the party classification this definition applies to (e.g., "PERSON", "ORGANIZATION").
  // Uppercase alphanumeric with underscores, max 100 characters.
  string party_type = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[A-Z][A-Z0-9_]*$"
  }];

  // attribute_schema is a JSON Schema document defining the structure and constraints
  // for party attributes of this type (max 16KB). Must be non-empty when provided.
  string attribute_schema = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 16384
  }];

  // validation_cel is a CEL expression for cross-field validation of party attributes.
  // Evaluated at party registration and update time.
  string validation_cel = 5 [(buf.validate.field).string = {max_len: 4096}];

  // eligibility_cel is a CEL expression for determining account type eligibility
  // for parties of this type.
  string eligibility_cel = 6 [(buf.validate.field).string = {max_len: 4096}];

  // error_message_cel is a CEL expression for generating custom error messages
  // when validation or eligibility checks fail.
  string error_message_cel = 7 [(buf.validate.field).string = {max_len: 1024}];

  // created_at is when this party type definition was created.
  google.protobuf.Timestamp created_at = 8;

  // updated_at is when this party type definition was last modified.
  google.protobuf.Timestamp updated_at = 9;

  // version is for optimistic locking.
  int32 version = 10 [(buf.validate.field).int32 = {gte: 0}];
}

// RegisterPartyTypeRequest is the request to register a new party type definition.
message RegisterPartyTypeRequest {
  // party_type is the party classification this definition applies to (e.g., "PERSON", "ORGANIZATION").
  // Uppercase alphanumeric with underscores, max 100 characters.
  string party_type = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[A-Z][A-Z0-9_]*$"
  }];

  // attribute_schema is a JSON Schema document defining the structure and constraints
  // for party attributes of this type (max 16KB). Must be non-empty when provided.
  string attribute_schema = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 16384
  }];

  // validation_cel is a CEL expression for cross-field validation of party attributes.
  string validation_cel = 3 [(buf.validate.field).string = {max_len: 4096}];

  // eligibility_cel is a CEL expression for determining account type eligibility.
  string eligibility_cel = 4 [(buf.validate.field).string = {max_len: 4096}];

  // error_message_cel is a CEL expression for generating custom error messages.
  string error_message_cel = 5 [(buf.validate.field).string = {max_len: 1024}];
}

// RegisterPartyTypeResponse is the response after registering a party type definition.
message RegisterPartyTypeResponse {
  // party_type_definition is the newly registered party type definition.
  PartyTypeDefinition party_type_definition = 1 [(buf.validate.field).required = true];
}

// GetPartyTypeRequest is the request to retrieve a party type definition by ID.
message GetPartyTypeRequest {
  // id is the unique identifier of the party type definition to retrieve.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// GetPartyTypeResponse is the response containing the requested party type definition.
message GetPartyTypeResponse {
  // party_type_definition is the requested party type definition.
  PartyTypeDefinition party_type_definition = 1 [(buf.validate.field).required = true];
}

// ListPartyTypesRequest is the request to list party type definitions for the tenant.
message ListPartyTypesRequest {
  // party_type filters results to a specific party classification (optional).
  // When provided, must match the pattern used in PartyTypeDefinition.party_type.
  string party_type = 1 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^([A-Z][A-Z0-9_]*)?$"
  }];
}

// ListPartyTypesResponse is the response containing party type definitions.
message ListPartyTypesResponse {
  // party_type_definitions is the list of party type definitions for the tenant.
  repeated PartyTypeDefinition party_type_definitions = 1;
}

// UpdatePartyTypeRequest is the request to update a party type definition.
message UpdatePartyTypeRequest {
  // id is the unique identifier of the party type definition to update.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // update_mask specifies which fields to update (partial update support).
  // Supported paths: "attribute_schema", "validation_cel", "eligibility_cel", "error_message_cel".
  google.protobuf.FieldMask update_mask = 2;

  // attribute_schema is the updated JSON Schema document (optional, max 16KB).
  string attribute_schema = 3 [(buf.validate.field).string = {max_len: 16384}];

  // validation_cel is the updated cross-field validation CEL expression (optional).
  string validation_cel = 4 [(buf.validate.field).string = {max_len: 4096}];

  // eligibility_cel is the updated account eligibility CEL expression (optional).
  string eligibility_cel = 5 [(buf.validate.field).string = {max_len: 4096}];

  // error_message_cel is the updated custom error message CEL expression (optional).
  string error_message_cel = 6 [(buf.validate.field).string = {max_len: 1024}];

  // version is for optimistic locking.
  int32 version = 7 [(buf.validate.field).int32 = {gte: 0}];
}

// UpdatePartyTypeResponse is the response after updating a party type definition.
message UpdatePartyTypeResponse {
  // party_type_definition is the updated party type definition.
  PartyTypeDefinition party_type_definition = 1 [(buf.validate.field).required = true];
}

// PartyService provides BIAN-compliant party reference data management.
//
// Design Notes:
// - DELETE operations are intentionally not provided. Parties are managed
//   through status transitions (Active → Restricted → Terminated) for audit compliance.
// - This service follows the BIAN Party Reference Data Directory pattern.
service PartyService {
  // RegisterParty creates a new party in the reference data directory.
  rpc RegisterParty(RegisterPartyRequest) returns (RegisterPartyResponse) {
    option (google.api.http) = {
      post: "/v1/parties"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Party registered successfully"
        }
      }
    };
  }

  // ListParties returns a paginated list of parties with optional filtering.
  rpc ListParties(ListPartiesRequest) returns (ListPartiesResponse) {
    option (google.api.http) = {
      get: "/v1/parties"
    };
  }

  // RetrieveParty gets party details by ID.
  rpc RetrieveParty(RetrievePartyRequest) returns (RetrievePartyResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}"
    };
  }

  // UpdateParty updates party details (BIAN UpCR).
  rpc UpdateParty(UpdatePartyRequest) returns (UpdatePartyResponse) {
    option (google.api.http) = {
      patch: "/v1/parties/{party_id}"
      body: "*"
    };
  }

  // ControlParty manages party lifecycle (BIAN CoCR).
  rpc ControlParty(ControlPartyRequest) returns (ControlPartyResponse) {
    option (google.api.http) = {
      post: "/v1/parties/{party_id}/control"
      body: "*"
    };
  }

  // --- Business Qualifier: Reference Operations ---

  // UpdateReference updates party reference data.
  rpc UpdateReference(UpdateReferenceRequest) returns (UpdateReferenceResponse) {
    option (google.api.http) = {
      patch: "/v1/parties/{party_id}/reference"
      body: "*"
    };
  }

  // RetrieveReference gets party reference data.
  rpc RetrieveReference(RetrieveReferenceRequest) returns (RetrieveReferenceResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}/reference"
    };
  }

  // --- Business Qualifier: Associations Operations ---

  // RegisterAssociations creates a party association.
  rpc RegisterAssociations(RegisterAssociationsRequest) returns (RegisterAssociationsResponse) {
    option (google.api.http) = {
      post: "/v1/parties/{party_id}/associations"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Association registered successfully"
        }
      }
    };
  }

  // UpdateAssociations updates a party association.
  rpc UpdateAssociations(UpdateAssociationsRequest) returns (UpdateAssociationsResponse) {
    option (google.api.http) = {
      patch: "/v1/parties/associations/{association_id}"
      body: "*"
    };
  }

  // RetrieveAssociations gets party associations.
  rpc RetrieveAssociations(RetrieveAssociationsRequest) returns (RetrieveAssociationsResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}/associations"
    };
  }

  // --- Business Qualifier: Demographics Operations ---

  // ExchangeDemographics verifies party demographics data.
  rpc ExchangeDemographics(ExchangeDemographicsRequest) returns (ExchangeDemographicsResponse) {
    option (google.api.http) = {
      post: "/v1/parties/{party_id}/demographics/verify"
      body: "*"
    };
  }

  // UpdateDemographics updates party demographics data.
  rpc UpdateDemographics(UpdateDemographicsRequest) returns (UpdateDemographicsResponse) {
    option (google.api.http) = {
      patch: "/v1/parties/{party_id}/demographics"
      body: "*"
    };
  }

  // RetrieveDemographics gets party demographics data.
  rpc RetrieveDemographics(RetrieveDemographicsRequest) returns (RetrieveDemographicsResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}/demographics"
    };
  }

  // --- Business Qualifier: BankRelations Operations ---

  // UpdateBankRelations updates party bank relationship data.
  rpc UpdateBankRelations(UpdateBankRelationsRequest) returns (UpdateBankRelationsResponse) {
    option (google.api.http) = {
      patch: "/v1/parties/{party_id}/bank-relations"
      body: "*"
    };
  }

  // RetrieveBankRelations gets party bank relationship data.
  rpc RetrieveBankRelations(RetrieveBankRelationsRequest) returns (RetrieveBankRelationsResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}/bank-relations"
    };
  }

  // --- Business Qualifier: Syndicate Participant Operations ---

  // ListParticipants returns all active participants for a syndicate (org party).
  rpc ListParticipants(ListParticipantsRequest) returns (ListParticipantsResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{org_party_id}/participants"
    };
  }

  // GetStructuringData returns the structuring metadata for a specific participant in a syndicate.
  rpc GetStructuringData(GetStructuringDataRequest) returns (GetStructuringDataResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{org_party_id}/participants/{party_id}/structuring-data"
    };
  }

  // --- Business Qualifier: PaymentMethods Operations ---

  // AddPaymentMethod registers a tokenized payment method for a party.
  rpc AddPaymentMethod(AddPaymentMethodRequest) returns (AddPaymentMethodResponse) {
    option (google.api.http) = {
      post: "/v1/parties/{party_id}/payment-methods"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Payment method added successfully"
        }
      }
    };
  }

  // RemovePaymentMethod soft-deletes a payment method.
  rpc RemovePaymentMethod(RemovePaymentMethodRequest) returns (RemovePaymentMethodResponse) {
    option (google.api.http) = {
      delete: "/v1/payment-methods/{id}"
    };
  }

  // SetDefaultPaymentMethod sets a payment method as the party's default.
  rpc SetDefaultPaymentMethod(SetDefaultPaymentMethodRequest) returns (SetDefaultPaymentMethodResponse) {
    option (google.api.http) = {
      post: "/v1/payment-methods/{id}/default"
      body: "*"
    };
  }

  // ListPaymentMethods returns all active payment methods for a party.
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}/payment-methods"
    };
  }

  // GetDefaultPaymentMethod returns the default payment method for a party.
  rpc GetDefaultPaymentMethod(GetDefaultPaymentMethodRequest) returns (GetDefaultPaymentMethodResponse) {
    option (google.api.http) = {
      get: "/v1/parties/{party_id}/payment-methods/default"
    };
  }

  // --- Party Type Definition Operations ---

  // RegisterPartyType creates a new tenant-configurable party type definition.
  rpc RegisterPartyType(RegisterPartyTypeRequest) returns (RegisterPartyTypeResponse) {
    option (google.api.http) = {
      post: "/v1/party-types"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Party type definition registered successfully"
        }
      }
    };
  }

  // GetPartyType retrieves a party type definition by ID.
  rpc GetPartyType(GetPartyTypeRequest) returns (GetPartyTypeResponse) {
    option (google.api.http) = {
      get: "/v1/party-types/{id}"
    };
  }

  // ListPartyTypes lists all party type definitions for the tenant.
  rpc ListPartyTypes(ListPartyTypesRequest) returns (ListPartyTypesResponse) {
    option (google.api.http) = {
      get: "/v1/party-types"
    };
  }

  // UpdatePartyType updates a party type definition.
  rpc UpdatePartyType(UpdatePartyTypeRequest) returns (UpdatePartyTypeResponse) {
    option (google.api.http) = {
      patch: "/v1/party-types/{id}"
      body: "*"
    };
  }
}
