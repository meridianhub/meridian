syntax = "proto3";

package meridian.internal_bank_account.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";
import "meridian/quantity/v1/quantity.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/internal_bank_account/v1;internalbankaccountv1";

// OpenAPI specification metadata for Internal Bank Account Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Internal Bank Account Service API"
    version: "1.0"
    description: "BIAN-compliant internal bank account operations for managing non-customer-facing accounts "
                 "including clearing, nostro, vostro, holding, suspense, revenue, expense, and inventory accounts. "
                 "Supports multi-asset instruments (fiat, energy, compute, carbon credits)."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
};

// ClearingPurpose distinguishes the specific purpose of clearing accounts.
// Only applicable when behavior_class is "CLEARING".
//
// Usage pattern:
// - DEPOSIT: Clearing accounts that handle deposit operations (customer deposits flow here)
// - WITHDRAWAL: Clearing accounts that handle withdrawal operations (customer withdrawals flow here)
// - SETTLEMENT: Clearing accounts that handle settlement operations (interbank settlements)
// - GENERAL: General-purpose clearing accounts (catch-all for other clearing operations)
//
// Validation rules:
// - For CLEARING accounts: clearing_purpose MUST be non-UNSPECIFIED
// - For non-CLEARING accounts: clearing_purpose MUST be UNSPECIFIED
//
// Example usage:
//   behavior_class: "CLEARING"
//   clearing_purpose: CLEARING_PURPOSE_DEPOSIT
//   account_code: "CLR-GBP-DEPOSIT"
//
// Query example:
//   ListInternalBankAccounts with:
//     behavior_class_filter: "CLEARING"
//     clearing_purpose_filter: CLEARING_PURPOSE_DEPOSIT
//
// See ADR-0025: Clearing Purpose Specialization for design rationale.
enum ClearingPurpose {
  // CLEARING_PURPOSE_UNSPECIFIED is the default value for non-clearing accounts.
  // MUST be used when behavior_class is NOT "CLEARING".
  CLEARING_PURPOSE_UNSPECIFIED = 0;

  // CLEARING_PURPOSE_DEPOSIT is for clearing accounts handling deposit operations.
  // Use when the clearing account receives funds from customer deposits.
  // Example: CLR-GBP-DEPOSIT handles all GBP customer deposits.
  CLEARING_PURPOSE_DEPOSIT = 1;

  // CLEARING_PURPOSE_WITHDRAWAL is for clearing accounts handling withdrawal operations.
  // Use when the clearing account disburses funds for customer withdrawals.
  // Example: CLR-USD-WITHDRAW handles all USD customer withdrawals.
  CLEARING_PURPOSE_WITHDRAWAL = 2;

  // CLEARING_PURPOSE_SETTLEMENT is for clearing accounts handling settlement operations.
  // Use for interbank settlement, payment clearing, and correspondent bank transactions.
  // Example: CLR-EUR-SETTLE handles EUR settlement with correspondent banks.
  CLEARING_PURPOSE_SETTLEMENT = 3;

  // CLEARING_PURPOSE_GENERAL is for general-purpose clearing accounts.
  // Use when the clearing account serves multiple purposes or doesn't fit other categories.
  // Example: CLR-JPY-GENERAL handles miscellaneous JPY clearing operations.
  CLEARING_PURPOSE_GENERAL = 4;
}


// InternalAccountStatus defines the lifecycle state of an internal bank account.
enum InternalAccountStatus {
  // INTERNAL_ACCOUNT_STATUS_UNSPECIFIED means the status is unknown.
  INTERNAL_ACCOUNT_STATUS_UNSPECIFIED = 0;
  // INTERNAL_ACCOUNT_STATUS_ACTIVE means the account is operational and can process transactions.
  INTERNAL_ACCOUNT_STATUS_ACTIVE = 1;
  // INTERNAL_ACCOUNT_STATUS_SUSPENDED means the account is temporarily suspended.
  INTERNAL_ACCOUNT_STATUS_SUSPENDED = 2;
  // INTERNAL_ACCOUNT_STATUS_CLOSED means the account is permanently closed.
  INTERNAL_ACCOUNT_STATUS_CLOSED = 3;
}

// ControlAction defines the control operations for account lifecycle management.
// These are BIAN Control Record (CoCR) operations.
enum ControlAction {
  // CONTROL_ACTION_UNSPECIFIED is the default value and should not be used.
  CONTROL_ACTION_UNSPECIFIED = 0;
  // CONTROL_ACTION_SUSPEND temporarily suspends account operations (reversible).
  // Transitions: ACTIVE -> SUSPENDED
  CONTROL_ACTION_SUSPEND = 1;
  // CONTROL_ACTION_ACTIVATE restores a suspended account to active status.
  // Transitions: SUSPENDED -> ACTIVE
  CONTROL_ACTION_ACTIVATE = 2;
  // CONTROL_ACTION_CLOSE permanently closes the account (irreversible).
  // Transitions: ACTIVE or SUSPENDED -> CLOSED
  CONTROL_ACTION_CLOSE = 3;
}

// CorrespondentType distinguishes between nostro and vostro relationships.
enum CorrespondentType {
  // CORRESPONDENT_TYPE_UNSPECIFIED is the default value and should not be used.
  CORRESPONDENT_TYPE_UNSPECIFIED = 0;
  // CORRESPONDENT_TYPE_NOSTRO means our account at the correspondent bank.
  CORRESPONDENT_TYPE_NOSTRO = 1;
  // CORRESPONDENT_TYPE_VOSTRO means their account at our bank.
  CORRESPONDENT_TYPE_VOSTRO = 2;
}

// CorrespondentBankDetails contains information about the correspondent bank
// for NOSTRO and VOSTRO account types.
message CorrespondentBankDetails {
  // bank_id is the unique identifier for the correspondent bank.
  string bank_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // bank_name is the display name of the correspondent bank.
  string bank_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // external_account_ref is the account reference at the correspondent bank.
  string external_account_ref = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // swift_code is the SWIFT/BIC code of the correspondent bank (optional).
  // Pattern validates BIC8 (8 chars) or BIC11 (11 chars) format.
  // Empty string is allowed for correspondent banks without SWIFT codes
  // (e.g., domestic correspondents, emerging market banks).
  string swift_code = 4 [(buf.validate.field).string = {
    max_len: 11
    pattern: "^([A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?)?$"
  }];

  // correspondent_type indicates whether this is a NOSTRO or VOSTRO relationship.
  CorrespondentType correspondent_type = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// InternalBankAccountFacility represents a BIAN-compliant internal bank account.
// This is the Control Record (CR) for the Internal Bank Account service domain.
message InternalBankAccountFacility {
  // account_id is the unique identifier for this account (UUID format).
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_code is the business-friendly account code (e.g., "CLR-001", "NOSTRO-USD-HSBC").
  string account_code = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[A-Z0-9_-]+$"
  }];

  // name is the human-readable account name.
  string name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // behavior_class identifies the operational category of this account (e.g., "CLEARING", "NOSTRO").
  // This replaces the deprecated InternalAccountType enum and is sourced from the
  // product type definition in the Product Directory.
  string behavior_class = 4 [(buf.validate.field).string.max_len = 50];

  // account_status is the current lifecycle state of the account.
  InternalAccountStatus account_status = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // instrument_code references the instrument from Reference Data service.
  // This defines what asset type this account holds (e.g., "USD", "KWH", "CARBON_CREDIT").
  string instrument_code = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    pattern: "^[A-Z][A-Z0-9_]*$"
  }];

  // correspondent_details contains correspondent bank information for NOSTRO/VOSTRO accounts.
  // Required when account_type is NOSTRO or VOSTRO (enforced at service layer since
  // proto validation cannot express cross-field conditional constraints).
  CorrespondentBankDetails correspondent_details = 7;

  // description provides additional context about this account's purpose.
  string description = 8 [(buf.validate.field).string.max_len = 1000];

  // created_at is when the account was created.
  google.protobuf.Timestamp created_at = 9;

  // updated_at is when the account was last modified.
  google.protobuf.Timestamp updated_at = 10;

  // version is for optimistic locking.
  int32 version = 11 [(buf.validate.field).int32 = {gte: 0}];

  // clearing_purpose specifies the operational purpose of this clearing account.
  // Only applicable when behavior_class is "CLEARING".
  //
  // Validation rules:
  // - MUST be non-UNSPECIFIED when behavior_class is "CLEARING"
  // - MUST be CLEARING_PURPOSE_UNSPECIFIED for all other behavior classes
  //
  // Purpose values:
  // - CLEARING_PURPOSE_DEPOSIT: For deposit clearing operations
  // - CLEARING_PURPOSE_WITHDRAWAL: For withdrawal clearing operations
  // - CLEARING_PURPOSE_SETTLEMENT: For settlement clearing operations
  // - CLEARING_PURPOSE_GENERAL: For general clearing operations
  //
  // Example: A GBP deposit clearing account would have:
  //   behavior_class: "CLEARING"
  //   clearing_purpose: CLEARING_PURPOSE_DEPOSIT
  //   account_code: "CLR-GBP-DEPOSIT"
  //
  // See ADR-0025: Clearing Purpose Specialization for design rationale.
  ClearingPurpose clearing_purpose = 12;

  // org_party_id references the organization party for org-scoped accounts.
  // Empty for global accounts. Org-scoped accounts CANNOT be CLEARING type (enforced at application layer).
  string org_party_id = 13 [(buf.validate.field).string = {
    pattern: "^[a-zA-Z0-9_-]*$"
    max_len: 100
  }];

  // product_type_code references the account type definition from the Product Directory.
  // Empty for accounts created before the product type migration.
  string product_type_code = 14 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[A-Z0-9_]*$"
  }];

  // product_type_version is the pinned version of the product type definition.
  // Zero means no version was pinned.
  int32 product_type_version = 15;
}

// LienStatus defines the lifecycle state of a fund reservation (lien).
// A lien is a hold placed on funds to reserve them for a pending payment.
// Invariant: Available Balance = Current Balance - Sum(Active Liens)
enum LienStatus {
  // LIEN_STATUS_UNSPECIFIED is the default value and should not be used.
  LIEN_STATUS_UNSPECIFIED = 0;
  // LIEN_STATUS_ACTIVE means the funds are currently reserved.
  LIEN_STATUS_ACTIVE = 1;
  // LIEN_STATUS_EXECUTED means the lien was converted to an actual debit (terminal).
  LIEN_STATUS_EXECUTED = 2;
  // LIEN_STATUS_TERMINATED means the lien was released without execution (terminal).
  LIEN_STATUS_TERMINATED = 3;
}

// ========================================
// Request/Response Messages
// ========================================

// InitiateInternalBankAccountRequest creates a new internal bank account.
// BIAN: Initiate Control Record (InCR)
message InitiateInternalBankAccountRequest {
  // account_code is the business-friendly account code.
  string account_code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[A-Z0-9_-]+$"
  }];

  // name is the human-readable account name.
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // Field 3 is reserved: was deprecated InternalAccountType account_type.
  // Callers must use product_type_code instead.
  reserved 3;
  reserved "account_type";

  // instrument_code references the instrument from Reference Data service.
  string instrument_code = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    pattern: "^[A-Z][A-Z0-9_]*$"
  }];

  // correspondent_details is required for NOSTRO/VOSTRO account types.
  // Cross-field validation enforced at service layer.
  CorrespondentBankDetails correspondent_details = 5;

  // description provides additional context about this account's purpose.
  string description = 6 [(buf.validate.field).string.max_len = 1000];

  // idempotency_key ensures exactly-once processing for retry scenarios.
  meridian.common.v1.IdempotencyKey idempotency_key = 7;

  // clearing_purpose specifies the purpose when the product type's behavior_class is CLEARING.
  //
  // Validation rules:
  // - REQUIRED when behavior_class resolves to CLEARING (must be non-UNSPECIFIED)
  // - MUST be CLEARING_PURPOSE_UNSPECIFIED (or omitted) for non-CLEARING behavior classes
  // - Attempting to set clearing_purpose on a non-CLEARING account returns InvalidArgument error
  //
  // Example for deposit clearing account:
  //   product_type_code: "CLEARING_GBP"
  //   clearing_purpose: CLEARING_PURPOSE_DEPOSIT
  ClearingPurpose clearing_purpose = 8;

  // org_party_id references the organization party for org-scoped accounts.
  // Empty for global accounts. Org-scoped accounts CANNOT be CLEARING type (enforced at application layer).
  string org_party_id = 9 [(buf.validate.field).string = {
    pattern: "^[a-zA-Z0-9_-]*$"
    max_len: 100
  }];

  // product_type_code references the account type definition from the Product Directory.
  // When set, the service resolves the product type via LocalAccountTypeCache.
  // Mutually preferred over account_type: if both are set, product_type_code takes precedence.
  string product_type_code = 10 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[A-Z0-9_]*$"
  }];

  // product_type_version pins a specific version of the product type definition.
  // Optional: if omitted, the latest active version is used.
  optional int32 product_type_version = 11;

  // attributes contains additional structured metadata for this account.
  // Validated against the product type's AttributeSchema if defined.
  google.protobuf.Struct attributes = 12;
}

// InitiateInternalBankAccountResponse returns the newly created account.
message InitiateInternalBankAccountResponse {
  // account_id is the generated unique identifier.
  string account_id = 1;

  // facility is the complete account facility details.
  InternalBankAccountFacility facility = 2;
}

// UpdateInternalBankAccountRequest modifies account settings.
// BIAN: Update Control Record (UpCR)
message UpdateInternalBankAccountRequest {
  // account_id identifies the account to update.
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // name is the updated account name (optional).
  string name = 2 [(buf.validate.field).string.max_len = 255];

  // description is the updated description (optional).
  string description = 3 [(buf.validate.field).string.max_len = 1000];

  // correspondent_details updates correspondent information (for NOSTRO/VOSTRO accounts).
  CorrespondentBankDetails correspondent_details = 4;

  // expected_version for optimistic locking. If provided, update fails if current version differs.
  int32 expected_version = 5 [(buf.validate.field).int32 = {gte: 0}];
}

// UpdateInternalBankAccountResponse returns the updated account.
message UpdateInternalBankAccountResponse {
  // facility is the updated account facility.
  InternalBankAccountFacility facility = 1;
}

// ControlInternalBankAccountRequest performs lifecycle state transitions.
// BIAN: Control Control Record (CoCR)
message ControlInternalBankAccountRequest {
  // account_id identifies the account to control.
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // control_action is the action to perform.
  ControlAction control_action = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // reason explains why this control action is being performed.
  // Required for all control actions with minimum 10 characters for audit trail completeness.
  // This ensures meaningful audit records for compliance and traceability.
  string reason = 3 [(buf.validate.field).string = {
    min_len: 10
    max_len: 1000
  }];
}

// ControlInternalBankAccountResponse returns the updated account after control action.
message ControlInternalBankAccountResponse {
  // facility is the account with updated status.
  InternalBankAccountFacility facility = 1;

  // action_timestamp is when the control action was executed.
  google.protobuf.Timestamp action_timestamp = 2;
}

// RetrieveInternalBankAccountRequest fetches a single account by ID.
// BIAN: Retrieve Control Record (ReCR)
message RetrieveInternalBankAccountRequest {
  // account_id identifies the account to retrieve.
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// RetrieveInternalBankAccountResponse returns the requested account.
message RetrieveInternalBankAccountResponse {
  // facility is the requested account facility.
  InternalBankAccountFacility facility = 1;
}

// ListInternalBankAccountsRequest queries accounts with filtering and pagination.
message ListInternalBankAccountsRequest {
  // behavior_class_filter returns only accounts with this behavior class (optional).
  // Use BehaviorClass string values e.g. "CLEARING", "NOSTRO", "VOSTRO".
  // Empty string means no filtering by behavior class.
  string behavior_class_filter = 1 [(buf.validate.field).string.max_len = 50];

  // instrument_code_filter returns only accounts for this instrument (optional).
  string instrument_code_filter = 2 [(buf.validate.field).string = {
    max_len: 32
    pattern: "^([A-Z][A-Z0-9_]*)?$"
  }];

  // status_filter returns only accounts with this status (optional).
  InternalAccountStatus status_filter = 3;

  // pagination controls result pagination.
  meridian.common.v1.Pagination pagination = 4;

  // clearing_purpose_filter returns only clearing accounts with this purpose (optional).
  // If CLEARING_PURPOSE_UNSPECIFIED (or omitted), no filtering by clearing purpose is applied.
  //
  // Usage: Combine with behavior_class_filter for precise clearing account queries:
  //   behavior_class_filter: "CLEARING"
  //   clearing_purpose_filter: CLEARING_PURPOSE_DEPOSIT
  //   instrument_code_filter: "GBP"
  // Returns: All GBP deposit clearing accounts
  //
  // Note: If behavior_class_filter is not "CLEARING", this filter has no effect
  // since only CLEARING accounts have non-UNSPECIFIED clearing_purpose values.
  ClearingPurpose clearing_purpose_filter = 5;
}

// ListInternalBankAccountsResponse returns a paginated list of accounts.
message ListInternalBankAccountsResponse {
  // facilities is the list of matching accounts.
  repeated InternalBankAccountFacility facilities = 1;

  // pagination contains pagination metadata.
  meridian.common.v1.PaginationResponse pagination = 2;
}

// GetBalanceRequest queries the balance for an internal account.
// Balance is retrieved from Position Keeping service (source of truth).
// Internal Bank Account does not store balance locally - it delegates to Position Keeping.
message GetBalanceRequest {
  // account_id identifies the account to query balance for (KSUID format).
  // Pattern accepts alphanumeric characters with hyphens and underscores to support
  // both KSUID identifiers and legacy account IDs.
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// GetBalanceResponse returns the account balance.
// Uses InstrumentAmount for multi-asset support per ADR-0013.
// Balance is retrieved from Position Keeping service (source of truth).
message GetBalanceResponse {
  // account_id is the queried account.
  string account_id = 1;

  // current_balance is the account balance in instrument units.
  // Uses InstrumentAmount instead of MoneyAmount for multi-asset support
  // (energy, compute, carbon credits, etc.).
  // This value comes from Position Keeping service - Internal Bank Account
  // does not store balance locally.
  meridian.quantity.v1.InstrumentAmount current_balance = 2;

  // as_of is the timestamp when this balance was calculated by Position Keeping.
  google.protobuf.Timestamp as_of = 3;
}

// ========================================
// Valuation Feature Messages
// ========================================

// ValuationFeatureLifecycleStatus defines the lifecycle state of a valuation feature
enum ValuationFeatureLifecycleStatus {
  // VALUATION_FEATURE_LIFECYCLE_STATUS_UNSPECIFIED is the default value
  VALUATION_FEATURE_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  // VALUATION_FEATURE_LIFECYCLE_STATUS_INITIATED means feature is created but not yet active
  VALUATION_FEATURE_LIFECYCLE_STATUS_INITIATED = 1;
  // VALUATION_FEATURE_LIFECYCLE_STATUS_ACTIVE means feature is active and can be used for valuation
  VALUATION_FEATURE_LIFECYCLE_STATUS_ACTIVE = 2;
  // VALUATION_FEATURE_LIFECYCLE_STATUS_TERMINATED means feature is no longer active (terminal state)
  VALUATION_FEATURE_LIFECYCLE_STATUS_TERMINATED = 3;
}

// ValuationFeatureAction defines the control operations for valuation features
enum ValuationFeatureAction {
  // VALUATION_FEATURE_ACTION_UNSPECIFIED is the default value
  VALUATION_FEATURE_ACTION_UNSPECIFIED = 0;
  // VALUATION_FEATURE_ACTION_ACTIVATE transitions from INITIATED to ACTIVE
  VALUATION_FEATURE_ACTION_ACTIVATE = 1;
  // VALUATION_FEATURE_ACTION_TERMINATE transitions from ACTIVE to TERMINATED
  VALUATION_FEATURE_ACTION_TERMINATE = 2;
}

// ValuationFeature represents a valuation method assignment for an internal bank account.
// It maps an input instrument (e.g., USD) to the account's native instrument (e.g., GBP)
// using a specific valuation method from the Valuation Engine Service.
message ValuationFeature {
  // id is the unique identifier for this valuation feature
  string id = 1;

  // account_id is the account this feature belongs to
  string account_id = 2;

  // instrument_code is the input instrument to be valued (e.g., "USD", "EUR", "kWh")
  string instrument_code = 3;

  // valuation_method_id references the valuation method in Valuation Engine Service
  string valuation_method_id = 4;

  // valuation_method_version is the specific version of the method
  int32 valuation_method_version = 5;

  // parameters contains method-specific configuration (JSON object)
  string parameters = 6;

  // lifecycle_status is the current state of this feature
  ValuationFeatureLifecycleStatus lifecycle_status = 7;

  // valid_from is the bi-temporal validity start timestamp
  google.protobuf.Timestamp valid_from = 8;

  // valid_to is the bi-temporal validity end timestamp
  google.protobuf.Timestamp valid_to = 9;

  // created_at is when this feature was created
  google.protobuf.Timestamp created_at = 10;

  // created_by is the user who created this feature
  string created_by = 11;

  // updated_at is when this feature was last updated
  google.protobuf.Timestamp updated_at = 12;

  // updated_by is the user who last updated this feature
  string updated_by = 13;

  // version is used for optimistic locking
  int32 version = 14;
}

// Request to create a valuation feature for an internal bank account
message CreateValuationFeatureRequest {
  // account_id is the account to add the valuation feature to (required)
  // Accepts both UUID and account_code for lookup
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // instrument_code is the input instrument to be valued (required)
  // Example: "USD" for a GBP account would create a USD→GBP valuation feature
  string instrument_code = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];

  // valuation_method_id references the valuation method in Valuation Engine Service (required)
  // The method's output_instrument MUST match the account's native instrument
  string valuation_method_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // valuation_method_version is the specific version of the method (required)
  int32 valuation_method_version = 4 [(buf.validate.field).int32 = {gte: 1}];

  // parameters contains method-specific configuration as JSON string (optional)
  string parameters = 5;

  // output_instrument is the expected output instrument of the valuation method (required)
  // This MUST match the account's native instrument (instrument_code)
  // Used for validation - will return FAILED_PRECONDITION if mismatch
  string output_instrument = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
}

// Response for creating a valuation feature
message CreateValuationFeatureResponse {
  // feature is the created valuation feature
  ValuationFeature feature = 1;
}

// Request to update a valuation feature lifecycle status
message UpdateValuationFeatureRequest {
  // feature_id is the valuation feature to update (required)
  string feature_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // action is the lifecycle transition to perform (required)
  ValuationFeatureAction action = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// Response for updating a valuation feature
message UpdateValuationFeatureResponse {
  // feature is the updated valuation feature
  ValuationFeature feature = 1;
}

// Request to get a valuation feature
// Supports two modes:
// 1. By feature_id: Direct lookup
// 2. By account_id + instrument_code + knowledge_at: Bi-temporal query
message GetValuationFeatureRequest {
  // feature_id for direct lookup (optional, mutually exclusive with account lookup)
  string feature_id = 1;

  // account_id for bi-temporal lookup (optional, requires instrument_code)
  string account_id = 2;

  // instrument_code for bi-temporal lookup (optional, requires account_id)
  string instrument_code = 3;

  // knowledge_at is the point-in-time for bi-temporal query (optional, defaults to now)
  // Used with account_id + instrument_code to find the valid feature at that time
  google.protobuf.Timestamp knowledge_at = 4;
}

// Response for getting a valuation feature
message GetValuationFeatureResponse {
  // feature is the requested valuation feature
  ValuationFeature feature = 1;
}

// Request to list valuation features for an internal bank account
message ListValuationFeaturesRequest {
  // account_id to list features for (required)
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // lifecycle_status to filter by (optional, returns all if not specified)
  ValuationFeatureLifecycleStatus lifecycle_status = 2;
}

// Response for listing valuation features
message ListValuationFeaturesResponse {
  // features is the list of valuation features for the account
  repeated ValuationFeature features = 1;
}

// ========================================
// Valuation Analysis Messages
// ========================================

// ValuationWarning represents a warning generated during valuation execution.
// Warnings indicate degraded conditions that did not prevent computation
// but may affect result confidence.
message ValuationWarning {
  // code is a machine-readable warning code (e.g., "STALE_MARKET_DATA", "MISSING_POLICY")
  string code = 1;

  // message is a human-readable description of the warning
  string message = 2;

  // severity indicates the warning impact: "INFO", "WARNING", "DEGRADED"
  string severity = 3;
}

// MarketDataQuality describes the quality assessment of market data used in valuation.
message MarketDataQuality {
  // source identifies where the market data came from (e.g., "live_feed", "cache", "fallback")
  string source = 1;

  // quality_level indicates data quality: "ACTUAL", "ESTIMATE", "STALE", "FALLBACK"
  string quality_level = 2;

  // observed_at is when the market data was observed
  google.protobuf.Timestamp observed_at = 3;

  // staleness_seconds indicates how old the data is relative to valuation time
  int64 staleness_seconds = 4;
}

// ValuationAnalysis provides transparency into how a valuation was computed.
// Returned with both inquiry (EvaluateAssetValuation) and binding operations
// to enable audit trails and Ghost Pricing prevention.
message ValuationAnalysis {
  // method_id is the valuation method used
  string method_id = 1;

  // method_version is the specific version of the method
  string method_version = 2;

  // applied_rates contains the rates/factors applied during valuation
  // Key: rate name (e.g., "fx_rate", "spread"), Value: rate value as string
  map<string, string> applied_rates = 3;

  // observation_ids references the market data observations used
  repeated string observation_ids = 4;

  // computed_at is when the valuation was computed
  google.protobuf.Timestamp computed_at = 5;

  // knowledge_at is the point-in-time used for bi-temporal data resolution
  google.protobuf.Timestamp knowledge_at = 6;

  // account_parameters contains the account-specific valuation parameters (from ValuationFeature)
  google.protobuf.Struct account_parameters = 7;

  // market_data_qualities describes the quality of each market data source used
  repeated MarketDataQuality market_data_qualities = 8;

  // calculation_path describes the sequence of operations performed
  repeated string calculation_path = 9;

  // degraded_mode indicates whether the valuation ran in degraded mode
  // (e.g., using stale cache data because live market data was unavailable)
  bool degraded_mode = 10;

  // warnings contains any warnings generated during valuation
  repeated ValuationWarning warnings = 11;
}

// ========================================
// Asset Valuation Messages
// ========================================

// Request to evaluate an asset valuation (inquiry-only, non-binding).
// Returns the valuation result without creating any financial commitment.
// CRITICAL: Uses the same valuateInternal() logic as any binding operation to prevent Ghost Pricing.
message EvaluateAssetValuationRequest {
  // account_id is the account to evaluate valuation for (required)
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // input is the amount and instrument to be valued (required)
  // Example: { amount: "100.00", instrument_code: "USD" } for a GBP account
  meridian.quantity.v1.InstrumentAmount input = 2 [(buf.validate.field).required = true];

  // knowledge_at is the point-in-time for bi-temporal data resolution (optional, defaults to now)
  // Controls which valuation feature and market data are used
  google.protobuf.Timestamp knowledge_at = 3;
}

// Response for evaluating an asset valuation (inquiry-only).
message EvaluateAssetValuationResponse {
  // output is the valued amount in the account's native instrument
  // Example: { amount: "79.50", instrument_code: "GBP" } for USD->GBP conversion
  meridian.quantity.v1.InstrumentAmount output = 1;

  // basis provides full transparency into the valuation computation
  ValuationAnalysis basis = 2;

  // execution_time_ms is how long the valuation took to compute
  string execution_time_ms = 3;

  // cache_hit indicates whether the result was served from cache
  bool cache_hit = 4;

  // is_estimate indicates this is a non-binding inquiry result
  // Always true for EvaluateAssetValuation responses
  bool is_estimate = 5;
}

// ========================================
// Lien Messages
// ========================================

// Lien represents a fund reservation (hold) on an internal bank account.
// Used by Payment Order to reserve funds before executing payments.
// Invariant: Available Balance = Current Balance - Sum(Active Liens)
//
// Multi-asset support: IBA liens use InstrumentAmount natively. When the input
// instrument differs from the account's native instrument, atomic valuation is
// performed to produce a price-locked valued_amount.
message Lien {
  // lien_id is the unique identifier for this lien.
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_id is the account this lien belongs to.
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the reserved amount in the account's native instrument.
  meridian.quantity.v1.InstrumentAmount amount = 3 [(buf.validate.field).required = true];

  // status is the current lien lifecycle state.
  LienStatus status = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // payment_order_reference is the Payment Order that created this lien.
  string payment_order_reference = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[a-zA-Z0-9_/-]+$"
  }];

  // created_at is when the lien was created.
  google.protobuf.Timestamp created_at = 6 [(buf.validate.field).required = true];

  // updated_at is when the lien was last modified.
  google.protobuf.Timestamp updated_at = 7 [(buf.validate.field).required = true];

  // bucket_id is the fungibility key for bucket-aware reservations.
  // Empty string represents the default bucket.
  string bucket_id = 8 [(buf.validate.field).string = {max_len: 255}];

  // reserved_quantity is the original input amount before valuation (e.g., 100 kWh).
  // Only present for liens that went through atomic valuation.
  meridian.quantity.v1.InstrumentAmount reserved_quantity = 9;

  // valued_amount is the price-locked valuation result in the account's native instrument.
  // Only present for liens that went through atomic valuation.
  meridian.quantity.v1.InstrumentAmount valued_amount = 10;

  // termination_reason explains why the lien was terminated (only set when TERMINATED).
  string termination_reason = 11;

  // expires_at is the optional expiration time for automatic termination.
  google.protobuf.Timestamp expires_at = 12;

  // version is used for optimistic locking.
  int32 version = 13 [(buf.validate.field).int32 = {gte: 0}];
}

// InitiateLienRequest creates a new lien on an internal bank account.
// Supports multi-asset input with atomic valuation (price lock).
message InitiateLienRequest {
  // account_id is the account to place the lien on.
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // input is the amount to reserve. For same-instrument liens, use the account's
  // native instrument. For cross-instrument liens (e.g., kWh on GBP account),
  // atomic valuation is performed using the configured ValuationFeature.
  meridian.quantity.v1.InstrumentAmount input = 2 [(buf.validate.field).required = true];

  // payment_order_reference identifies the Payment Order creating this lien.
  string payment_order_reference = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[a-zA-Z0-9_/-]+$"
  }];

  // bucket_id is the fungibility key for bucket-aware reservations (optional).
  string bucket_id = 4 [(buf.validate.field).string = {max_len: 255}];

  // knowledge_at is the point-in-time for bi-temporal data resolution (optional, defaults to now).
  google.protobuf.Timestamp knowledge_at = 5;

  // expires_at is the optional expiration time for automatic termination of stale liens.
  google.protobuf.Timestamp expires_at = 6;
}

// InitiateLienResponse returns the created lien.
message InitiateLienResponse {
  // lien is the created lien with ACTIVE status.
  Lien lien = 1 [(buf.validate.field).required = true];

  // valued_amount is the price-locked valuation result in the account's native instrument.
  // Only present when the input instrument differs from the account's native instrument.
  meridian.quantity.v1.InstrumentAmount valued_amount = 2;

  // basis provides full transparency into the valuation computation.
  // Only present when atomic valuation was performed.
  ValuationAnalysis basis = 3;
}

// ExecuteLienRequest converts a lien reservation to an actual debit.
message ExecuteLienRequest {
  // lien_id is the lien to execute.
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // idempotency_key ensures exactly-once lien execution for retry scenarios.
  meridian.common.v1.IdempotencyKey idempotency_key = 2;
}

// ExecuteLienResponse returns the executed lien.
message ExecuteLienResponse {
  // lien is the executed lien with EXECUTED status.
  Lien lien = 1 [(buf.validate.field).required = true];
}

// TerminateLienRequest releases the reservation without executing.
message TerminateLienRequest {
  // lien_id is the lien to terminate.
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // reason is an optional explanation for termination (for audit trail).
  string reason = 2 [(buf.validate.field).string = {max_len: 500}];

  // idempotency_key ensures exactly-once lien termination for retry scenarios.
  meridian.common.v1.IdempotencyKey idempotency_key = 3;
}

// TerminateLienResponse returns the terminated lien.
message TerminateLienResponse {
  // lien is the terminated lien with TERMINATED status.
  Lien lien = 1 [(buf.validate.field).required = true];
}

// RetrieveLienRequest fetches a lien by ID.
message RetrieveLienRequest {
  // lien_id is the lien to retrieve.
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// RetrieveLienResponse returns the requested lien.
message RetrieveLienResponse {
  // lien is the requested lien.
  Lien lien = 1 [(buf.validate.field).required = true];
}

// ========================================
// Service Definition
// ========================================

// InternalBankAccountService provides BIAN-compliant internal bank account operations.
// Internal bank accounts are non-customer-facing accounts used for operational purposes
// such as clearing, correspondent banking (nostro/vostro), holding, suspense, and GL entries.
//
// Design Notes:
// - DELETE operations are intentionally not provided. Accounts are managed through
//   status transitions (Active -> Suspended -> Closed) for audit compliance.
// - Balance queries route to Position Keeping service - internal accounts participate
//   in the universal position tracking system.
// - No RecordPosting RPC - postings flow through Financial Accounting -> Position Keeping.
service InternalBankAccountService {
  // InitiateInternalBankAccount creates a new internal bank account.
  // The account is created in ACTIVE status.
  rpc InitiateInternalBankAccount(InitiateInternalBankAccountRequest) returns (InitiateInternalBankAccountResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-accounts"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Internal bank account created successfully"
        }
      }
    };
  }

  // UpdateInternalBankAccount modifies account settings (partial update).
  // Cannot change account_type or instrument_code after creation.
  rpc UpdateInternalBankAccount(UpdateInternalBankAccountRequest) returns (UpdateInternalBankAccountResponse) {
    option (google.api.http) = {
      patch: "/v1/internal-bank-accounts/{account_id}"
      body: "*"
    };
  }

  // ControlInternalBankAccount performs lifecycle state transitions.
  // Supports SUSPEND, ACTIVATE, and CLOSE actions with audit trail.
  rpc ControlInternalBankAccount(ControlInternalBankAccountRequest) returns (ControlInternalBankAccountResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-accounts/{account_id}/control"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "200"
        value: {
          description: "Control action executed successfully"
        }
      }
    };
  }

  // RetrieveInternalBankAccount fetches a single account by ID.
  rpc RetrieveInternalBankAccount(RetrieveInternalBankAccountRequest) returns (RetrieveInternalBankAccountResponse) {
    option (google.api.http) = {
      get: "/v1/internal-bank-accounts/{account_id}"
    };
  }

  // ListInternalBankAccounts queries accounts with filtering and pagination.
  rpc ListInternalBankAccounts(ListInternalBankAccountsRequest) returns (ListInternalBankAccountsResponse) {
    option (google.api.http) = {
      get: "/v1/internal-bank-accounts"
    };
  }

  // GetBalance queries the current balance for an internal account.
  // The balance is retrieved from Position Keeping service (source of truth).
  // Internal Bank Account does not store balance locally - Position Keeping maintains
  // the transaction log and computes balances per BIAN architecture.
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse) {
    option (google.api.http) = {
      get: "/v1/internal-bank-accounts/{account_id}/balance"
    };
  }

  // CreateValuationFeature adds a valuation method assignment to an internal bank account.
  // The valuation feature maps an input instrument to the account's native instrument.
  // CRITICAL: The method's output_instrument MUST match the account's native instrument.
  // Returns FAILED_PRECONDITION if there's a mismatch (MethodOutputMismatchError).
  rpc CreateValuationFeature(CreateValuationFeatureRequest) returns (CreateValuationFeatureResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-accounts/{account_id}/valuation-features"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a valuation feature for an internal bank account"
      description: "Adds a valuation method assignment to map an input instrument to the account's native instrument"
      responses: {
        key: "201"
        value: {
          description: "Valuation feature created successfully"
        }
      }
    };
  }

  // UpdateValuationFeature performs lifecycle transitions on a valuation feature.
  // Supports ACTIVATE (INITIATED -> ACTIVE) and TERMINATE (ACTIVE -> TERMINATED) actions.
  rpc UpdateValuationFeature(UpdateValuationFeatureRequest) returns (UpdateValuationFeatureResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-account-valuation-features/{feature_id}/control"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update valuation feature lifecycle status"
      description: "Performs lifecycle transitions (activate/terminate) on a valuation feature"
    };
  }

  // GetValuationFeature retrieves a valuation feature by ID or by account+instrument with bi-temporal query.
  // Supports two query modes:
  // 1. By feature_id: Direct lookup
  // 2. By account_id + instrument_code + knowledge_at: Find the valid feature at a specific time
  rpc GetValuationFeature(GetValuationFeatureRequest) returns (GetValuationFeatureResponse) {
    option (google.api.http) = {
      get: "/v1/internal-bank-account-valuation-features/{feature_id}"
      additional_bindings: {
        get: "/v1/internal-bank-accounts/{account_id}/valuation-features/lookup"
      }
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get a valuation feature"
      description: "Retrieves a valuation feature by ID or by account+instrument with optional bi-temporal query"
    };
  }

  // EvaluateAssetValuation performs an inquiry-only (non-binding) valuation.
  // Returns the estimated valued amount without creating any financial commitment.
  // CRITICAL: Uses the same valuateInternal() logic as binding operations to prevent Ghost Pricing -
  // ensuring inquiry and binding always produce identical results for identical inputs.
  rpc EvaluateAssetValuation(EvaluateAssetValuationRequest) returns (EvaluateAssetValuationResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-accounts/{account_id}/evaluate-valuation"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Evaluate asset valuation (inquiry-only)"
      description: "Performs a non-binding valuation using the same logic as binding operations to prevent Ghost Pricing"
    };
  }

  // ListValuationFeatures retrieves all valuation features for an internal bank account.
  // Optionally filters by lifecycle status.
  rpc ListValuationFeatures(ListValuationFeaturesRequest) returns (ListValuationFeaturesResponse) {
    option (google.api.http) = {
      get: "/v1/internal-bank-accounts/{account_id}/valuation-features"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List valuation features for an internal bank account"
      description: "Retrieves all valuation features for an account with optional status filter"
    };
  }

  // InitiateLien creates a new fund reservation on an internal bank account.
  // Supports multi-asset input with atomic valuation for cross-instrument liens.
  // CRITICAL: Uses valuateInternal() shared with EvaluateAssetValuation to prevent Ghost Pricing.
  rpc InitiateLien(InitiateLienRequest) returns (InitiateLienResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-accounts/{account_id}/liens"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a fund reservation (lien) on an internal bank account"
      description: "Reserves funds with optional multi-asset valuation. Uses the same pricing logic as inquiry to prevent Ghost Pricing."
      responses: {
        key: "201"
        value: {
          description: "Lien created successfully"
        }
      }
    };
  }

  // ExecuteLien converts a lien reservation to an actual debit.
  // Transitions lien from ACTIVE to EXECUTED (terminal, idempotent).
  rpc ExecuteLien(ExecuteLienRequest) returns (ExecuteLienResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-account-liens/{lien_id}/execute"
      body: "*"
    };
  }

  // TerminateLien releases reserved funds without executing.
  // Transitions lien from ACTIVE to TERMINATED (terminal, idempotent).
  rpc TerminateLien(TerminateLienRequest) returns (TerminateLienResponse) {
    option (google.api.http) = {
      post: "/v1/internal-bank-account-liens/{lien_id}/terminate"
      body: "*"
    };
  }

  // RetrieveLien fetches a lien by ID.
  rpc RetrieveLien(RetrieveLienRequest) returns (RetrieveLienResponse) {
    option (google.api.http) = {
      get: "/v1/internal-bank-account-liens/{lien_id}"
    };
  }
}
