syntax = "proto3";

package meridian.current_account.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/current_account/v1;currentaccountv1";

// AccountStatus defines the lifecycle state of a current account facility
enum AccountStatus {
  // ACCOUNT_STATUS_UNSPECIFIED means the status is unknown
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  // ACCOUNT_STATUS_ACTIVE means the account is operational and can process transactions
  ACCOUNT_STATUS_ACTIVE = 1;
  // ACCOUNT_STATUS_FROZEN means the account is temporarily suspended
  ACCOUNT_STATUS_FROZEN = 2;
  // ACCOUNT_STATUS_CLOSED means the account is permanently closed
  ACCOUNT_STATUS_CLOSED = 3;
}

// CurrentAccountFacility represents a BIAN-compliant current account facility
// Task 5.1: Define CurrentAccountFacility message with account identification and status management
message CurrentAccountFacility {
  // account_id is the unique identifier for this account facility
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // account_identification is the IBAN or other standard account identifier
  string account_identification = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 34  // IBAN max length
  }];

  // account_status is the current lifecycle state of the account
  AccountStatus account_status = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]  // Prevent UNSPECIFIED in requests
  }];

  // base_currency is the primary currency for this account
  meridian.common.v1.Currency base_currency = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]  // Prevent UNSPECIFIED currency
  }];

  // created_at is when the account facility was created
  google.protobuf.Timestamp created_at = 5;

  // updated_at is when the account facility was last modified
  google.protobuf.Timestamp updated_at = 6;

  // version is for optimistic locking
  int32 version = 7 [(buf.validate.field).int32 = {gte: 0}];

  // current_balance tracks the current account balance
  // Task 5.2: Implement account balance tracking and overdraft limits
  AccountBalance current_balance = 8;

  // overdraft_limit configures the overdraft facility for this account
  OverdraftConfiguration overdraft_limit = 9;

  // transaction_history tracks recent transactions for this account
  // Task 5.4: Add transaction history and account status management features
  TransactionHistory transaction_history = 10;
}

// AccountBalance represents the current balance state of an account
// Task 5.2: Account balance tracking
message AccountBalance {
  // current_balance is the actual account balance (can be negative if overdrawn)
  meridian.common.v1.MoneyAmount current_balance = 1 [(buf.validate.field).required = true];

  // available_balance is current balance plus overdraft limit (if enabled)
  meridian.common.v1.MoneyAmount available_balance = 2 [(buf.validate.field).required = true];

  // last_updated is when the balance was last calculated
  google.protobuf.Timestamp last_updated = 3 [(buf.validate.field).required = true];
}

// OverdraftConfiguration defines the overdraft facility settings
// Task 5.2: Overdraft limits
message OverdraftConfiguration {
  // overdraft_limit is the maximum overdraft amount allowed
  meridian.common.v1.MoneyAmount overdraft_limit = 1 [(buf.validate.field).required = true];

  // interest_rate is the annual percentage rate for overdraft usage
  double interest_rate = 2 [(buf.validate.field).double = {
    gte: 0
    lte: 100
  }];

  // is_enabled indicates if overdraft facility is active
  bool is_enabled = 3;

  // last_updated is when the overdraft configuration was last modified
  google.protobuf.Timestamp last_updated = 4;
}

// AccountTransaction represents a debit or credit transaction on an account
// Task 5.3: Create debit/credit transaction operations
message AccountTransaction {
  // transaction_id is the unique identifier for this transaction
  string transaction_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // account_id is the account this transaction belongs to
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // direction is whether this is a debit or credit
  meridian.common.v1.PostingDirection direction = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]  // Prevent UNSPECIFIED
  }];

  // amount is the transaction amount
  meridian.common.v1.MoneyAmount amount = 4 [(buf.validate.field).required = true];

  // status is the current transaction status
  meridian.common.v1.TransactionStatus status = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]  // Prevent UNSPECIFIED
  }];

  // description is a human-readable transaction description
  string description = 6 [(buf.validate.field).string = {
    max_len: 500
  }];

  // reference is an external reference or payment reference
  string reference = 7 [(buf.validate.field).string = {
    max_len: 100
  }];

  // timestamp is when the transaction occurred
  google.protobuf.Timestamp timestamp = 8 [(buf.validate.field).required = true];
}

// TransactionHistory represents the transaction history for an account
// Task 5.4: Add transaction history and account status management features
message TransactionHistory {
  // account_id is the account this history belongs to
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // transactions is the list of transactions (most recent first)
  repeated AccountTransaction transactions = 2;

  // total_count is the total number of transactions (for pagination)
  int64 total_count = 3 [(buf.validate.field).int64 = {gte: 0}];

  // last_updated is when the history was last updated
  google.protobuf.Timestamp last_updated = 4;
}
