syntax = "proto3";

package meridian.current_account.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";
import "meridian/quantity/v1/quantity.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/current_account/v1;currentaccountv1";

// OpenAPI specification metadata for Current Account Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Current Account Service API"
    version: "1.0"
    description: "BIAN-compliant current account operations including deposits, "
                 "withdrawals, and lien management for fund reservations."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
};

// AccountStatus defines the lifecycle state of a current account facility
enum AccountStatus {
  // ACCOUNT_STATUS_UNSPECIFIED means the status is unknown
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  // ACCOUNT_STATUS_ACTIVE means the account is operational and can process transactions
  ACCOUNT_STATUS_ACTIVE = 1;
  // ACCOUNT_STATUS_FROZEN means the account is temporarily suspended
  ACCOUNT_STATUS_FROZEN = 2;
  // ACCOUNT_STATUS_CLOSED means the account is permanently closed
  ACCOUNT_STATUS_CLOSED = 3;
}

// Transaction status for deposit/withdrawal operations
enum TransactionStatus {
  // TRANSACTION_STATUS_UNSPECIFIED is the default value and should not be used in requests
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  // TRANSACTION_STATUS_PENDING indicates the transaction is awaiting processing
  TRANSACTION_STATUS_PENDING = 1;
  // TRANSACTION_STATUS_COMPLETED indicates the transaction has been successfully processed
  TRANSACTION_STATUS_COMPLETED = 2;
  // TRANSACTION_STATUS_FAILED indicates the transaction processing failed
  TRANSACTION_STATUS_FAILED = 3;
  // TRANSACTION_STATUS_REVERSED indicates the transaction has been reversed or cancelled
  TRANSACTION_STATUS_REVERSED = 4;
}

// LienStatus defines the lifecycle state of a fund reservation (lien)
// A lien is a hold placed on funds to reserve them for a pending payment
enum LienStatus {
  // LIEN_STATUS_UNSPECIFIED is the default value and should not be used
  LIEN_STATUS_UNSPECIFIED = 0;
  // LIEN_STATUS_ACTIVE means the funds are currently reserved
  LIEN_STATUS_ACTIVE = 1;
  // LIEN_STATUS_EXECUTED means the lien was converted to an actual debit
  LIEN_STATUS_EXECUTED = 2;
  // LIEN_STATUS_TERMINATED means the lien was released without execution
  LIEN_STATUS_TERMINATED = 3;
}

// ControlAction defines the control operations that can be performed on an account
// These are BIAN Control Record (CoCR) operations for account lifecycle management
enum ControlAction {
  // CONTROL_ACTION_UNSPECIFIED is the default value and should not be used
  CONTROL_ACTION_UNSPECIFIED = 0;
  // CONTROL_ACTION_FREEZE temporarily suspends account operations (reversible)
  // Transitions: ACTIVE → FROZEN
  CONTROL_ACTION_FREEZE = 1;
  // CONTROL_ACTION_UNFREEZE restores a frozen account to active status
  // Transitions: FROZEN → ACTIVE
  CONTROL_ACTION_UNFREEZE = 2;
  // CONTROL_ACTION_CLOSE permanently closes the account (irreversible)
  // Transitions: ACTIVE or FROZEN → CLOSED
  CONTROL_ACTION_CLOSE = 3;
}

// CurrentAccountFacility represents a BIAN-compliant current account facility
// Task 5.1: Define CurrentAccountFacility message with account identification and status management
message CurrentAccountFacility {
  // account_id is the unique identifier for this account facility (alphanumeric with hyphens/underscores).
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_identification is the IBAN or other standard account identifier.
  // IBAN format: 2 letter country code + 2 check digits + up to 30 alphanumeric characters.
  string account_identification = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 34 // IBAN max length
    pattern: "^[A-Z]{2}[0-9]{2}[A-Z0-9]{1,30}$" // IBAN format validation
  }];

  // account_status is the current lifecycle state of the account
  AccountStatus account_status = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Prevent UNSPECIFIED in requests */
  }];

  // base_currency is the primary currency for this account
  meridian.common.v1.Currency base_currency = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Prevent UNSPECIFIED currency */
  }];

  // created_at is when the account facility was created
  google.protobuf.Timestamp created_at = 5;

  // updated_at is when the account facility was last modified
  google.protobuf.Timestamp updated_at = 6;

  // version is for optimistic locking
  int32 version = 7 [(buf.validate.field).int32 = {gte: 0}];

  // current_balance tracks the current account balance
  // Task 5.2: Implement account balance tracking and overdraft limits
  AccountBalance current_balance = 8;

  // overdraft_limit configures the overdraft facility for this account
  OverdraftConfiguration overdraft_limit = 9;

  // transaction_history tracks recent transactions for this account
  // Task 5.4: Add transaction history and account status management features
  TransactionHistory transaction_history = 10;

  // org_party_id references the organization party for org-scoped accounts.
  // Empty for personal accounts. Used for syndicate-style multi-party ownership.
  string org_party_id = 11 [(buf.validate.field).string = {
    pattern: "^[a-zA-Z0-9_-]*$"
    max_len: 100
  }];

  // product_type_code is the account type code from the Product Directory (immutable after creation).
  string product_type_code = 12;

  // product_type_version is the pinned version of the product type definition (immutable after creation).
  int32 product_type_version = 13;
}

// AccountBalance represents the current balance state of an account
// Task 5.2: Account balance tracking
message AccountBalance {
  // current_balance is the actual account balance (can be negative if overdrawn)
  meridian.common.v1.MoneyAmount current_balance = 1 [(buf.validate.field).required = true];

  // available_balance is current balance plus overdraft limit (if enabled)
  meridian.common.v1.MoneyAmount available_balance = 2 [(buf.validate.field).required = true];

  // last_updated is when the balance was last calculated
  google.protobuf.Timestamp last_updated = 3 [(buf.validate.field).required = true];
}

// OverdraftConfiguration defines the overdraft facility settings
// Task 5.2: Overdraft limits
message OverdraftConfiguration {
  // overdraft_limit is the maximum overdraft amount allowed
  meridian.common.v1.MoneyAmount overdraft_limit = 1 [(buf.validate.field).required = true];

  // interest_rate is the annual percentage rate for overdraft usage
  double interest_rate = 2 [(buf.validate.field).double = {
    gte: 0
    lte: 100
  }];

  // is_enabled indicates if overdraft facility is active
  bool is_enabled = 3;

  // last_updated is when the overdraft configuration was last modified
  google.protobuf.Timestamp last_updated = 4;
}

// AccountTransaction represents a debit or credit transaction on an account
// Task 5.3: Create debit/credit transaction operations
message AccountTransaction {
  // transaction_id is the unique identifier for this transaction (alphanumeric with hyphens/underscores).
  string transaction_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_id is the account this transaction belongs to (alphanumeric with hyphens/underscores).
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // direction is whether this is a debit or credit
  meridian.common.v1.PostingDirection direction = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Prevent UNSPECIFIED */
  }];

  // amount is the transaction amount
  meridian.common.v1.MoneyAmount amount = 4 [(buf.validate.field).required = true];

  // status is the current transaction status
  meridian.common.v1.TransactionStatus status = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Prevent UNSPECIFIED */
  }];

  // description is a human-readable transaction description
  string description = 6 [(buf.validate.field).string = {max_len: 500}];

  // reference is an external reference or payment reference (alphanumeric with hyphens, underscores, slashes).
  string reference = 7 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_/-]*$"
  }];

  // timestamp is when the transaction occurred
  google.protobuf.Timestamp timestamp = 8 [(buf.validate.field).required = true];
}

// TransactionHistory represents the transaction history for an account
// Task 5.4: Add transaction history and account status management features
message TransactionHistory {
  // account_id is the account this history belongs to
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // transactions is the list of transactions (most recent first)
  repeated AccountTransaction transactions = 2;

  // total_count is the total number of transactions (for pagination)
  int64 total_count = 3 [(buf.validate.field).int64 = {gte: 0}];

  // last_updated is when the history was last updated
  google.protobuf.Timestamp last_updated = 4;
}

// Lien represents a fund reservation (hold) on an account
// Used by Payment Order to reserve funds before executing external payments
// Invariant: Available Balance = Current Balance - Sum(Active Liens)
message Lien {
  // lien_id is the unique identifier for this lien
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_id is the account this lien belongs to
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the reserved amount (must be positive, validated at service layer)
  meridian.common.v1.MoneyAmount amount = 3 [(buf.validate.field).required = true];

  // status is the current lien lifecycle state
  // State transitions:
  //   ACTIVE → EXECUTED (via ExecuteLien - idempotent)
  //   ACTIVE → TERMINATED (via TerminateLien)
  //   EXECUTED → no further transitions allowed
  //   TERMINATED → no further transitions allowed
  LienStatus status = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // payment_order_reference is the Payment Order that created this lien
  string payment_order_reference = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[a-zA-Z0-9_/-]+$"
  }];

  // created_at is when the lien was created
  google.protobuf.Timestamp created_at = 6 [(buf.validate.field).required = true];

  // updated_at is when the lien was last modified
  google.protobuf.Timestamp updated_at = 7 [(buf.validate.field).required = true];

  // bucket_id is the fungibility key / bucket identifier for bucket-aware reservations.
  // For Phase 1, this is stored for future bucket-aware position tracking.
  // Empty string represents the default bucket.
  string bucket_id = 8 [(buf.validate.field).string = {max_len: 255}];

  // reserved_quantity is the original input amount before valuation (e.g., 100 kWh).
  // Only present for multi-asset liens that went through atomic valuation.
  meridian.quantity.v1.InstrumentAmount reserved_quantity = 9;

  // valued_amount is the price-locked valuation result in the account's native instrument.
  // This is the amount actually reserved against the account balance (e.g., 35.00 GBP).
  // Only present for multi-asset liens that went through atomic valuation.
  meridian.quantity.v1.InstrumentAmount valued_amount = 10;
}

// Request to initiate a new current account
message InitiateCurrentAccountRequest {
  // party_id references the Party Service for account ownership
  string party_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // account_identification is the IBAN
  string account_identification = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 34
    pattern: "^[A-Z]{2}[0-9]{2}[A-Z0-9]{1,30}$"
  }];

  // base_currency is the account currency
  meridian.common.v1.Currency base_currency = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // org_party_id references the organization party for org-scoped accounts.
  // Empty for personal accounts. Used for syndicate-style multi-party ownership.
  string org_party_id = 4 [(buf.validate.field).string = {
    pattern: "^[a-zA-Z0-9_-]*$"
    max_len: 100
  }];

  // product_type_code references an account type definition in the Product Directory.
  // When provided, the service resolves the product type via LocalAccountTypeCache,
  // validates BehaviorClass == CUSTOMER, evaluates EligibilityCEL, validates attributes
  // against AttributeSchema, and seeds ValuationFeatures from templates.
  // During transition, if empty, the service falls back to base_currency-derived defaults.
  string product_type_code = 5 [(buf.validate.field).string = {
    max_len: 50
    pattern: "^[A-Z0-9_]*$"
  }];

  // product_type_version pins a specific version of the product type definition.
  // If not specified, the latest active version is used.
  optional int32 product_type_version = 6;

  // attributes contains optional key-value pairs validated against the product type's
  // AttributeSchema (JSON Schema). Stored on the account for product-specific metadata.
  map<string, string> attributes = 7;
}

// Response for initiating a current account
message InitiateCurrentAccountResponse {
  // account_id is the newly created account ID
  string account_id = 1;

  // facility is the complete account facility details
  CurrentAccountFacility facility = 2;
}

// Request to execute a deposit (Behavior Qualifier)
message ExecuteDepositRequest {
  // account_id is the account to deposit to
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // amount is the deposit amount
  meridian.common.v1.MoneyAmount amount = 2 [(buf.validate.field).required = true];

  // description is optional deposit description
  string description = 3 [(buf.validate.field).string = {max_len: 500}];

  // reference is optional reference
  string reference = 4 [(buf.validate.field).string = {max_len: 100}];

  // idempotency_key ensures exactly-once deposit execution for retry scenarios
  meridian.common.v1.IdempotencyKey idempotency_key = 5;

  // attributes contains optional key-value pairs for fungibility validation.
  // For non-fungible instruments (e.g., RICE-KG with batch tracking), the deposit
  // must have attributes that match the credit side's attributes according to
  // the instrument's fungibility_key_expression.
  // Example: {"batch_id": "2024-A", "grade": "premium"}
  map<string, string> attributes = 6;
}

// Response for deposit execution
message ExecuteDepositResponse {
  // account_id is the account ID
  string account_id = 1;

  // transaction_id is the created transaction ID
  string transaction_id = 2;

  // new_balance is the updated account balance
  meridian.common.v1.MoneyAmount new_balance = 3;

  // available_balance is the updated available balance
  meridian.common.v1.MoneyAmount available_balance = 4;

  // status is the transaction status
  TransactionStatus status = 5;
}

// WithdrawalStatus defines the lifecycle state of a withdrawal operation
// Withdrawals follow a two-phase pattern: Initiate (validate and hold) -> Execute (commit)
enum WithdrawalStatus {
  // WITHDRAWAL_STATUS_UNSPECIFIED is the default value and should not be used
  WITHDRAWAL_STATUS_UNSPECIFIED = 0;
  // WITHDRAWAL_STATUS_INITIATED means the withdrawal has been validated but not yet executed
  WITHDRAWAL_STATUS_INITIATED = 1;
  // WITHDRAWAL_STATUS_COMPLETED means the withdrawal has been successfully executed
  WITHDRAWAL_STATUS_COMPLETED = 2;
  // WITHDRAWAL_STATUS_FAILED means the withdrawal execution failed
  WITHDRAWAL_STATUS_FAILED = 3;
  // WITHDRAWAL_STATUS_CANCELLED means the withdrawal was cancelled before execution
  WITHDRAWAL_STATUS_CANCELLED = 4;
}

// Withdrawal represents a pending or completed withdrawal operation
message Withdrawal {
  // withdrawal_id is the unique identifier for this withdrawal
  string withdrawal_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // account_id is the account this withdrawal belongs to
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the withdrawal amount (must be positive)
  meridian.common.v1.MoneyAmount amount = 3 [(buf.validate.field).required = true];

  // status is the current withdrawal lifecycle state
  WithdrawalStatus status = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // description is a human-readable withdrawal description
  string description = 5 [(buf.validate.field).string = {max_len: 500}];

  // reference is an external reference for this withdrawal
  string reference = 6 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_/-]*$"
  }];

  // transaction_id is set once the withdrawal is executed
  string transaction_id = 7 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]*$"
  }];

  // created_at is when the withdrawal was initiated
  google.protobuf.Timestamp created_at = 8;

  // updated_at is when the withdrawal was last modified
  google.protobuf.Timestamp updated_at = 9;
}

// Request to initiate a withdrawal (validate and prepare, but not execute)
// BQ: Initiate - Creates a pending withdrawal for later execution
message InitiateWithdrawalRequest {
  // account_id is the account to withdraw from
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the withdrawal amount (must be positive)
  meridian.common.v1.MoneyAmount amount = 2 [(buf.validate.field).required = true];

  // description is optional withdrawal description
  string description = 3 [(buf.validate.field).string = {max_len: 500}];

  // reference is optional external reference
  string reference = 4 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_/-]*$"
  }];

  // idempotency_key ensures exactly-once withdrawal initiation
  meridian.common.v1.IdempotencyKey idempotency_key = 5;

  // attributes contains optional key-value pairs for fungibility validation.
  // For non-fungible instruments (e.g., RICE-KG with batch tracking), the withdrawal
  // must have attributes that match the debit side's attributes according to
  // the instrument's fungibility_key_expression.
  // Example: {"batch_id": "2024-A", "grade": "premium"}
  map<string, string> attributes = 6;
}

// Response for initiating a withdrawal
message InitiateWithdrawalResponse {
  // withdrawal is the created withdrawal with INITIATED status
  Withdrawal withdrawal = 1 [(buf.validate.field).required = true];

  // validation_passed indicates all validation checks passed
  bool validation_passed = 2;

  // validation_messages contains any validation warnings or info
  repeated string validation_messages = 3;
}

// Request to execute a withdrawal (commit the withdrawal)
// BQ: Execute - Commits a pending withdrawal or performs direct withdrawal
message ExecuteWithdrawalRequest {
  // withdrawal_id is the pending withdrawal to execute (mutually exclusive with direct withdrawal fields)
  string withdrawal_id = 1 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]*$"
  }];

  // For direct execution without prior initiation:
  // account_id is the account to withdraw from
  string account_id = 2 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]*$"
  }];

  // amount is the withdrawal amount for direct execution
  meridian.common.v1.MoneyAmount amount = 3;

  // description is optional withdrawal description for direct execution
  string description = 4 [(buf.validate.field).string = {max_len: 500}];

  // reference is optional external reference for direct execution
  string reference = 5 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_/-]*$"
  }];

  // idempotency_key ensures exactly-once withdrawal execution
  meridian.common.v1.IdempotencyKey idempotency_key = 6;

  // attributes contains optional key-value pairs for fungibility validation.
  // For non-fungible instruments (e.g., RICE-KG with batch tracking), the withdrawal
  // must have attributes that match the debit side's attributes according to
  // the instrument's fungibility_key_expression.
  // Example: {"batch_id": "2024-A", "grade": "premium"}
  map<string, string> attributes = 7;
}

// Response for executing a withdrawal
message ExecuteWithdrawalResponse {
  // account_id is the account withdrawn from
  string account_id = 1;

  // transaction_id is the created debit transaction ID
  string transaction_id = 2;

  // new_balance is the updated account balance after withdrawal
  meridian.common.v1.MoneyAmount new_balance = 3;

  // available_balance is the updated available balance
  meridian.common.v1.MoneyAmount available_balance = 4;

  // status is the withdrawal status (COMPLETED or FAILED)
  WithdrawalStatus status = 5;

  // timestamp is when the withdrawal was executed
  google.protobuf.Timestamp timestamp = 6;
}

// Request to update a pending withdrawal (before execution)
// BQ: Update - Modifies a pending withdrawal's details
message UpdateWithdrawalRequest {
  // withdrawal_id is the withdrawal to update
  string withdrawal_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the updated withdrawal amount (optional, must be positive if provided)
  meridian.common.v1.MoneyAmount amount = 2;

  // description is the updated description (optional)
  string description = 3 [(buf.validate.field).string = {max_len: 500}];

  // reference is the updated external reference (optional)
  string reference = 4 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_/-]*$"
  }];
}

// Response for updating a withdrawal
message UpdateWithdrawalResponse {
  // withdrawal is the updated withdrawal
  Withdrawal withdrawal = 1 [(buf.validate.field).required = true];

  // validation_passed indicates all validation checks passed after update
  bool validation_passed = 2;

  // validation_messages contains any validation warnings or info
  repeated string validation_messages = 3;
}

// Request to retrieve withdrawal details
// BQ: Retrieve - Gets withdrawal details by ID
message RetrieveWithdrawalRequest {
  // withdrawal_id is the withdrawal to retrieve (for single withdrawal lookup)
  string withdrawal_id = 1 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]*$"
  }];

  // account_id is the account to list withdrawals for (for listing by account)
  string account_id = 2 [(buf.validate.field).string = {
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]*$"
  }];

  // pagination controls result pagination when listing by account
  meridian.common.v1.Pagination pagination = 3;

  // status_filter filters withdrawals by status when listing
  WithdrawalStatus status_filter = 4;
}

// Response for retrieving withdrawal(s)
message RetrieveWithdrawalResponse {
  // withdrawal is the requested withdrawal (when retrieving by withdrawal_id)
  Withdrawal withdrawal = 1;

  // withdrawals is the list of withdrawals (when listing by account_id)
  repeated Withdrawal withdrawals = 2;

  // pagination contains pagination metadata for list operations
  meridian.common.v1.PaginationResponse pagination = 3;
}

// Request to retrieve current account details
message RetrieveCurrentAccountRequest {
  // account_id is the account to retrieve
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
}

// Response for retrieving current account
message RetrieveCurrentAccountResponse {
  // facility is the current account facility
  CurrentAccountFacility facility = 1;
}

// Request to initiate a lien (reserve funds) on an account
// BQ: Initiate - Creates a new fund reservation
// Supports both legacy MoneyAmount (currency-only) and multi-asset InstrumentAmount.
// When input (InstrumentAmount) is provided, atomic valuation is performed using
// the account's valuation features to produce a valued_amount (price lock).
message InitiateLienRequest {
  // account_id is the account to place the lien on
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the amount to reserve (legacy, currency-only).
  // Use this for same-currency liens (e.g., GBP lien on GBP account).
  // Mutually exclusive with input - if both provided, input takes precedence.
  meridian.common.v1.MoneyAmount amount = 2;

  // payment_order_reference identifies the Payment Order creating this lien
  // Forward slash allowed for hierarchical Payment Order references
  string payment_order_reference = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[a-zA-Z0-9_/-]+$"
  }];

  // idempotency_key ensures exactly-once lien creation for retry scenarios
  meridian.common.v1.IdempotencyKey idempotency_key = 4;

  // bucket_id is the fungibility key / bucket identifier for bucket-aware reservations.
  // For Phase 1, this is optional - if not provided, defaults to empty string (default bucket).
  // Future phases will support CEL expressions to compute bucket_id from transaction attributes.
  string bucket_id = 5 [(buf.validate.field).string = {max_len: 255}];

  // input is the multi-asset amount to reserve (e.g., 100 kWh, 50 USD).
  // When provided, atomic valuation is performed: the input instrument is converted
  // to the account's native instrument using the configured ValuationFeature.
  // The resulting valued_amount becomes the price lock for this lien.
  meridian.quantity.v1.InstrumentAmount input = 6;

  // knowledge_at is the point-in-time for bi-temporal data resolution (optional, defaults to now).
  // Controls which valuation feature and market data are used for the price lock.
  google.protobuf.Timestamp knowledge_at = 7;
}

// Response for initiating a lien
message InitiateLienResponse {
  // lien is the created lien with ACTIVE status
  Lien lien = 1 [(buf.validate.field).required = true];

  // available_balance is the updated available balance after reservation
  meridian.common.v1.MoneyAmount available_balance = 2 [(buf.validate.field).required = true];

  // valued_amount is the price-locked valuation result in the account's native instrument.
  // Only present when the request used InstrumentAmount input (multi-asset valuation).
  // For same-currency liens (legacy MoneyAmount), this field is not set.
  meridian.quantity.v1.InstrumentAmount valued_amount = 3;

  // basis provides full transparency into the valuation computation.
  // Only present when atomic valuation was performed (input field was provided).
  ValuationAnalysis basis = 4;
}

// Request to execute a lien (convert reservation to actual debit)
// BQ: Execute - Atomically converts lien to debit and removes reservation
message ExecuteLienRequest {
  // lien_id is the lien to execute
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // idempotency_key ensures exactly-once lien execution for retry scenarios
  meridian.common.v1.IdempotencyKey idempotency_key = 2;
}

// Response for executing a lien
message ExecuteLienResponse {
  // lien is the executed lien with EXECUTED status
  Lien lien = 1 [(buf.validate.field).required = true];

  // new_balance is the account balance after the debit
  meridian.common.v1.MoneyAmount new_balance = 2 [(buf.validate.field).required = true];

  // available_balance is the updated available balance
  meridian.common.v1.MoneyAmount available_balance = 3 [(buf.validate.field).required = true];

  // transaction_id is the debit transaction created
  string transaction_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// Request to terminate a lien (release reserved funds)
// BQ: Terminate - Releases the reservation without executing
message TerminateLienRequest {
  // lien_id is the lien to terminate
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // reason is an optional explanation for termination (for audit trail)
  string reason = 2 [(buf.validate.field).string = {max_len: 500}];
}

// Response for terminating a lien
message TerminateLienResponse {
  // lien is the terminated lien with TERMINATED status
  Lien lien = 1 [(buf.validate.field).required = true];

  // available_balance is the updated available balance after release
  meridian.common.v1.MoneyAmount available_balance = 2 [(buf.validate.field).required = true];
}

// Request to retrieve a lien
message RetrieveLienRequest {
  // lien_id is the lien to retrieve
  string lien_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// Response for retrieving a lien
message RetrieveLienResponse {
  // lien is the requested lien
  Lien lien = 1 [(buf.validate.field).required = true];
}

// AmountBlockType defines the type of fund reservation
// Used by Position Keeping to understand the nature of the block
enum AmountBlockType {
  // AMOUNT_BLOCK_TYPE_UNSPECIFIED is the default value and should not be used
  AMOUNT_BLOCK_TYPE_UNSPECIFIED = 0;
  // AMOUNT_BLOCK_TYPE_PENDING indicates a temporary hold pending settlement
  // Example: Payment Order lien awaiting external payment confirmation
  AMOUNT_BLOCK_TYPE_PENDING = 1;
  // AMOUNT_BLOCK_TYPE_FINAL indicates a permanent reservation
  // Example: Regulatory hold, court order freeze
  AMOUNT_BLOCK_TYPE_FINAL = 2;
  // AMOUNT_BLOCK_TYPE_TEMPORARY indicates a short-term hold
  // Example: Authorization hold for card transactions
  AMOUNT_BLOCK_TYPE_TEMPORARY = 3;
}

// AmountBlock represents a fund reservation from the perspective of Position Keeping.
// This abstraction allows Position Keeping to query blocked amounts without coupling
// to the specific Current Account lien implementation.
message AmountBlock {
  // block_id is the unique identifier for this block (maps to lien_id)
  string block_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the reserved amount
  meridian.common.v1.MoneyAmount amount = 2 [(buf.validate.field).required = true];

  // block_type indicates the nature of the reservation
  AmountBlockType block_type = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // purpose describes why the funds are blocked
  // Example: "Payment Order: PO-12345", "Lien hold for settlement"
  string purpose = 4 [(buf.validate.field).string = {max_len: 500}];

  // expires_at is when the block expires (optional, null means no expiry)
  google.protobuf.Timestamp expires_at = 5;
}

// Request to retrieve active amount blocks for an account
// Used by Position Keeping to query blocked funds for balance calculations
message GetActiveAmountBlocksRequest {
  // account_id is the account to query blocks for
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];
}

// Response containing active amount blocks for an account
message GetActiveAmountBlocksResponse {
  // blocks is the list of active amount blocks (ACTIVE status liens only)
  repeated AmountBlock blocks = 1;
}

// Request to update a current account facility settings
// BIAN: Update Control Record (UpCR) - Modify account configuration
message UpdateCurrentAccountRequest {
  // account_id is the account to update (required)
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // overdraft_limit is the new maximum overdraft amount (optional)
  // If provided, updates the overdraft configuration
  meridian.common.v1.MoneyAmount overdraft_limit = 2;

  // overdraft_enabled controls whether overdraft facility is active (optional)
  // Use wrapper to distinguish between "not set" and "set to false"
  optional bool overdraft_enabled = 3;

  // overdraft_rate is the annual percentage rate for overdraft usage (optional)
  // Must be between 0 and 100 inclusive
  optional double overdraft_rate = 4 [(buf.validate.field).double = {
    gte: 0.0
    lte: 100.0
  }];

  // status is the new account status (optional)
  // Note: For status transitions requiring audit trail (freeze/close), use ControlCurrentAccount instead
  AccountStatus status = 5 [(buf.validate.field).enum = {
    defined_only: true
  }];
}

// Response for updating a current account
message UpdateCurrentAccountResponse {
  // facility is the updated account facility with new settings
  CurrentAccountFacility facility = 1 [(buf.validate.field).required = true];

  // version is the new version number after update (for optimistic locking)
  int64 version = 2 [(buf.validate.field).int64 = {gte: 0}];
}

// Request to perform a control action on a current account
// BIAN: Control Control Record (CoCR) - Account lifecycle state transitions
message ControlCurrentAccountRequest {
  // account_id is the account to control (required)
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // control_action is the action to perform (required)
  ControlAction control_action = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Prevent UNSPECIFIED */
  }];

  // reason is an explanation for the control action (required for FREEZE and CLOSE)
  // Minimum 10 characters for audit trail completeness
  string reason = 3 [(buf.validate.field).string = {
    max_len: 1000
  }];
}

// Response for controlling a current account
message ControlCurrentAccountResponse {
  // facility is the account facility with updated status
  CurrentAccountFacility facility = 1 [(buf.validate.field).required = true];

  // action_timestamp is when the control action was executed
  google.protobuf.Timestamp action_timestamp = 2 [(buf.validate.field).required = true];
}

// ValuationFeatureLifecycleStatus defines the lifecycle state of a valuation feature
enum ValuationFeatureLifecycleStatus {
  // VALUATION_FEATURE_LIFECYCLE_STATUS_UNSPECIFIED is the default value
  VALUATION_FEATURE_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  // VALUATION_FEATURE_LIFECYCLE_STATUS_INITIATED means feature is created but not yet active
  VALUATION_FEATURE_LIFECYCLE_STATUS_INITIATED = 1;
  // VALUATION_FEATURE_LIFECYCLE_STATUS_ACTIVE means feature is active and can be used for valuation
  VALUATION_FEATURE_LIFECYCLE_STATUS_ACTIVE = 2;
  // VALUATION_FEATURE_LIFECYCLE_STATUS_TERMINATED means feature is no longer active (terminal state)
  VALUATION_FEATURE_LIFECYCLE_STATUS_TERMINATED = 3;
}

// ValuationFeatureAction defines the control operations for valuation features
enum ValuationFeatureAction {
  // VALUATION_FEATURE_ACTION_UNSPECIFIED is the default value
  VALUATION_FEATURE_ACTION_UNSPECIFIED = 0;
  // VALUATION_FEATURE_ACTION_ACTIVATE transitions from INITIATED to ACTIVE
  VALUATION_FEATURE_ACTION_ACTIVATE = 1;
  // VALUATION_FEATURE_ACTION_TERMINATE transitions from ACTIVE to TERMINATED
  VALUATION_FEATURE_ACTION_TERMINATE = 2;
}

// ValuationFeature represents a valuation method assignment for an account.
// It maps an input instrument (e.g., USD) to the account's native instrument (e.g., GBP)
// using a specific valuation method from the Valuation Engine Service.
message ValuationFeature {
  // id is the unique identifier for this valuation feature
  string id = 1;

  // account_id is the account this feature belongs to
  string account_id = 2;

  // instrument_code is the input instrument to be valued (e.g., "USD", "EUR", "kWh")
  string instrument_code = 3;

  // valuation_method_id references the valuation method in Valuation Engine Service
  string valuation_method_id = 4;

  // valuation_method_version is the specific version of the method
  int32 valuation_method_version = 5;

  // parameters contains method-specific configuration (JSON object)
  string parameters = 6;

  // lifecycle_status is the current state of this feature
  ValuationFeatureLifecycleStatus lifecycle_status = 7;

  // valid_from is the bi-temporal validity start timestamp
  google.protobuf.Timestamp valid_from = 8;

  // valid_to is the bi-temporal validity end timestamp
  google.protobuf.Timestamp valid_to = 9;

  // created_at is when this feature was created
  google.protobuf.Timestamp created_at = 10;

  // created_by is the user who created this feature
  string created_by = 11;

  // updated_at is when this feature was last updated
  google.protobuf.Timestamp updated_at = 12;

  // updated_by is the user who last updated this feature
  string updated_by = 13;

  // version is used for optimistic locking
  int32 version = 14;
}

// Request to create a valuation feature for an account
message CreateValuationFeatureRequest {
  // account_id is the account to add the valuation feature to (required)
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // instrument_code is the input instrument to be valued (required)
  // Example: "USD" for a GBP account would create a USD→GBP valuation feature
  string instrument_code = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];

  // valuation_method_id references the valuation method in Valuation Engine Service (required)
  // The method's output_instrument MUST match the account's native instrument (currency)
  string valuation_method_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // valuation_method_version is the specific version of the method (required)
  int32 valuation_method_version = 4 [(buf.validate.field).int32 = {gte: 1}];

  // parameters contains method-specific configuration as JSON string (optional)
  string parameters = 5;

  // output_instrument is the expected output instrument of the valuation method (required)
  // This MUST match the account's native instrument (currency)
  // Used for validation - will return FAILED_PRECONDITION if mismatch
  string output_instrument = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
}

// Response for creating a valuation feature
message CreateValuationFeatureResponse {
  // feature is the created valuation feature
  ValuationFeature feature = 1;
}

// Request to update a valuation feature lifecycle status
message UpdateValuationFeatureRequest {
  // feature_id is the valuation feature to update (required)
  string feature_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // action is the lifecycle transition to perform (required)
  ValuationFeatureAction action = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// Response for updating a valuation feature
message UpdateValuationFeatureResponse {
  // feature is the updated valuation feature
  ValuationFeature feature = 1;
}

// Request to get a valuation feature
// Supports two modes:
// 1. By feature_id: Direct lookup
// 2. By account_id + instrument_code + knowledge_at: Bi-temporal query
message GetValuationFeatureRequest {
  // feature_id for direct lookup (optional, mutually exclusive with account lookup)
  string feature_id = 1;

  // account_id for bi-temporal lookup (optional, requires instrument_code)
  string account_id = 2;

  // instrument_code for bi-temporal lookup (optional, requires account_id)
  string instrument_code = 3;

  // knowledge_at is the point-in-time for bi-temporal query (optional, defaults to now)
  // Used with account_id + instrument_code to find the valid feature at that time
  google.protobuf.Timestamp knowledge_at = 4;
}

// Response for getting a valuation feature
message GetValuationFeatureResponse {
  // feature is the requested valuation feature
  ValuationFeature feature = 1;
}

// Request to list valuation features for an account
message ListValuationFeaturesRequest {
  // account_id to list features for (required)
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // lifecycle_status to filter by (optional, returns all if not specified)
  ValuationFeatureLifecycleStatus lifecycle_status = 2;
}

// Response for listing valuation features
message ListValuationFeaturesResponse {
  // features is the list of valuation features for the account
  repeated ValuationFeature features = 1;
}

// ListCurrentAccountsRequest is the request to list current accounts with pagination and filtering.
message ListCurrentAccountsRequest {
  // page_size is the maximum number of accounts to return per page (default 25, max 100).
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];

  // page_token is the cursor token from a previous response to get the next page.
  // Leave empty to get the first page.
  string page_token = 2;

  // status filters results to accounts with a specific status (optional).
  AccountStatus status = 3 [(buf.validate.field).enum = {defined_only: true}];

  // iban filters results by IBAN prefix match (optional).
  string iban = 4 [(buf.validate.field).string = {max_len: 34}];
}

// ListCurrentAccountsResponse is the paginated response containing current accounts.
message ListCurrentAccountsResponse {
  // accounts is the list of current accounts for this page.
  repeated CurrentAccountFacility accounts = 1;

  // next_page_token is the cursor to fetch the next page.
  // Empty when there are no more results.
  string next_page_token = 2;

  // total_count is the total number of accounts matching the filter criteria.
  int64 total_count = 3;
}

// ValuationWarning represents a warning generated during valuation execution.
// Warnings indicate degraded conditions that did not prevent computation
// but may affect result confidence.
message ValuationWarning {
  // code is a machine-readable warning code (e.g., "STALE_MARKET_DATA", "MISSING_POLICY")
  string code = 1;

  // message is a human-readable description of the warning
  string message = 2;

  // severity indicates the warning impact: "INFO", "WARNING", "DEGRADED"
  string severity = 3;
}

// MarketDataQuality describes the quality assessment of market data used in valuation.
message MarketDataQuality {
  // source identifies where the market data came from (e.g., "live_feed", "cache", "fallback")
  string source = 1;

  // quality_level indicates data quality: "ACTUAL", "ESTIMATE", "STALE", "FALLBACK"
  string quality_level = 2;

  // observed_at is when the market data was observed
  google.protobuf.Timestamp observed_at = 3;

  // staleness_seconds indicates how old the data is relative to valuation time
  int64 staleness_seconds = 4;
}

// ValuationAnalysis provides transparency into how a valuation was computed.
// Returned with both inquiry (EvaluateAssetValuation) and binding (InitiateLien) operations
// to enable audit trails and Ghost Pricing prevention.
message ValuationAnalysis {
  // method_id is the valuation method used
  string method_id = 1;

  // method_version is the specific version of the method
  string method_version = 2;

  // applied_rates contains the rates/factors applied during valuation
  // Key: rate name (e.g., "fx_rate", "spread"), Value: rate value as string
  map<string, string> applied_rates = 3;

  // observation_ids references the market data observations used
  repeated string observation_ids = 4;

  // computed_at is when the valuation was computed
  google.protobuf.Timestamp computed_at = 5;

  // knowledge_at is the point-in-time used for bi-temporal data resolution
  google.protobuf.Timestamp knowledge_at = 6;

  // account_parameters contains the account-specific valuation parameters (from ValuationFeature)
  google.protobuf.Struct account_parameters = 7;

  // market_data_qualities describes the quality of each market data source used
  repeated MarketDataQuality market_data_qualities = 8;

  // calculation_path describes the sequence of operations performed
  repeated string calculation_path = 9;

  // degraded_mode indicates whether the valuation ran in degraded mode
  // (e.g., using stale cache data because live market data was unavailable)
  bool degraded_mode = 10;

  // warnings contains any warnings generated during valuation
  repeated ValuationWarning warnings = 11;
}

// Request to evaluate an asset valuation (inquiry-only, non-binding).
// Returns the valuation result without creating any financial commitment.
// CRITICAL: Uses the same valuateInternal() logic as InitiateLien to prevent Ghost Pricing.
message EvaluateAssetValuationRequest {
  // account_id is the account to evaluate valuation for (required)
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // input is the amount and instrument to be valued (required)
  // Example: { amount: "100.00", instrument_code: "USD" } for a GBP account
  meridian.quantity.v1.InstrumentAmount input = 2 [(buf.validate.field).required = true];

  // knowledge_at is the point-in-time for bi-temporal data resolution (optional, defaults to now)
  // Controls which valuation feature and market data are used
  google.protobuf.Timestamp knowledge_at = 3;
}

// Response for evaluating an asset valuation (inquiry-only).
message EvaluateAssetValuationResponse {
  // output is the valued amount in the account's native instrument
  // Example: { amount: "79.50", instrument_code: "GBP" } for USD→GBP conversion
  meridian.quantity.v1.InstrumentAmount output = 1;

  // basis provides full transparency into the valuation computation
  ValuationAnalysis basis = 2;

  // execution_time_ms is how long the valuation took to compute
  string execution_time_ms = 3;

  // cache_hit indicates whether the result was served from cache
  bool cache_hit = 4;

  // is_estimate is always true for inquiry operations (non-binding)
  // This field distinguishes inquiry results from binding valuation in liens
  bool is_estimate = 5;
}

// CurrentAccountService provides BIAN-compliant current account operations.
//
// Design Notes:
// - DELETE operations are intentionally not provided. Accounts are managed
//   through status transitions (Active → Frozen → Closed) for audit compliance.
// - Liens follow a lifecycle pattern: create under account context, then
//   operate independently via /v1/current-account-liens/{lien_id} for execute/terminate/retrieve.
service CurrentAccountService {
  // InitiateCurrentAccount creates a new current account facility
  rpc InitiateCurrentAccount(InitiateCurrentAccountRequest) returns (InitiateCurrentAccountResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Current account created successfully"
        }
      }
    };
  }

  // ListCurrentAccounts returns a paginated list of current accounts with optional filtering.
  rpc ListCurrentAccounts(ListCurrentAccountsRequest) returns (ListCurrentAccountsResponse) {
    option (google.api.http) = {
      get: "/v1/current-accounts"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List current accounts"
      description: "Returns a paginated list of current accounts with optional filtering by status and IBAN."
    };
  }

  // ExecuteDeposit processes a deposit transaction (Behavior Qualifier)
  rpc ExecuteDeposit(ExecuteDepositRequest) returns (ExecuteDepositResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts/{account_id}/deposits"
      body: "*"
    };
  }

  // InitiateWithdrawal creates a pending withdrawal for validation before execution.
  // The withdrawal can be executed later via ExecuteWithdrawal.
  // BQ: Initiate - Creates and validates a withdrawal request
  rpc InitiateWithdrawal(InitiateWithdrawalRequest) returns (InitiateWithdrawalResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts/{account_id}/withdrawals:initiate"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Withdrawal initiated successfully - pending execution"
        }
      }
    };
  }

  // ExecuteWithdrawal commits a pending withdrawal or performs a direct withdrawal.
  // Can either execute a previously initiated withdrawal (by withdrawal_id) or
  // perform a direct withdrawal (by providing account_id and amount).
  // BQ: Execute - Commits the withdrawal and updates account balance
  rpc ExecuteWithdrawal(ExecuteWithdrawalRequest) returns (ExecuteWithdrawalResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts/{account_id}/withdrawals:execute"
      body: "*"
    };
  }

  // UpdateWithdrawal modifies a pending withdrawal before execution.
  // Can update amount, description, or reference. Only allowed for INITIATED status.
  // BQ: Update - Modifies pending withdrawal details
  rpc UpdateWithdrawal(UpdateWithdrawalRequest) returns (UpdateWithdrawalResponse) {
    option (google.api.http) = {
      patch: "/v1/withdrawals/{withdrawal_id}"
      body: "*"
    };
  }

  // RetrieveWithdrawal gets withdrawal details by ID or lists withdrawals by account.
  // When withdrawal_id is provided, returns single withdrawal.
  // When account_id is provided, returns paginated list of withdrawals.
  // BQ: Retrieve - Gets withdrawal information
  rpc RetrieveWithdrawal(RetrieveWithdrawalRequest) returns (RetrieveWithdrawalResponse) {
    option (google.api.http) = {
      get: "/v1/withdrawals/{withdrawal_id}"
      additional_bindings: {
        get: "/v1/current-accounts/{account_id}/withdrawals"
      }
    };
  }

  // RetrieveCurrentAccount gets current account details
  rpc RetrieveCurrentAccount(RetrieveCurrentAccountRequest) returns (RetrieveCurrentAccountResponse) {
    option (google.api.http) = {
      get: "/v1/current-accounts/{account_id}"
    };
  }

  // InitiateLien creates a fund reservation on an account.
  // Used by Payment Order to reserve funds before external payment execution.
  // Note: Liens are created under the account context but become independent
  // resources with their own endpoints (GET/POST /v1/current-account-liens/{lien_id}) for
  // execute, terminate, and retrieve operations.
  rpc InitiateLien(InitiateLienRequest) returns (InitiateLienResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts/{account_id}/liens"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Lien created successfully - funds are now reserved"
        }
      }
    };
  }

  // ExecuteLien converts a reservation to an actual debit atomically
  // Called when the external payment is confirmed as settled
  rpc ExecuteLien(ExecuteLienRequest) returns (ExecuteLienResponse) {
    option (google.api.http) = {
      post: "/v1/current-account-liens/{lien_id}/execute"
      body: "*"
    };
  }

  // TerminateLien releases a reservation without executing
  // Called when the external payment fails or is cancelled
  rpc TerminateLien(TerminateLienRequest) returns (TerminateLienResponse) {
    option (google.api.http) = {
      post: "/v1/current-account-liens/{lien_id}/terminate"
      body: "*"
    };
  }

  // RetrieveLien gets lien details
  rpc RetrieveLien(RetrieveLienRequest) returns (RetrieveLienResponse) {
    option (google.api.http) = {
      get: "/v1/current-account-liens/{lien_id}"
    };
  }

  // GetActiveAmountBlocks retrieves active fund reservations for Position Keeping.
  // Returns all ACTIVE (non-expired) liens mapped to AmountBlock representation.
  // Used by Position Keeping service to query blocked amounts without coupling to lien details.
  rpc GetActiveAmountBlocks(GetActiveAmountBlocksRequest) returns (GetActiveAmountBlocksResponse) {
    option (google.api.http) = {
      get: "/v1/current-accounts/{account_id}/amount-blocks"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get active amount blocks for an account"
      description: "Retrieves all active fund reservations (liens) for Position Keeping balance calculations"
    };
  }

  // UpdateCurrentAccount modifies account configuration settings.
  // BIAN: Update Control Record (UpCR) - Updates overdraft settings, status, etc.
  // Use this for configuration changes; use ControlCurrentAccount for lifecycle transitions.
  rpc UpdateCurrentAccount(UpdateCurrentAccountRequest) returns (UpdateCurrentAccountResponse) {
    option (google.api.http) = {
      put: "/v1/current-accounts/{account_id}"
      body: "*"
    };
  }

  // ControlCurrentAccount performs lifecycle state transitions on an account.
  // BIAN: Control Control Record (CoCR) - Freeze, Unfreeze, or Close accounts.
  // All control actions are logged with timestamps and reasons for audit compliance.
  rpc ControlCurrentAccount(ControlCurrentAccountRequest) returns (ControlCurrentAccountResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts/{account_id}/control"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "200"
        value: {
          description: "Control action executed successfully"
        }
      }
    };
  }

  // CreateValuationFeature adds a valuation method assignment to an account.
  // The valuation feature maps an input instrument to the account's native instrument.
  // CRITICAL: The method's output_instrument MUST match the account's native instrument (currency).
  // Returns FAILED_PRECONDITION if there's a mismatch (MethodOutputMismatchError).
  rpc CreateValuationFeature(CreateValuationFeatureRequest) returns (CreateValuationFeatureResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts/{account_id}/valuation-features"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a valuation feature for an account"
      description: "Adds a valuation method assignment to map an input instrument to the account's native currency"
      responses: {
        key: "201"
        value: {
          description: "Valuation feature created successfully"
        }
      }
    };
  }

  // UpdateValuationFeature performs lifecycle transitions on a valuation feature.
  // Supports ACTIVATE (INITIATED → ACTIVE) and TERMINATE (ACTIVE → TERMINATED) actions.
  rpc UpdateValuationFeature(UpdateValuationFeatureRequest) returns (UpdateValuationFeatureResponse) {
    option (google.api.http) = {
      post: "/v1/current-account-valuation-features/{feature_id}/control"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update valuation feature lifecycle status"
      description: "Performs lifecycle transitions (activate/terminate) on a valuation feature"
    };
  }

  // GetValuationFeature retrieves a valuation feature by ID or by account+instrument with bi-temporal query.
  // Supports two query modes:
  // 1. By feature_id: Direct lookup
  // 2. By account_id + instrument_code + knowledge_at: Find the valid feature at a specific time
  rpc GetValuationFeature(GetValuationFeatureRequest) returns (GetValuationFeatureResponse) {
    option (google.api.http) = {
      get: "/v1/current-account-valuation-features/{feature_id}"
      additional_bindings: {
        get: "/v1/current-accounts/{account_id}/valuation-features/lookup"
      }
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get a valuation feature"
      description: "Retrieves a valuation feature by ID or by account+instrument with optional bi-temporal query"
    };
  }

  // ListValuationFeatures retrieves all valuation features for an account.
  // Optionally filters by lifecycle status.
  rpc ListValuationFeatures(ListValuationFeaturesRequest) returns (ListValuationFeaturesResponse) {
    option (google.api.http) = {
      get: "/v1/current-accounts/{account_id}/valuation-features"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List valuation features for an account"
      description: "Retrieves all valuation features for an account with optional status filter"
    };
  }

  // EvaluateAssetValuation performs an inquiry-only (non-binding) valuation.
  // Returns the estimated valued amount without creating any financial commitment.
  // CRITICAL: Uses the same valuateInternal() logic as InitiateLien to prevent Ghost Pricing -
  // the inquiry price MUST match the binding price for identical inputs.
  rpc EvaluateAssetValuation(EvaluateAssetValuationRequest) returns (EvaluateAssetValuationResponse) {
    option (google.api.http) = {
      post: "/v1/current-accounts/{account_id}/valuations:evaluate"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Evaluate asset valuation (inquiry-only)"
      description: "Performs a non-binding valuation using the same logic as InitiateLien to prevent Ghost Pricing"
    };
  }
}
