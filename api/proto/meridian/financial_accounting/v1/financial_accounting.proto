syntax = "proto3";

package meridian.financial_accounting.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";
import "meridian/quantity/v1/quantity.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/financial_accounting/v1;financialaccountingv1";

// OpenAPI specification metadata for Financial Accounting Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Financial Accounting Service API"
    version: "1.0"
    description: "BIAN-compliant financial accounting operations for double-entry "
                 "bookkeeping, ledger postings, and financial booking log management."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
};

// FinancialBookingLog represents the BIAN Financial Booking Log entity.
// It maintains records of financial transactions and their processing status.
message FinancialBookingLog {
  // id is the unique identifier for this financial booking log.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // financial_account_type defines the type of account being used (e.g., "CURRENT", "DEBIT", "CREDIT").
  string financial_account_type = 2 [(buf.validate.field).string.max_len = 50];

  // product_service_reference identifies the financial product or service.
  string product_service_reference = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // business_unit_reference identifies the business unit responsible.
  string business_unit_reference = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // chart_of_accounts_rules defines the accounting rules to apply.
  string chart_of_accounts_rules = 5 [(buf.validate.field).string = {min_len: 1}];

  // base_instrument_code is the instrument code for this booking log (e.g., "GBP", "USD", "kWh").
  // Replaces the deprecated base_currency enum field. Supports the Universal Asset System.
  string base_instrument_code = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // status represents the current lifecycle state.
  meridian.common.v1.TransactionStatus status = 7 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // created_at is when this booking log was created.
  google.protobuf.Timestamp created_at = 8 [(buf.validate.field).required = true];

  // updated_at is when this booking log was last updated.
  google.protobuf.Timestamp updated_at = 9 [(buf.validate.field).required = true];

  // postings contains all ledger postings associated with this log.
  // NOTE: This array may grow large for booking logs with many transactions.
  // Consider fetching postings separately via RetrieveLedgerPosting for pagination.
  // Double-entry balance validation occurs at the service layer when transitioning to POSTED status.
  repeated LedgerPosting postings = 10;
}

// ControlAction defines the lifecycle control actions for financial booking logs.
// These are BIAN control operations for administrative management of booking logs.
enum ControlAction {
  // CONTROL_ACTION_UNSPECIFIED means the action is unknown.
  CONTROL_ACTION_UNSPECIFIED = 0;
  // CONTROL_ACTION_SUSPEND temporarily suspends the booking log (transitions to FAILED/suspended).
  CONTROL_ACTION_SUSPEND = 1;
  // CONTROL_ACTION_RESUME reactivates a suspended booking log (returns to PENDING).
  CONTROL_ACTION_RESUME = 2;
  // CONTROL_ACTION_TERMINATE permanently ends the booking log lifecycle (transitions to CANCELLED).
  CONTROL_ACTION_TERMINATE = 3;
}

// LedgerPosting represents a single posting operation in double-entry bookkeeping.
message LedgerPosting {
  // id is the unique identifier for this posting.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // financial_booking_log_id references the parent booking log.
  string financial_booking_log_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // posting_direction indicates debit or credit.
  meridian.common.v1.PostingDirection posting_direction = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // posting_amount is the amount being posted (must be positive for accounting entries).
  // Uses InstrumentAmount for universal asset support (currencies, energy, commodities, etc.).
  meridian.quantity.v1.InstrumentAmount posting_amount = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "positive_posting_amount"
      message: "posting amount must be greater than zero"
      expression: "this.amount.matches('^[1-9][0-9]*(\\\\.[0-9]+)?$') || this.amount.matches('^0\\\\.[0-9]*[1-9][0-9]*$')"
    }
  ];

  // account_id identifies the account being posted to (alphanumeric with hyphens/underscores).
  string account_id = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // value_date is the effective date for this posting.
  google.protobuf.Timestamp value_date = 6 [(buf.validate.field).required = true];

  // posting_result describes the outcome of the posting operation.
  string posting_result = 7 [(buf.validate.field).string = {max_len: 1000}];

  // created_at is when this posting was created.
  google.protobuf.Timestamp created_at = 8 [(buf.validate.field).required = true];

  // status represents the current state of this posting.
  meridian.common.v1.TransactionStatus status = 9 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // account_service_domain identifies which BIAN Service Domain manages the account.
  // Used by frontend consumers for correct account page routing.
  meridian.common.v1.AccountServiceDomain account_service_domain = 10;
}

// InitiateFinancialBookingLogRequest creates a new financial booking log.
message InitiateFinancialBookingLogRequest {
  // financial_account_type defines the type of account (e.g., "CURRENT", "DEBIT", "CREDIT").
  string financial_account_type = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // product_service_reference identifies the financial product.
  string product_service_reference = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // business_unit_reference identifies the business unit.
  string business_unit_reference = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // chart_of_accounts_rules defines accounting rules.
  string chart_of_accounts_rules = 4 [(buf.validate.field).string = {min_len: 1}];

  // base_instrument_code is the instrument code for transactions (e.g., "GBP", "USD", "kWh").
  // Replaces the deprecated base_currency enum field. Supports the Universal Asset System.
  string base_instrument_code = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 6 [(buf.validate.field).required = true];
}

// InitiateFinancialBookingLogResponse returns the created booking log.
message InitiateFinancialBookingLogResponse {
  // financial_booking_log is the newly created booking log.
  FinancialBookingLog financial_booking_log = 1 [(buf.validate.field).required = true];
}

// UpdateFinancialBookingLogRequest updates an existing booking log.
//
// Update Semantics:
// - Only status and chart_of_accounts_rules can be modified after creation
// - Other fields (account_type, currency, business_unit) are immutable
// - Empty chart_of_accounts_rules preserves existing value (use IGNORE_IF_UNPOPULATED)
// - Status transitions are validated at service layer (e.g., POSTED is terminal)
message UpdateFinancialBookingLogRequest {
  // id is the booking log to update.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // status is the new status to set.
  meridian.common.v1.TransactionStatus status = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // chart_of_accounts_rules can be updated if needed.
  // If empty, the existing rules are preserved (optional update).
  // Validation: Min length is enforced only if the field is provided (service layer).
  string chart_of_accounts_rules = 3;

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 4 [(buf.validate.field).required = true];
}

// UpdateFinancialBookingLogResponse returns the updated booking log.
message UpdateFinancialBookingLogResponse {
  // financial_booking_log is the updated booking log.
  FinancialBookingLog financial_booking_log = 1 [(buf.validate.field).required = true];
}

// RetrieveFinancialBookingLogRequest retrieves a specific booking log.
message RetrieveFinancialBookingLogRequest {
  // id is the booking log to retrieve.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
}

// RetrieveFinancialBookingLogResponse returns the requested booking log.
message RetrieveFinancialBookingLogResponse {
  // financial_booking_log is the retrieved booking log.
  FinancialBookingLog financial_booking_log = 1 [(buf.validate.field).required = true];
}

// CaptureLedgerPostingRequest creates a new ledger posting.
//
// Double-Entry Bookkeeping:
// - Individual postings are created separately (not balanced pairs)
// - Balance validation (debits = credits) occurs at service layer
// - Booking log can only transition to POSTED status when balanced
// - Consider using batch operations for balanced posting pairs
message CaptureLedgerPostingRequest {
  // financial_booking_log_id references the parent booking log.
  string financial_booking_log_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // posting_direction indicates debit or credit.
  meridian.common.v1.PostingDirection posting_direction = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // posting_amount is the amount to post (must be positive).
  // Uses InstrumentAmount for universal asset support (currencies, energy, commodities, etc.).
  meridian.quantity.v1.InstrumentAmount posting_amount = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "positive_posting_amount_request"
      message: "posting amount must be greater than zero"
      expression: "this.amount.matches('^[1-9][0-9]*(\\\\.[0-9]+)?$') || this.amount.matches('^0\\\\.[0-9]*[1-9][0-9]*$')"
    }
  ];

  // account_id identifies the target account (alphanumeric with hyphens/underscores).
  string account_id = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // value_date is the effective date.
  google.protobuf.Timestamp value_date = 5 [(buf.validate.field).required = true];

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 6 [(buf.validate.field).required = true];

  // account_service_domain identifies which BIAN Service Domain manages the account.
  // Optional - when provided, stored directly. When omitted (UNSPECIFIED), the service
  // may resolve it via account validation if configured.
  // Server validates the enum range — out-of-range values return INVALID_ARGUMENT.
  meridian.common.v1.AccountServiceDomain account_service_domain = 7;
}

// CaptureLedgerPostingResponse returns the created posting.
message CaptureLedgerPostingResponse {
  // ledger_posting is the newly created posting.
  LedgerPosting ledger_posting = 1 [(buf.validate.field).required = true];
}

// UpdateLedgerPostingRequest updates an existing ledger posting.
//
// Update Semantics:
// - Only status and posting_result can be modified after creation
// - Amount, direction, and account_id are immutable once created
// - Status transitions follow domain rules (e.g., POSTED is terminal)
// - Empty posting_result preserves existing value
message UpdateLedgerPostingRequest {
  // id is the posting to update.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // status is the new status to set.
  meridian.common.v1.TransactionStatus status = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // posting_result describes the outcome of the posting operation.
  // If empty, the existing result is preserved (optional update).
  string posting_result = 3 [(buf.validate.field).string = {max_len: 1000}];

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 4 [(buf.validate.field).required = true];
}

// UpdateLedgerPostingResponse returns the updated posting.
message UpdateLedgerPostingResponse {
  // ledger_posting is the updated posting.
  LedgerPosting ledger_posting = 1 [(buf.validate.field).required = true];
}

// RetrieveLedgerPostingRequest retrieves a specific posting.
message RetrieveLedgerPostingRequest {
  // id is the posting to retrieve.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
}

// RetrieveLedgerPostingResponse returns the requested posting.
message RetrieveLedgerPostingResponse {
  // ledger_posting is the retrieved posting.
  LedgerPosting ledger_posting = 1 [(buf.validate.field).required = true];
}

// ListFinancialBookingLogsRequest lists booking logs with pagination.
//
// Pagination: If pagination is not provided, the service will apply
// default limits (typically 50 items) to prevent unbounded queries.
message ListFinancialBookingLogsRequest {
  // pagination controls page size and position.
  // If not provided, service applies default page_size=50, max=1000.
  meridian.common.v1.Pagination pagination = 1;

  // status filters by transaction status.
  meridian.common.v1.TransactionStatus status = 2 [(buf.validate.field).enum = {defined_only: true}];

  // business_unit_reference filters by business unit.
  string business_unit_reference = 3;
}

// ListFinancialBookingLogsResponse returns a page of booking logs.
message ListFinancialBookingLogsResponse {
  // financial_booking_logs is the list of booking logs.
  repeated FinancialBookingLog financial_booking_logs = 1;

  // pagination contains pagination metadata.
  meridian.common.v1.PaginationResponse pagination = 2;
}

// ListLedgerPostingsRequest lists ledger postings with filtering and pagination.
//
// Supports filtering by:
// - BookingLogID: Filter postings for a specific booking log
// - AccountCode: Filter by account identifier
// - PostingDirection: Filter by DEBIT or CREDIT
// - Date range: Filter by value date (from/to)
// - InstrumentCode: Filter by instrument code
//
// Pagination: If pagination is not provided, the service will apply
// default limits (typically 50 items) to prevent unbounded queries.
message ListLedgerPostingsRequest {
  // pagination controls page size and position.
  // If not provided, service applies default page_size=50, max=1000.
  meridian.common.v1.Pagination pagination = 1;

  // financial_booking_log_id filters by parent booking log.
  string financial_booking_log_id = 2 [(buf.validate.field).string = {
    max_len: 255
  }];

  // account_id filters by account identifier.
  string account_id = 3 [(buf.validate.field).string = {
    max_len: 255
    pattern: "^[a-zA-Z0-9_-]*$"
  }];

  // posting_direction filters by debit or credit.
  meridian.common.v1.PostingDirection posting_direction = 4 [(buf.validate.field).enum = {
    defined_only: true
  }];

  // value_date_from filters postings on or after this date.
  google.protobuf.Timestamp value_date_from = 5;

  // value_date_to filters postings on or before this date.
  google.protobuf.Timestamp value_date_to = 6;

  // instrument_code filters by instrument code (from posting_amount).
  string instrument_code = 7 [(buf.validate.field).string = {
    max_len: 32
    pattern: "^$|^[A-Z][A-Z0-9_]*$"
  }];

  // status filters by transaction status.
  meridian.common.v1.TransactionStatus status = 8 [(buf.validate.field).enum = {
    defined_only: true
  }];

  // account_ids filters by multiple account identifiers (optional, max 100).
  // When provided, takes precedence over account_id.
  repeated string account_ids = 9 [(buf.validate.field).repeated = {
    max_items: 100
    items: {
      string: {
        min_len: 1
        max_len: 255
        pattern: "^[a-zA-Z0-9_-]+$"
      }
    }
  }];
}

// ListLedgerPostingsResponse returns a page of ledger postings.
message ListLedgerPostingsResponse {
  // ledger_postings is the list of postings.
  repeated LedgerPosting ledger_postings = 1;

  // pagination contains pagination metadata.
  meridian.common.v1.PaginationResponse pagination = 2;
}

// ControlFinancialBookingLogRequest controls the lifecycle of a booking log (BIAN CoCR).
//
// This operation supports administrative control actions:
//   - SUSPEND: Temporarily suspend processing of the booking log
//   - RESUME: Resume processing of a previously suspended booking log
//   - TERMINATE: Permanently terminate the booking log lifecycle
//
// The operation uses the transactional outbox pattern to ensure atomic
// persistence of both the state change and the associated event.
message ControlFinancialBookingLogRequest {
  // id is the booking log to control.
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // control_action is the lifecycle action to perform.
  ControlAction control_action = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];

  // reason is an explanation for the control action (required for audit trail).
  string reason = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 4 [(buf.validate.field).required = true];
}

// ControlFinancialBookingLogResponse returns the controlled booking log.
message ControlFinancialBookingLogResponse {
  // financial_booking_log is the booking log after the control action.
  FinancialBookingLog financial_booking_log = 1 [(buf.validate.field).required = true];
}

// FinancialAccountingService provides the BIAN Financial Accounting service interface.
service FinancialAccountingService {
  // InitiateFinancialBookingLog creates a new financial booking log.
  rpc InitiateFinancialBookingLog(InitiateFinancialBookingLogRequest) returns (InitiateFinancialBookingLogResponse) {
    option (google.api.http) = {
      post: "/v1/booking-logs"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Financial booking log created successfully"
        }
      }
    };
  }

  // UpdateFinancialBookingLog updates an existing booking log.
  rpc UpdateFinancialBookingLog(UpdateFinancialBookingLogRequest) returns (UpdateFinancialBookingLogResponse) {
    option (google.api.http) = {
      put: "/v1/booking-logs/{id}"
      body: "*"
    };
  }

  // RetrieveFinancialBookingLog retrieves a specific booking log.
  rpc RetrieveFinancialBookingLog(RetrieveFinancialBookingLogRequest) returns (RetrieveFinancialBookingLogResponse) {
    option (google.api.http) = {
      get: "/v1/booking-logs/{id}"
    };
  }

  // ListFinancialBookingLogs lists booking logs with optional filtering.
  rpc ListFinancialBookingLogs(ListFinancialBookingLogsRequest) returns (ListFinancialBookingLogsResponse) {
    option (google.api.http) = {
      get: "/v1/booking-logs"
    };
  }

  // CaptureLedgerPosting creates a new ledger posting.
  rpc CaptureLedgerPosting(CaptureLedgerPostingRequest) returns (CaptureLedgerPostingResponse) {
    option (google.api.http) = {
      post: "/v1/booking-logs/{financial_booking_log_id}/postings"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Ledger posting created successfully"
        }
      }
    };
  }

  // UpdateLedgerPosting updates an existing ledger posting.
  rpc UpdateLedgerPosting(UpdateLedgerPostingRequest) returns (UpdateLedgerPostingResponse) {
    option (google.api.http) = {
      put: "/v1/postings/{id}"
      body: "*"
    };
  }

  // RetrieveLedgerPosting retrieves a specific posting.
  rpc RetrieveLedgerPosting(RetrieveLedgerPostingRequest) returns (RetrieveLedgerPostingResponse) {
    option (google.api.http) = {
      get: "/v1/postings/{id}"
    };
  }

  // ListLedgerPostings lists ledger postings with optional filtering.
  rpc ListLedgerPostings(ListLedgerPostingsRequest) returns (ListLedgerPostingsResponse) {
    option (google.api.http) = {
      get: "/v1/postings"
    };
  }

  // ControlFinancialBookingLog controls the lifecycle of a booking log (BIAN CoCR).
  // Supports SUSPEND, RESUME, and TERMINATE control actions.
  // Uses transactional outbox pattern for reliable event publishing.
  rpc ControlFinancialBookingLog(ControlFinancialBookingLogRequest) returns (ControlFinancialBookingLogResponse) {
    option (google.api.http) = {
      post: "/v1/booking-logs/{id}/control"
      body: "*"
    };
  }
}
