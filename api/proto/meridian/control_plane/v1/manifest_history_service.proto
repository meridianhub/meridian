syntax = "proto3";

package meridian.control_plane.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "meridian/control_plane/v1/manifest.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/control_plane/v1;controlplanev1";

// ========================================
// Manifest History Service
// ========================================

// ManifestHistoryService provides version history and rollback capabilities
// for tenant manifests. Every manifest change is stored as an immutable snapshot
// with a forward-only audit trail.
service ManifestHistoryService {
  // GetCurrentManifest retrieves the most recently applied manifest for the tenant.
  rpc GetCurrentManifest(GetCurrentManifestRequest) returns (GetCurrentManifestResponse) {
    option (google.api.http) = {
      get: "/v1/manifests/current"
    };
  }

  // GetManifestVersion retrieves a specific manifest version by its version string.
  rpc GetManifestVersion(GetManifestVersionRequest) returns (GetManifestVersionResponse) {
    option (google.api.http) = {
      get: "/v1/manifests/versions/{version}"
    };
  }

  // ListManifestVersions returns a paginated list of manifest versions, ordered
  // by applied_at descending (most recent first).
  rpc ListManifestVersions(ListManifestVersionsRequest) returns (ListManifestVersionsResponse) {
    option (google.api.http) = {
      get: "/v1/manifests/versions"
    };
  }

  // DiffManifestVersions compares two manifest versions by sequence number and
  // returns a structured diff with per-resource actions and summary statistics.
  // This is a read-only operation.
  rpc DiffManifestVersions(DiffManifestVersionsRequest) returns (DiffManifestVersionsResponse) {
    option (google.api.http) = {
      get: "/v1/manifests/diff"
    };
  }
}

// ========================================
// Request/Response Messages
// ========================================

// GetCurrentManifestRequest requests the most recently applied manifest.
// Tenant context is derived from the request metadata (x-tenant-id header).
message GetCurrentManifestRequest {}

// GetCurrentManifestResponse contains the most recently applied manifest version.
message GetCurrentManifestResponse {
  // version is the current manifest version record.
  ManifestVersion version = 1;
}

// GetManifestVersionRequest requests a specific manifest version.
message GetManifestVersionRequest {
  // version is the manifest version string to retrieve (e.g., "1.0").
  string version = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
}

// GetManifestVersionResponse contains the requested manifest version.
message GetManifestVersionResponse {
  // version is the requested manifest version record.
  ManifestVersion version = 1;
}

// ListManifestVersionsRequest requests a paginated list of manifest versions.
message ListManifestVersionsRequest {
  // limit is the maximum number of versions to return (1-100, default 20).
  int32 limit = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];

  // offset is the number of versions to skip for pagination.
  int32 offset = 2 [(buf.validate.field).int32.gte = 0];
}

// ListManifestVersionsResponse contains a paginated list of manifest versions.
message ListManifestVersionsResponse {
  // versions is the list of manifest version records.
  repeated ManifestVersion versions = 1;

  // total_count is the total number of manifest versions available.
  int32 total_count = 2;
}

// ========================================
// Domain Messages
// ========================================

// ApplyStatus represents the outcome of applying a manifest version.
enum ApplyStatus {
  // APPLY_STATUS_UNSPECIFIED is the default zero value.
  APPLY_STATUS_UNSPECIFIED = 0;

  // APPLY_STATUS_APPLIED indicates the manifest was successfully applied.
  APPLY_STATUS_APPLIED = 1;

  // APPLY_STATUS_FAILED indicates the manifest application failed.
  APPLY_STATUS_FAILED = 2;

  // APPLY_STATUS_ROLLED_BACK indicates this version was rolled back to a previous state.
  APPLY_STATUS_ROLLED_BACK = 3;

  // APPLY_STATUS_PARTIAL indicates some phases succeeded but at least one failed.
  APPLY_STATUS_PARTIAL = 4;
}

// PhaseStatusDetail records the execution result for a single phase.
message PhaseStatusDetail {
  // status is the phase execution outcome (e.g., "COMPLETED", "FAILED", "SKIPPED").
  string status = 1;

  // started_at is when this phase began executing.
  optional google.protobuf.Timestamp started_at = 2;

  // completed_at is when this phase finished executing.
  optional google.protobuf.Timestamp completed_at = 3;

  // error contains the error message if the phase failed.
  string error = 4;
}

// ManifestVersion represents a stored manifest snapshot with audit metadata.
// Each version is an immutable record in the forward-only audit trail.
message ManifestVersion {
  // id is the unique identifier for this manifest version record.
  string id = 1;

  // version is the manifest schema version (e.g., "1.0").
  string version = 2;

  // manifest is the complete manifest snapshot at this version.
  Manifest manifest = 3;

  // applied_at is when this manifest version was applied.
  google.protobuf.Timestamp applied_at = 4;

  // applied_by identifies who applied this manifest version.
  string applied_by = 5;

  // apply_status indicates the outcome of applying this manifest.
  ApplyStatus apply_status = 6;

  // apply_job_id references the job that applied this manifest.
  optional string apply_job_id = 7;

  // diff_summary is a human-readable summary of changes from the previous version.
  optional string diff_summary = 8;

  // created_at is when this record was created.
  google.protobuf.Timestamp created_at = 9;

  // relationship_graph is the JSON-encoded relationship graph extracted during
  // validation. Contains nodes (instruments, account_types, sagas, handlers)
  // and edges (denominated_in, converts, triggers_on, calls_handler, etc.).
  optional string relationship_graph = 10;

  // sequence_number is the optimistic locking sequence for this version.
  int64 sequence_number = 11;

  // checksum is the SHA-256 hash of the manifest content.
  optional string checksum = 12;

  // source indicates how this manifest was applied (e.g., "api", "cli", "gitops").
  optional string source = 13;

  // resource_path is the file path or URL of the manifest source.
  optional string resource_path = 14;

  // phase_status contains per-phase execution status for partial failure recovery.
  // Keys are phase identifiers (e.g., "phase_1", "phase_2").
  map<string, PhaseStatusDetail> phase_status = 15;
}

// DiffManifestVersionsRequest compares two manifest versions by sequence number.
message DiffManifestVersionsRequest {
  // base_sequence_number is the base version to compare from.
  // If 0 or omitted, defaults to the version immediately before target.
  int64 base_sequence_number = 1;

  // target_sequence_number is the target version to compare to (required, must be > 0).
  int64 target_sequence_number = 2 [(buf.validate.field).int64.gt = 0];
}

// DiffManifestVersionsResponse contains the structured diff between two manifest versions.
message DiffManifestVersionsResponse {
  // base_sequence_number is the sequence number used as the base for comparison.
  int64 base_sequence_number = 1;

  // target_sequence_number is the sequence number used as the target for comparison.
  int64 target_sequence_number = 2;

  // actions is the list of per-resource diff actions.
  repeated DiffAction actions = 3;

  // summary contains aggregate statistics about the diff.
  DiffSummary summary = 4;
}

// DiffAction represents a single resource-level change between two manifest versions.
message DiffAction {
  // resource_type is the category of the resource (e.g., "instrument", "account_type", "saga").
  string resource_type = 1;

  // action is the type of change: "CREATE", "UPDATE", "DELETE", or "NO_CHANGE".
  string action = 2;

  // resource_code is the unique identifier of the resource within its type.
  string resource_code = 3;

  // description is a human-readable summary of the change.
  string description = 4;

  // breaking indicates whether this change is a breaking change (e.g., a deletion).
  bool breaking = 5;
}

// DiffSummary contains aggregate counts of actions in a manifest diff.
message DiffSummary {
  // total_actions is the total number of resource-level actions.
  int32 total_actions = 1;

  // creates is the number of new resources.
  int32 creates = 2;

  // updates is the number of modified resources.
  int32 updates = 3;

  // deletes is the number of removed resources.
  int32 deletes = 4;

  // no_changes is the number of unchanged resources.
  int32 no_changes = 5;

  // has_breaking_changes indicates whether any action is a breaking change.
  bool has_breaking_changes = 6;
}
