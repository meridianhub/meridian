syntax = "proto3";

package meridian.control_plane.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "meridian/mapping/v1/mapping.proto";
import "meridian/party/v1/party.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/control_plane/v1;controlplanev1";

// ========================================
// Manifest Root
// ========================================

// Manifest is the atomic configuration snapshot for a Meridian tenant.
// It declares the complete business model: instruments, account types,
// valuation rules, and saga workflows. A manifest is self-contained
// with no external dependencies - all scripts are inline strings and
// all references resolve within the manifest itself.
//
// Codes (instrument codes, account type codes) are immutable primary keys.
// To change a code, delete the old definition and create a new one.
message Manifest {
  // version is the manifest schema version (e.g., "1.0").
  // Used for forward-compatible parsing of manifest files.
  string version = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
    pattern: "^[0-9]+\\.[0-9]+$"
  }];

  // metadata contains identifying information about this manifest.
  ManifestMetadata metadata = 2 [(buf.validate.field).required = true];

  // instruments defines the asset types available to this tenant.
  repeated InstrumentDefinition instruments = 3;

  // account_types defines the account classifications available to this tenant.
  repeated AccountTypeDefinition account_types = 4;

  // valuation_rules defines how instruments are converted between each other.
  repeated ValuationRule valuation_rules = 5;

  // sagas defines the workflow definitions available to this tenant.
  repeated SagaDefinition sagas = 6;

  // seed_data contains tenant-specific reference data (e.g., default parties,
  // initial chart of accounts, industry-specific lookups).
  // Uses google.protobuf.Struct for flexible JSONB representation.
  google.protobuf.Struct seed_data = 7;

  // payment_rails defines external payment provider integrations for this tenant.
  repeated PaymentRails payment_rails = 8;

  // party_types defines the tenant-configurable party type schemas for this tenant.
  repeated meridian.party.v1.PartyTypeDefinition party_types = 9;

  // mappings defines the bidirectional field mapping definitions available to this tenant.
  // Each mapping describes how an external JSON payload is transformed into an internal
  // Meridian gRPC service call.
  repeated meridian.mapping.v1.MappingDefinition mappings = 10;

  // operational_gateway defines external system integrations for this tenant.
  OperationalGatewayConfig operational_gateway = 11;
}

// ========================================
// Manifest Metadata
// ========================================

// ManifestMetadata contains identifying information about a manifest.
message ManifestMetadata {
  // name is the human-readable name for this manifest (e.g., "Acme Energy Trading").
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // industry describes the target industry vertical (e.g., "energy", "banking", "carbon").
  string industry = 2 [(buf.validate.field).string.max_len = 100];

  // description provides additional context about this manifest's purpose.
  string description = 3 [(buf.validate.field).string.max_len = 2048];
}

// ========================================
// Instrument Definitions
// ========================================

// InstrumentType classifies the broad category of an instrument.
enum InstrumentType {
  // INSTRUMENT_TYPE_UNSPECIFIED means the type is unknown.
  INSTRUMENT_TYPE_UNSPECIFIED = 0;
  // INSTRUMENT_TYPE_FIAT represents government-issued currencies (USD, EUR, GBP).
  INSTRUMENT_TYPE_FIAT = 1;
  // INSTRUMENT_TYPE_COMMODITY represents physical or virtual commodities (kWh, TONNE_CO2E, GPU_HOUR).
  INSTRUMENT_TYPE_COMMODITY = 2;
  // INSTRUMENT_TYPE_VOUCHER represents digital vouchers or tokens (loyalty points, aid vouchers).
  INSTRUMENT_TYPE_VOUCHER = 3;
}

// InstrumentDimensions describes the unit and precision of an instrument's quantities.
message InstrumentDimensions {
  // unit is the display unit for this instrument (e.g., "GBP", "kWh", "TONNE_CO2E").
  string unit = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];

  // precision is the number of decimal places for this instrument (0-18).
  int32 precision = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 18
  }];
}

// InstrumentDefinition declares an asset type within the manifest.
// The code field is the immutable primary key - to change a code,
// delete the old definition and create a new one.
message InstrumentDefinition {
  // code is the unique, immutable identifier for this instrument (e.g., "GBP", "KWH", "CARBON_CREDIT").
  // Must be uppercase alphanumeric with underscores, 1-50 characters.
  string code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[A-Z0-9_]{1,50}$"
  }];

  // name is the human-readable display name (e.g., "British Pound Sterling").
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // type classifies the broad category of this instrument.
  InstrumentType type = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // dimensions describes the unit and precision of this instrument's quantities.
  InstrumentDimensions dimensions = 4 [(buf.validate.field).required = true];
}

// ========================================
// Account Type Definitions
// ========================================

// NormalBalance defines the natural balance direction for an account type.
enum NormalBalance {
  // NORMAL_BALANCE_UNSPECIFIED means the balance direction is unknown.
  NORMAL_BALANCE_UNSPECIFIED = 0;
  // NORMAL_BALANCE_DEBIT means the account naturally holds a debit balance (assets, expenses).
  NORMAL_BALANCE_DEBIT = 1;
  // NORMAL_BALANCE_CREDIT means the account naturally holds a credit balance (liabilities, equity, revenue).
  NORMAL_BALANCE_CREDIT = 2;
}

// AccountTypePolicies contains CEL expressions that govern account behavior.
// CEL syntax validation is deferred to the runtime validator - the manifest
// only stores the expression strings.
message AccountTypePolicies {
  // validation is a CEL expression evaluated before allowing transactions on this account type.
  // Example: "amount > 0 && amount <= 1000000"
  // Empty string means no additional validation beyond standard checks.
  string validation = 1 [(buf.validate.field).string.max_len = 4096];

  // bucketing is a CEL expression that determines how amounts are grouped into fungibility buckets.
  // Example: "instrument_code + ':' + attributes.batch_id"
  // Empty string means all amounts are fully fungible (single default bucket).
  string bucketing = 2 [(buf.validate.field).string.max_len = 4096];
}

// AccountTypeDefinition declares an account classification within the manifest.
// The code field is the immutable primary key - to change a code,
// delete the old definition and create a new one.
message AccountTypeDefinition {
  // code is the unique, immutable identifier for this account type (e.g., "CURRENT", "SAVINGS", "CARBON_INVENTORY").
  // Must be uppercase alphanumeric with underscores, 1-50 characters.
  string code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[A-Z0-9_]{1,50}$"
  }];

  // name is the human-readable display name (e.g., "Current Account").
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // normal_balance defines the natural balance direction for this account type.
  NormalBalance normal_balance = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // allowed_instruments lists the instrument codes that this account type can hold.
  // Each value must match a code from the manifest's instruments list.
  // Empty list means all instruments defined in the manifest are allowed.
  repeated string allowed_instruments = 4 [(buf.validate.field).repeated = {
    items: {
      string: {
        min_len: 1
        max_len: 50
        pattern: "^[A-Z0-9_]{1,50}$"
      }
    }
  }];

  // policies contains CEL expressions governing this account type's behavior.
  AccountTypePolicies policies = 5;
}

// ========================================
// Valuation Rules
// ========================================

// ValuationMethod defines how instrument conversion rates are determined.
enum ValuationMethod {
  // VALUATION_METHOD_UNSPECIFIED means the method is unknown.
  VALUATION_METHOD_UNSPECIFIED = 0;
  // VALUATION_METHOD_SPOT_RATE uses real-time market rates from an external feed.
  VALUATION_METHOD_SPOT_RATE = 1;
  // VALUATION_METHOD_FIXED uses a fixed, administratively-set conversion rate.
  VALUATION_METHOD_FIXED = 2;
}

// ValuationRule defines how one instrument is converted to another.
// Used for cross-instrument transactions (e.g., kWh to GBP, USD to EUR).
message ValuationRule {
  // from_instrument is the source instrument code for conversion.
  // Must match a code from the manifest's instruments list.
  string from_instrument = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[A-Z0-9_]{1,50}$"
  }];

  // to_instrument is the target instrument code for conversion.
  // Must match a code from the manifest's instruments list.
  string to_instrument = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[A-Z0-9_]{1,50}$"
  }];

  // method defines how the conversion rate is determined.
  ValuationMethod method = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // source identifies the rate source for this rule.
  // For SPOT_RATE: the feed identifier (e.g., "ecb_fx_daily", "nordpool_spot").
  // For FIXED: a description of who sets the rate (e.g., "admin_override", "contract_rate").
  string source = 4 [(buf.validate.field).string.max_len = 255];
}

// ========================================
// Saga Definitions
// ========================================

// SagaDefinition declares a workflow within the manifest.
// Sagas are triggered by API calls, webhooks, or scheduled events,
// and contain inline Starlark scripts that orchestrate service interactions.
message SagaDefinition {
  // name is the unique identifier for this saga (e.g., "process_energy_settlement").
  // Must be lowercase alphanumeric with underscores.
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
    pattern: "^[a-z][a-z0-9_]*$"
  }];

  // trigger defines what initiates this saga.
  // Supported prefixes:
  //   "api:" - triggered by an API call (e.g., "api:/v1/settlements")
  //   "webhook:" - triggered by an external webhook (e.g., "webhook:stripe_payment")
  //   "scheduled:" - triggered on a schedule (e.g., "scheduled:daily_reconciliation")
  string trigger = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^(api:|webhook:|scheduled:).+$"
  }];

  // script is the inline Starlark source code defining the saga workflow.
  // Must not be empty - all saga logic is defined inline in the manifest.
  // Starlark guarantees termination (no while loops, no recursion).
  string script = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 65536
  }];
}

// ========================================
// Payment Rails
// ========================================

// PlatformFeeType defines how the platform fee is calculated.
enum PlatformFeeType {
  // PLATFORM_FEE_TYPE_UNSPECIFIED means the fee type is unknown.
  PLATFORM_FEE_TYPE_UNSPECIFIED = 0;
  // PLATFORM_FEE_TYPE_PERCENTAGE calculates the fee as a percentage of the transaction amount.
  PLATFORM_FEE_TYPE_PERCENTAGE = 1;
  // PLATFORM_FEE_TYPE_FLAT applies a fixed fee amount per transaction.
  PLATFORM_FEE_TYPE_FLAT = 2;
}

// PayoutSchedule defines when connected account payouts are initiated.
enum PayoutSchedule {
  // PAYOUT_SCHEDULE_UNSPECIFIED means the schedule is unknown.
  PAYOUT_SCHEDULE_UNSPECIFIED = 0;
  // PAYOUT_SCHEDULE_DAILY initiates payouts once per day.
  PAYOUT_SCHEDULE_DAILY = 1;
  // PAYOUT_SCHEDULE_WEEKLY initiates payouts once per week.
  PAYOUT_SCHEDULE_WEEKLY = 2;
  // PAYOUT_SCHEDULE_MONTHLY initiates payouts once per month.
  PAYOUT_SCHEDULE_MONTHLY = 3;
}

// ConnectMode defines the Stripe Connect account type.
enum ConnectMode {
  // CONNECT_MODE_UNSPECIFIED means the mode is unknown.
  CONNECT_MODE_UNSPECIFIED = 0;
  // CONNECT_MODE_STANDARD uses standard Stripe Connect accounts.
  CONNECT_MODE_STANDARD = 1;
  // CONNECT_MODE_EXPRESS uses express Stripe Connect accounts.
  CONNECT_MODE_EXPRESS = 2;
}

// PlatformFee defines the fee structure for payment rail transactions.
message PlatformFee {
  // type defines whether the fee is a percentage or flat amount.
  PlatformFeeType type = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // value is the fee amount as a decimal string.
  // For PERCENTAGE: "2.5" means 2.5%.
  // For FLAT: "0.30" means 0.30 in the transaction currency.
  // Must be a valid positive decimal value.
  string value = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
}

// PaymentRails defines an external payment provider integration.
// Currently supports Stripe Connect for payment processing.
message PaymentRails {
  // provider identifies the payment provider (e.g., "stripe_connect").
  string provider = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];

  // mode defines the Stripe Connect account type (standard or express).
  ConnectMode mode = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // account_id is the Stripe Connect account identifier (format: acct_xxx).
  string account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^acct_[A-Za-z0-9]{16,}$"
  }];

  // webhook_endpoint_secret is a reference to the webhook signing secret
  // stored in a secret manager (e.g., "sm://stripe/webhook_secret").
  // Never contains the plaintext secret.
  string webhook_endpoint_secret = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];

  // platform_fee defines the fee structure for transactions on this rail.
  PlatformFee platform_fee = 5 [(buf.validate.field).required = true];

  // payout_schedule defines when connected account payouts are initiated.
  PayoutSchedule payout_schedule = 6 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // supported_methods lists the payment methods enabled on this rail
  // (e.g., "card", "sepa_debit", "bank_account").
  repeated string supported_methods = 7 [(buf.validate.field).repeated = {
    min_items: 1
    items: {
      string: {
        min_len: 1
        max_len: 64
        pattern: "^[a-z][a-z0-9_]*$"
      }
    }
  }];
}

// ========================================
// Operational Gateway Config
// ========================================

// OperationalGatewayConfig declares the external system integrations for a tenant.
// It configures provider connections, outbound instruction routing, and inbound event handling.
message OperationalGatewayConfig {
  // provider_connections defines the external provider endpoints this tenant connects to.
  repeated ProviderConnectionConfig provider_connections = 1;

  // instruction_routes maps instruction types to provider connections for outbound dispatch.
  repeated InstructionRouteConfig instruction_routes = 2;

  // inbound_routes defines how inbound events from external providers are handled (Phase 5 placeholder).
  repeated InboundRouteConfig inbound_routes = 3;
}

// ProviderProtocol defines the transport protocol used for a provider connection.
// Mirrors the runtime Protocol enum but is self-contained in the manifest config.
enum ProviderProtocol {
  // PROVIDER_PROTOCOL_UNSPECIFIED means the protocol is unknown.
  PROVIDER_PROTOCOL_UNSPECIFIED = 0;
  // PROVIDER_PROTOCOL_HTTPS dispatches instructions via HTTPS REST calls.
  PROVIDER_PROTOCOL_HTTPS = 1;
  // PROVIDER_PROTOCOL_GRPC dispatches instructions via gRPC.
  PROVIDER_PROTOCOL_GRPC = 2;
  // PROVIDER_PROTOCOL_WEBHOOK sends instructions to a webhook endpoint (HTTPS with specific retry semantics).
  PROVIDER_PROTOCOL_WEBHOOK = 3;
  // PROVIDER_PROTOCOL_MQTT publishes instructions to an MQTT topic.
  PROVIDER_PROTOCOL_MQTT = 4;
  // PROVIDER_PROTOCOL_AMQP publishes instructions to an AMQP queue or exchange.
  PROVIDER_PROTOCOL_AMQP = 5;
}

// RetryPolicyConfig defines the backoff strategy for failed dispatch attempts.
message RetryPolicyConfig {
  // max_attempts is the total number of dispatch attempts (including the first).
  // A value of 1 means no retries (one attempt only).
  int32 max_attempts = 1 [(buf.validate.field).int32 = {
    gte: 1
    lte: 20
  }];

  // initial_backoff_seconds is the delay before the first retry in seconds.
  int32 initial_backoff_seconds = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 3600
  }];

  // max_backoff_seconds caps the computed backoff to prevent unbounded delays.
  int32 max_backoff_seconds = 3 [(buf.validate.field).int32 = {
    gte: 1
    lte: 86400
  }];

  // backoff_multiplier is the factor by which the backoff duration grows after each attempt.
  // Example: initial=1s, multiplier=2.0 → 1s, 2s, 4s, 8s...
  double backoff_multiplier = 4 [(buf.validate.field).double = {
    gte: 1.0
    lte: 10.0
  }];
}

// RateLimitConfig controls the outbound dispatch rate for a connection.
message RateLimitConfig {
  // requests_per_second is the maximum sustained dispatch rate.
  double requests_per_second = 1 [(buf.validate.field).double = {
    gt: 0.0
    lte: 10000.0
  }];

  // burst_size is the maximum number of requests allowed to exceed the rate limit momentarily.
  int32 burst_size = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 10000
  }];
}

// ApiKeyAuthConfig configures authentication via a static API key header.
// All sensitive values are expressed as secret references, never raw values.
message ApiKeyAuthConfig {
  // header_name is the HTTP header used to transmit the API key.
  // Example: "X-API-Key", "Authorization"
  string header_name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];

  // api_key_secret_ref is a reference to the secret store key that holds the API key value.
  // Example: "sm://stripe/api_key" or "env://STRIPE_API_KEY"
  string api_key_secret_ref = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];
}

// BasicAuthConfig configures HTTP Basic authentication.
// All sensitive values are expressed as secret references, never raw values.
message BasicAuthConfig {
  // username is the Basic auth username (not sensitive - stored directly).
  string username = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // password_secret_ref is a reference to the secret store key that holds the password.
  string password_secret_ref = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];
}

// OAuth2AuthConfig configures OAuth 2.0 client credentials flow authentication.
// All sensitive values are expressed as secret references, never raw values.
message OAuth2AuthConfig {
  // token_url is the OAuth 2.0 token endpoint.
  string token_url = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2048
    uri: true
  }];

  // client_id is the OAuth 2.0 client identifier (not sensitive - stored directly).
  string client_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];

  // client_secret_ref is a reference to the secret store key that holds the client secret.
  string client_secret_ref = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];

  // scopes lists the OAuth 2.0 scopes to request.
  repeated string scopes = 4 [(buf.validate.field).repeated = {
    max_items: 32
    items: {string: {max_len: 256}}
  }];
}

// HMACAuthConfig configures HMAC-based request signing.
// All sensitive values are expressed as secret references, never raw values.
message HMACAuthConfig {
  // algorithm is the HMAC signing algorithm.
  // Supported values: "sha256", "sha512"
  string algorithm = 1 [(buf.validate.field).string = {
    in: [
      "sha256",
      "sha512"
    ]
  }];

  // secret_ref is a reference to the secret store key that holds the HMAC signing secret.
  string secret_ref = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];

  // signature_header is the HTTP header where the computed signature is placed.
  // Example: "X-Signature", "X-Hub-Signature-256"
  string signature_header = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}

// MTLSAuthConfig configures mutual TLS (mTLS) authentication.
// All sensitive values are expressed as secret references, never raw values.
message MTLSAuthConfig {
  // client_cert_secret_ref is a reference to the secret store key holding the PEM-encoded client certificate.
  string client_cert_secret_ref = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];

  // client_key_secret_ref is a reference to the secret store key holding the PEM-encoded private key.
  string client_key_secret_ref = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];

  // ca_cert_secret_ref is an optional reference to the secret store key holding the CA certificate
  // for verifying the provider's server certificate.
  string ca_cert_secret_ref = 3 [(buf.validate.field).string.max_len = 512];
}

// AuthConfigManifest defines the authentication configuration for a provider connection.
// Exactly one variant must be set. All sensitive values use secret references.
message AuthConfigManifest {
  // auth_config is the authentication variant for this connection.
  // Exactly one must be set.
  oneof auth_config {
    option (buf.validate.oneof).required = true;

    // api_key authenticates using a static API key in a header.
    ApiKeyAuthConfig api_key = 1;
    // basic authenticates using HTTP Basic authentication.
    BasicAuthConfig basic = 2;
    // oauth2 authenticates using OAuth 2.0 client credentials flow.
    OAuth2AuthConfig oauth2 = 3;
    // hmac authenticates by signing requests with HMAC.
    HMACAuthConfig hmac = 4;
    // mtls authenticates using mutual TLS client certificates.
    MTLSAuthConfig mtls = 5;
  }
}

// ProviderConnectionConfig declares a single external provider connection within the manifest.
// Each connection is identified by a stable connection_id used in InstructionRouteConfig.
message ProviderConnectionConfig {
  // connection_id is the stable, unique identifier for this connection within the manifest.
  // Used by InstructionRouteConfig to reference this connection. Must be unique within the manifest.
  // Example: "stripe-payments", "modulr-uk", "kraken-energy-grid"
  string connection_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
    pattern: "^[a-z][a-z0-9_-]*$"
  }];

  // provider_name is the human-readable name for the external provider.
  // Example: "Stripe", "Modulr", "Kraken Energy Grid"
  string provider_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // provider_type is a machine-readable classifier for the provider category.
  // Example: "payment_gateway", "kyc_provider", "energy_scheduler"
  string provider_type = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
    pattern: "^[a-z][a-z0-9_]*$"
  }];

  // protocol is the transport protocol for dispatching instructions to this provider.
  ProviderProtocol protocol = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // base_url is the root URL of the provider's API endpoint.
  // Must be a valid URI. Example: "https://api.stripe.com"
  string base_url = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2048
    uri: true
  }];

  // auth is the authentication configuration for this connection.
  AuthConfigManifest auth = 6 [(buf.validate.field).required = true];

  // retry_policy defines how failed dispatch attempts are retried.
  // If not set, a default policy is used by the runtime.
  RetryPolicyConfig retry_policy = 7;

  // rate_limit controls the outbound dispatch rate for this connection.
  // If not set, no rate limiting is applied.
  RateLimitConfig rate_limit = 8;
}

// InstructionRouteConfig maps an instruction_type to a provider connection for outbound dispatch.
// Routes determine which connection handles a given type of instruction and how the
// payload is transformed before dispatch.
message InstructionRouteConfig {
  // instruction_type is the instruction category this route handles.
  // Must be unique within the manifest's instruction_routes list.
  // Example: "payment.initiate", "account.freeze", "kyc.verify"
  string instruction_type = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // connection_id references the primary ProviderConnectionConfig used to dispatch matching instructions.
  // Must match a connection_id defined in operational_gateway.provider_connections.
  string connection_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
    pattern: "^[a-z][a-z0-9_-]*$"
  }];

  // fallback_connection_id references an optional secondary connection used when the primary is unhealthy.
  // Must match a connection_id defined in operational_gateway.provider_connections, if set.
  // If not set, instructions fail without fallback when the primary connection is unhealthy.
  string fallback_connection_id = 3 [(buf.validate.field).string = {
    max_len: 128
    pattern: "^$|^[a-z][a-z0-9_-]*$"
  }];

  // outbound_mapping_id is the name of the MappingDefinition applied to transform the instruction
  // payload from the internal Meridian format to the provider's expected format before dispatch.
  // Must match a name in the manifest's mappings list. If empty, the payload is sent as-is.
  string outbound_mapping_id = 4 [(buf.validate.field).string.max_len = 255];

  // inbound_mapping_id is the name of the MappingDefinition applied to transform provider callback
  // payloads from the provider's format to the internal Meridian format.
  // Must match a name in the manifest's mappings list. If empty, callback payloads are processed as-is.
  string inbound_mapping_id = 5 [(buf.validate.field).string.max_len = 255];

  // http_method is the HTTP method used when dispatching via HTTPS or WEBHOOK protocol.
  // Example: "POST", "PUT", "PATCH"
  // Required for HTTPS and WEBHOOK protocols; ignored for GRPC, MQTT, AMQP.
  string http_method = 6 [(buf.validate.field).string = {
    max_len: 10
    pattern: "^(GET|POST|PUT|PATCH|DELETE)?$"
  }];

  // path_template is the URL path template appended to the connection base_url.
  // Supports simple variable substitution using {field_name} placeholders resolved from the payload.
  // Example: "/v1/payments/{payment_id}/execute", "/accounts/{account_id}/freeze"
  string path_template = 7 [(buf.validate.field).string.max_len = 1024];
}

// InboundRouteConfig declares how inbound events from external providers are handled.
// This is a Phase 5 placeholder — configuration is captured in the manifest but runtime
// support is not yet implemented.
message InboundRouteConfig {
  // external_type identifies the category of inbound event from the provider.
  // Example: "stripe.payment_intent.succeeded", "modulr.account.credited"
  string external_type = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // handler_saga is the name of the SagaDefinition to invoke when this event is received.
  // Must match a name in the manifest's sagas list.
  string handler_saga = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
    pattern: "^[a-z][a-z0-9_]*$"
  }];

  // mapping_id is the name of the MappingDefinition applied to transform the inbound event
  // payload before passing it to the handler saga.
  // Must match a name in the manifest's mappings list. If empty, the payload is passed as-is.
  string mapping_id = 3 [(buf.validate.field).string.max_len = 255];
}
