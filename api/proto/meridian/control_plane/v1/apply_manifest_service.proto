syntax = "proto3";

package meridian.control_plane.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "meridian/control_plane/v1/manifest.proto";
import "meridian/control_plane/v1/manifest_history_service.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/control_plane/v1;controlplanev1";

// ApplyManifestService is the public entry point for applying tenant manifests.
// It orchestrates validation, diffing, planning, and execution of manifest changes.
service ApplyManifestService {
  // ApplyManifest validates and applies a manifest, returning the execution result.
  // In dry_run mode, validation and planning are performed but no changes are committed.
  rpc ApplyManifest(ApplyManifestRequest) returns (ApplyManifestResponse) {
    option (google.api.http) = {
      post: "/v1/manifests/apply"
      body: "*"
    };
  }
}

// ApplyManifestRequest contains the manifest to apply and apply options.
message ApplyManifestRequest {
  // manifest is the complete tenant manifest to apply.
  Manifest manifest = 1 [(buf.validate.field).required = true];

  // dry_run when true performs validation and planning without committing changes.
  bool dry_run = 2;

  // force when true skips breaking-change confirmation checks (e.g., deletions).
  bool force = 3;

  // applied_by identifies who is applying this manifest (e.g., user email, API key ID).
  string applied_by = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // skip_immutability_checks when true bypasses immutability enforcement and
  // destructive removal checks. Use with dry_run=true to validate a manifest
  // that is intended for a new tenant (create mode) without comparing against
  // existing tenant state. Has no effect when dry_run=false.
  bool skip_immutability_checks = 5;

  // expected_sequence_number is the sequence number the caller expects the
  // current manifest to have. If it does not match the actual current sequence
  // number, the apply is rejected with ABORTED status (ETag semantics).
  // Set to 0 to skip the check (first apply or "overwrite" mode).
  int64 expected_sequence_number = 6;
}

// ApplyManifestResponse contains the result of a manifest application.
message ApplyManifestResponse {
  // job_id is the tracking identifier for this apply operation.
  string job_id = 1;

  // status is the outcome of the apply operation.
  ApplyManifestStatus status = 2;

  // step_results contains the result of each execution step.
  repeated StepResult step_results = 3;

  // snapshot is the manifest version record created by this apply, if successful.
  ManifestVersion snapshot = 4;

  // validation_errors contains structured validation errors if the manifest is invalid.
  repeated ValidationError validation_errors = 5;

  // diff_summary is a human-readable summary of changes detected.
  string diff_summary = 6;

  // sequence_number is the sequence number assigned to this manifest version.
  // Callers should use this value as expected_sequence_number in subsequent applies.
  int64 sequence_number = 7;

  // phase_status contains per-phase execution status for partial failure recovery.
  // Populated when status is PARTIAL or FAILED, showing which phases succeeded/failed.
  map<string, PhaseStatusDetail> phase_status = 8;
}

// ApplyManifestStatus represents the outcome of an apply operation.
enum ApplyManifestStatus {
  // APPLY_MANIFEST_STATUS_UNSPECIFIED is the default zero value.
  APPLY_MANIFEST_STATUS_UNSPECIFIED = 0;

  // APPLY_MANIFEST_STATUS_APPLIED indicates the manifest was successfully applied.
  APPLY_MANIFEST_STATUS_APPLIED = 1;

  // APPLY_MANIFEST_STATUS_FAILED indicates the apply operation failed.
  APPLY_MANIFEST_STATUS_FAILED = 2;

  // APPLY_MANIFEST_STATUS_DRY_RUN indicates the operation was a dry run (no changes committed).
  APPLY_MANIFEST_STATUS_DRY_RUN = 3;

  // APPLY_MANIFEST_STATUS_VALIDATION_FAILED indicates the manifest failed validation.
  APPLY_MANIFEST_STATUS_VALIDATION_FAILED = 4;

  // APPLY_MANIFEST_STATUS_BLOCKED indicates the operation was blocked by safety checks.
  APPLY_MANIFEST_STATUS_BLOCKED = 5;

  // APPLY_MANIFEST_STATUS_PARTIAL indicates some phases succeeded but at least one failed.
  APPLY_MANIFEST_STATUS_PARTIAL = 6;
}

// StepResult represents the outcome of a single execution step.
message StepResult {
  // step_name identifies this step (e.g., "validate", "diff", "plan", "execute").
  string step_name = 1;

  // status is the outcome of this step.
  StepResultStatus status = 2;

  // message provides human-readable details about this step's result.
  string message = 3;

  // details contains additional structured information about this step.
  map<string, string> details = 4;
}

// StepResultStatus represents the outcome of a single step.
enum StepResultStatus {
  // STEP_RESULT_STATUS_UNSPECIFIED is the default zero value.
  STEP_RESULT_STATUS_UNSPECIFIED = 0;

  // STEP_RESULT_STATUS_SUCCESS indicates the step completed successfully.
  STEP_RESULT_STATUS_SUCCESS = 1;

  // STEP_RESULT_STATUS_FAILED indicates the step failed.
  STEP_RESULT_STATUS_FAILED = 2;

  // STEP_RESULT_STATUS_SKIPPED indicates the step was skipped (e.g., execution in dry_run mode).
  STEP_RESULT_STATUS_SKIPPED = 3;
}

// ValidationError represents a structured validation finding.
message ValidationError {
  // severity indicates whether this blocks activation.
  string severity = 1;

  // path is the location within the manifest (e.g., "instruments[0].code").
  string path = 2;

  // code is a machine-readable error code (e.g., "CEL_TYPE_ERROR").
  string code = 3;

  // message is a human-readable description of the issue.
  string message = 4;

  // suggestion is a "Did you mean...?" hint for typos.
  string suggestion = 5;

  // resource_type is the manifest section type where the error occurred
  // (e.g., "instrument", "account_type", "saga", "valuation_rule").
  string resource_type = 6;

  // resource_id is the identifier of the specific resource that caused the error
  // (e.g., the instrument code, account type code, or saga name).
  string resource_id = 7;
}
