syntax = "proto3";

package meridian.organization.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/organization/v1;organizationv1";

// OpenAPI specification metadata for Organization Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Organization Service API"
    version: "1.0"
    description: "BIAN-compliant Party Lifecycle Management service for organization "
                 "registry and lifecycle operations in a multi-tenant platform."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
};

// OrganizationStatus defines the lifecycle state of an organization.
enum OrganizationStatus {
  // ORGANIZATION_STATUS_UNSPECIFIED means the status is unknown.
  ORGANIZATION_STATUS_UNSPECIFIED = 0;
  // ORGANIZATION_STATUS_ACTIVE means the organization is active and can operate.
  ORGANIZATION_STATUS_ACTIVE = 1;
  // ORGANIZATION_STATUS_SUSPENDED means the organization is temporarily suspended.
  ORGANIZATION_STATUS_SUSPENDED = 2;
  // ORGANIZATION_STATUS_DEPROVISIONED means the organization has been deprovisioned.
  ORGANIZATION_STATUS_DEPROVISIONED = 3;
}

// Organization represents a tenant in the BIAN Party Lifecycle Management domain.
// Organizations own their own data in isolated PostgreSQL schemas.
message Organization {
  // organization_id is the unique identifier (alphanumeric + underscore, 1-50 chars).
  // Used for schema routing (org_{id} schema) and API subdomain.
  string organization_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  // display_name is the human-readable name of the organization.
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // settlement_asset is the primary asset for this organization (e.g., GBP, USD, GPU-HOUR).
  string settlement_asset = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
  }];

  // subdomain is the API subdomain for this organization (e.g., acme-bank.demo.meridian.io).
  // Optional - not all organizations need a subdomain.
  string subdomain = 4 [(buf.validate.field).string = {max_len: 255}];

  // status is the current lifecycle state of the organization.
  OrganizationStatus status = 5 [(buf.validate.field).enum = {defined_only: true}];

  // created_at is when the organization was registered.
  google.protobuf.Timestamp created_at = 6;

  // deprovisioned_at is when the organization was deprovisioned (null if active/suspended).
  google.protobuf.Timestamp deprovisioned_at = 7;

  // metadata contains flexible configuration (features, quotas, org-specific settings).
  google.protobuf.Struct metadata = 8;

  // version is for optimistic locking.
  int32 version = 9 [(buf.validate.field).int32 = {gte: 0}];
}

// InitiateOrganizationRequest is the request to create a new organization (BIAN: Initiate).
message InitiateOrganizationRequest {
  // organization_id is the unique identifier for the organization.
  string organization_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  // display_name is the human-readable name of the organization.
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // settlement_asset is the primary asset for this organization.
  string settlement_asset = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
  }];

  // subdomain is the API subdomain for this organization (optional).
  string subdomain = 4 [(buf.validate.field).string = {max_len: 255}];

  // metadata contains initial configuration for the organization (optional).
  google.protobuf.Struct metadata = 5;
}

// InitiateOrganizationResponse is the response after creating an organization.
message InitiateOrganizationResponse {
  // organization is the newly created organization.
  Organization organization = 1 [(buf.validate.field).required = true];
}

// RetrieveOrganizationRequest is the request to get organization details (BIAN: Retrieve).
message RetrieveOrganizationRequest {
  // organization_id is the unique identifier of the organization to retrieve.
  string organization_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];
}

// RetrieveOrganizationResponse is the response containing the requested organization.
message RetrieveOrganizationResponse {
  // organization is the requested organization.
  Organization organization = 1 [(buf.validate.field).required = true];
}

// UpdateOrganizationStatusRequest is the request to change organization status (BIAN: Update).
message UpdateOrganizationStatusRequest {
  // organization_id is the unique identifier of the organization to update.
  string organization_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  // status is the new lifecycle state for the organization.
  OrganizationStatus status = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];
}

// UpdateOrganizationStatusResponse is the response after updating organization status.
message UpdateOrganizationStatusResponse {
  // organization is the updated organization.
  Organization organization = 1 [(buf.validate.field).required = true];
}

// ListOrganizationsRequest is the request to list organizations (BIAN: Control).
message ListOrganizationsRequest {
  // status_filter filters by organization status (optional, returns all if unspecified).
  OrganizationStatus status_filter = 1 [(buf.validate.field).enum = {defined_only: true}];

  // page_size is the number of items to return (default: 50, max: 1000).
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];

  // page_token is an opaque token for fetching the next page.
  string page_token = 3;
}

// ListOrganizationsResponse is the response containing the list of organizations.
message ListOrganizationsResponse {
  // organizations is the list of organizations.
  repeated Organization organizations = 1;

  // next_page_token is the token for fetching the next page (empty if last page).
  string next_page_token = 2;
}

// OrganizationService provides BIAN-compliant Party Lifecycle Management.
//
// Design Notes:
// - DELETE operations are intentionally not provided. Organizations are managed
//   through status transitions (Active -> Suspended -> Deprovisioned) for audit compliance.
// - This service follows the BIAN Party Lifecycle Management service domain pattern.
// - Organizations map to PostgreSQL schemas (org_{id}) for data isolation.
service OrganizationService {
  // InitiateOrganization creates a new organization in the platform registry (BIAN: Initiate).
  rpc InitiateOrganization(InitiateOrganizationRequest) returns (InitiateOrganizationResponse) {
    option (google.api.http) = {
      post: "/v1/organizations"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Organization created successfully"
        }
      }
    };
  }

  // RetrieveOrganization gets organization details by ID (BIAN: Retrieve).
  rpc RetrieveOrganization(RetrieveOrganizationRequest) returns (RetrieveOrganizationResponse) {
    option (google.api.http) = {
      get: "/v1/organizations/{organization_id}"
    };
  }

  // UpdateOrganizationStatus changes the lifecycle status of an organization (BIAN: Update).
  rpc UpdateOrganizationStatus(UpdateOrganizationStatusRequest) returns (UpdateOrganizationStatusResponse) {
    option (google.api.http) = {
      patch: "/v1/organizations/{organization_id}/status"
      body: "*"
    };
  }

  // ListOrganizations returns all organizations with optional status filter (BIAN: Control).
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (google.api.http) = {
      get: "/v1/organizations"
    };
  }
}
