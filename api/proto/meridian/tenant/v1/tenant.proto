syntax = "proto3";

package meridian.tenant.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/tenant/v1;tenantv1";

// OpenAPI specification metadata for Tenant Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Tenant Service API"
    version: "1.0"
    description: "Platform tenant lifecycle management service for multi-tenant infrastructure. "
                 "Manages tenant registry and lifecycle operations (distinct from BIAN Party domain entities)."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
};

// TenantStatus defines the lifecycle state of a tenant.
enum TenantStatus {
  // TENANT_STATUS_UNSPECIFIED means the status is unknown.
  TENANT_STATUS_UNSPECIFIED = 0;
  // TENANT_STATUS_ACTIVE means the tenant is active and can operate.
  TENANT_STATUS_ACTIVE = 1;
  // TENANT_STATUS_SUSPENDED means the tenant is temporarily suspended.
  TENANT_STATUS_SUSPENDED = 2;
  // TENANT_STATUS_DEPROVISIONED means the tenant has been deprovisioned.
  TENANT_STATUS_DEPROVISIONED = 3;
  // TENANT_STATUS_PROVISIONING means the tenant is being provisioned (schemas being created).
  TENANT_STATUS_PROVISIONING = 4;
  // TENANT_STATUS_PROVISIONING_FAILED means schema provisioning failed.
  TENANT_STATUS_PROVISIONING_FAILED = 5;
  // TENANT_STATUS_PROVISIONING_PENDING means the tenant registration is queued for async provisioning.
  TENANT_STATUS_PROVISIONING_PENDING = 6;
}

// Tenant represents a platform tenant for multi-tenant infrastructure.
// Tenants own their own data in isolated PostgreSQL schemas.
// Note: This is distinct from BIAN Party.Organization which represents legal entities.
message Tenant {
  // tenant_id is the unique identifier (alphanumeric + underscore, 1-50 chars).
  // Used for schema routing (org_{id} schema) and API subdomain.
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  // display_name is the human-readable name of the tenant.
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // settlement_asset is the primary asset for this tenant (e.g., GBP, USD, GPU-HOUR).
  string settlement_asset = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
  }];

  // subdomain is the API subdomain for this tenant (e.g., acme-bank.demo.meridian.io).
  // Optional - not all tenants need a subdomain.
  string subdomain = 4 [(buf.validate.field).string = {max_len: 255}];

  // status is the current lifecycle state of the tenant.
  TenantStatus status = 5 [(buf.validate.field).enum = {defined_only: true}];

  // created_at is when the tenant was registered.
  google.protobuf.Timestamp created_at = 6;

  // deprovisioned_at is when the tenant was deprovisioned (null if active/suspended).
  google.protobuf.Timestamp deprovisioned_at = 7;

  // metadata contains flexible configuration (features, quotas, tenant-specific settings).
  google.protobuf.Struct metadata = 8;

  // version is for optimistic locking.
  int32 version = 9 [(buf.validate.field).int32 = {gte: 0}];

  // party_id is the reference to the corresponding Party in the BIAN Party Reference Data Directory.
  // Automatically populated when the tenant is created via PartyService.RegisterParty.
  // This links platform infrastructure (Tenant) to BIAN domain entities (Party.Organization).
  //
  // Optional: May be empty for tenants created before party integration was added,
  // or when the Party service is not configured. The pattern uses * (not +) to allow
  // empty strings for backward compatibility with existing tenants.
  string party_id = 10 [(buf.validate.field).string = {
    pattern: "^[a-zA-Z0-9_-]*$"
    max_len: 100
  }];

  // error_message contains details if status is PROVISIONING_FAILED.
  // Empty string for successfully provisioned tenants.
  string error_message = 11 [(buf.validate.field).string = {max_len: 2000}];

  // slug is a URL-friendly identifier for the tenant (e.g., acme-bank).
  // Must be a valid DNS label (RFC 1123): lowercase alphanumeric with hyphens,
  // starting and ending with alphanumeric. Maximum length is 63 characters
  // per DNS label specification. Used for subdomain construction and API routing.
  string slug = 12 [(buf.validate.field).string = {
    min_len: 3
    max_len: 63
    pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
  }];
}

// InitiateTenantRequest is the request to create a new tenant (BIAN: Initiate).
message InitiateTenantRequest {
  // tenant_id is the unique identifier for the tenant.
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  // display_name is the human-readable name of the tenant.
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // settlement_asset is the primary asset for this tenant.
  string settlement_asset = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
  }];

  // subdomain is the API subdomain for this tenant (optional).
  string subdomain = 4 [(buf.validate.field).string = {max_len: 255}];

  // metadata contains initial configuration for the tenant (optional).
  google.protobuf.Struct metadata = 5;

  // slug is a URL-friendly identifier for the tenant (e.g., acme-bank).
  // This field is optional and will be auto-generated from display_name if not provided.
  // Must be a valid DNS label (RFC 1123): lowercase alphanumeric with hyphens,
  // starting and ending with alphanumeric. Maximum length is 63 characters
  // per DNS label specification. Used for subdomain construction and API routing.
  string slug = 6 [(buf.validate.field).string = {
    min_len: 3
    max_len: 63
    pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
  }];
}

// InitiateTenantResponse is the response after creating a tenant.
//
// ## Async Provisioning Workflow
//
// Tenant provisioning may be asynchronous depending on system load and tenant configuration.
// Clients should use the provisioning_hint field to determine the appropriate next action:
//
// ### Scenario 1: Synchronous Provisioning (provisioning_hint = "active")
// - Tenant provisioning completed immediately during the API call
// - Tenant is fully ready and operational
// - Client can proceed to use tenant services immediately
// - No polling required
//
// Example response:
// ```json
// {
//   "tenant": {
//     "tenant_id": "acme_corp",
//     "status": "TENANT_STATUS_ACTIVE",
//     ...
//   },
//   "provisioning_hint": "active"
// }
// ```
//
// ### Scenario 2: Asynchronous Provisioning (provisioning_hint = "pending")
// - Tenant registration accepted but provisioning is queued
// - Tenant is not yet ready for use
// - Client MUST poll RetrieveTenant to track provisioning progress
// - Recommended polling: exponential backoff starting at 1s, max 30s interval
//
// Example response:
// ```json
// {
//   "tenant": {
//     "tenant_id": "acme_corp",
//     "status": "TENANT_STATUS_PROVISIONING_PENDING",
//     ...
//   },
//   "provisioning_hint": "pending"
// }
// ```
//
// Client polling example:
// ```javascript
// const response = await initiateTenant(request);
// if (response.provisioning_hint === "pending") {
//   let attempts = 0;
//   while (attempts < 20) {
//     await sleep(Math.min(1000 * Math.pow(2, attempts), 30000));
//     const status = await getTenantProvisioningStatus(tenantId);
//     if (status.status === "TENANT_STATUS_ACTIVE") {
//       // Tenant ready
//       break;
//     }
//     if (status.status === "TENANT_STATUS_PROVISIONING_FAILED") {
//       // Handle error
//       throw new Error(status.error_message);
//     }
//     attempts++;
//   }
// }
// ```
//
// ### Why Async Provisioning?
// - Database schema creation can take 5-30 seconds for complex tenants
// - Prevents API timeouts and poor client experience
// - Allows system to queue and batch provisioning operations
// - Provides clear separation between tenant registration and provisioning completion
message InitiateTenantResponse {
  // tenant is the newly created tenant.
  // Check provisioning_hint to determine if tenant is ready or requires polling.
  Tenant tenant = 1 [(buf.validate.field).required = true];

  // provisioning_hint provides a simplified status indicator for clients.
  //
  // Possible values:
  // - "pending": Tenant provisioning is queued/in-progress. Client MUST poll RetrieveTenant.
  // - "active": Tenant is fully provisioned and ready to use. No polling needed.
  //
  // This field simplifies client logic by providing a binary decision point rather than
  // requiring clients to understand the full TenantStatus enum. Clients should use this
  // field to determine their next action:
  // - "pending" → Poll RetrieveTenant with exponential backoff
  // - "active" → Proceed to use tenant services immediately
  //
  // Note: This is a convenience field. The authoritative tenant status is always
  // available in the tenant.status field for clients that need fine-grained control.
  string provisioning_hint = 2 [
    (buf.validate.field).string = {
      in: ["pending", "active"]
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Provisioning status hint. Possible values: 'pending' (tenant provisioning queued/in-progress, client must poll), 'active' (tenant ready immediately)."
      example: "\"active\""
    }
  ];
}

// RetrieveTenantRequest is the request to get tenant details (BIAN: Retrieve).
message RetrieveTenantRequest {
  // tenant_id is the unique identifier of the tenant to retrieve.
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];
}

// RetrieveTenantResponse is the response containing the requested tenant.
message RetrieveTenantResponse {
  // tenant is the requested tenant.
  Tenant tenant = 1 [(buf.validate.field).required = true];
}

// UpdateTenantStatusRequest is the request to change tenant status (BIAN: Update).
// This operation uses optimistic locking. If the tenant was modified by another request,
// an ABORTED error is returned. Clients should retry the operation in this case.
// Valid status transitions:
//   - provisioning -> active, provisioning_failed
//   - provisioning_failed -> provisioning (retry)
//   - active -> suspended, deprovisioned
//   - suspended -> active, deprovisioned
//   - deprovisioned -> (none, terminal state)
message UpdateTenantStatusRequest {
  // tenant_id is the unique identifier of the tenant to update.
  string tenant_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  // status is the new lifecycle state for the tenant.
  TenantStatus status = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] // Prevent UNSPECIFIED
  }];
}

// UpdateTenantStatusResponse is the response after updating tenant status.
message UpdateTenantStatusResponse {
  // tenant is the updated tenant.
  Tenant tenant = 1 [(buf.validate.field).required = true];
}

// ListTenantsRequest is the request to list tenants (BIAN: Control).
message ListTenantsRequest {
  // status_filter filters by tenant status (optional, returns all if unspecified).
  TenantStatus status_filter = 1 [(buf.validate.field).enum = {defined_only: true}];

  // page_size is the number of items to return (default: 50, max: 1000).
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];

  // page_token is an opaque token for fetching the next page.
  string page_token = 3;
}

// ListTenantsResponse is the response containing the list of tenants.
message ListTenantsResponse {
  // tenants is the list of tenants.
  repeated Tenant tenants = 1;

  // next_page_token is the token for fetching the next page (empty if last page).
  string next_page_token = 2;
}

// ReconcileMigrationsRequest is the request to apply new migrations to existing tenants.
message ReconcileMigrationsRequest {
  // tenant_id is the specific tenant to reconcile (optional).
  // If empty, reconciles all active tenants.
  // If provided, must match the tenant ID pattern (alphanumeric + underscore).
  string tenant_id = 1 [(buf.validate.field).string = {
    max_len: 50
    // Pattern allows empty string for "reconcile all active tenants" mode
    pattern: "^[a-zA-Z0-9_]*$"
  }];
}

// ReconcileMigrationsResponse is the response after reconciling migrations.
message ReconcileMigrationsResponse {
  // reconciled_count is the number of tenants that had migrations applied.
  int32 reconciled_count = 1;

  // errors contains per-tenant error messages (reconciliation continues despite failures).
  repeated string errors = 2;
}

// TenantService provides platform tenant lifecycle management.
//
// Design Notes:
// - DELETE operations are intentionally not provided. Tenants are managed
//   through status transitions (Active -> Suspended -> Deprovisioned) for audit compliance.
// - This service manages platform infrastructure tenants, distinct from BIAN Party domain entities.
// - Tenants map to PostgreSQL schemas (org_{id}) for data isolation.
service TenantService {
  // InitiateTenant creates a new tenant in the platform registry (BIAN: Initiate).
  //
  // This operation may complete synchronously or asynchronously depending on system load.
  // Always check the provisioning_hint field in the response to determine next steps.
  rpc InitiateTenant(InitiateTenantRequest) returns (InitiateTenantResponse) {
    option (google.api.http) = {
      post: "/v1/tenants"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a new tenant"
      description: "Creates a new tenant in the platform registry. Returns HTTP 201 for both sync and async flows.\n\n"
                   "**IMPORTANT**: Check the provisioning_hint field (not HTTP status) to determine next steps:\n\n"
                   "- provisioning_hint=\"active\": Tenant is immediately ready for use\n"
                   "- provisioning_hint=\"pending\": Tenant provisioning is queued. Poll RetrieveTenant to check status.\n\n"
                   "For pending provisioning, use exponential backoff polling (1s initial, max 30s interval) until "
                   "tenant.status becomes TENANT_STATUS_ACTIVE or TENANT_STATUS_PROVISIONING_FAILED."
      responses: {
        key: "201"
        value: {
          description: "Tenant created. Check provisioning_hint field to determine if additional polling is required. "
                       "Both sync (active) and async (pending) flows return 201."
          examples: {
            key: "application/json"
            value: '{"tenant": {"tenant_id": "acme_corp", "status": "TENANT_STATUS_PROVISIONING_PENDING"}, "provisioning_hint": "pending"}'
          }
        }
      }
    };
  }

  // RetrieveTenant gets tenant details by ID (BIAN: Retrieve).
  //
  // This endpoint is used for:
  // 1. Retrieving current tenant details
  // 2. Polling provisioning status when InitiateTenant returns provisioning_hint="pending"
  //
  // When polling for provisioning completion:
  // - Use exponential backoff (start at 1s, max 30s interval)
  // - Check tenant.status field for current state
  // - Stop polling when status becomes ACTIVE or PROVISIONING_FAILED
  // - If PROVISIONING_FAILED, check tenant.error_message for details
  rpc RetrieveTenant(RetrieveTenantRequest) returns (RetrieveTenantResponse) {
    option (google.api.http) = {
      get: "/v1/tenants/{tenant_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get tenant details"
      description: "Retrieves tenant details by ID. Also used for polling provisioning status after async tenant creation.\n\n"
                   "Provisioning status polling workflow:\n"
                   "1. Call InitiateTenant and receive provisioning_hint=\"pending\"\n"
                   "2. Poll this endpoint with exponential backoff (1s initial, max 30s)\n"
                   "3. Check response.tenant.status:\n"
                   "   - TENANT_STATUS_PROVISIONING_PENDING: Continue polling\n"
                   "   - TENANT_STATUS_PROVISIONING: Continue polling\n"
                   "   - TENANT_STATUS_ACTIVE: Provisioning complete, tenant ready\n"
                   "   - TENANT_STATUS_PROVISIONING_FAILED: Provisioning failed, check error_message"
    };
  }

  // UpdateTenantStatus changes the lifecycle status of a tenant (BIAN: Update).
  rpc UpdateTenantStatus(UpdateTenantStatusRequest) returns (UpdateTenantStatusResponse) {
    option (google.api.http) = {
      patch: "/v1/tenants/{tenant_id}/status"
      body: "*"
    };
  }

  // ListTenants returns all tenants with optional status filter (BIAN: Control).
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse) {
    option (google.api.http) = {
      get: "/v1/tenants"
    };
  }

  // ReconcileMigrations applies new migrations to existing tenant schemas.
  // When services add new migrations after tenants are created, existing tenant
  // schemas may be missing these migrations. This operation detects and applies
  // new migrations to bring tenant schemas up to date.
  rpc ReconcileMigrations(ReconcileMigrationsRequest) returns (ReconcileMigrationsResponse) {
    option (google.api.http) = {
      post: "/v1/tenants:reconcile-migrations"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Reconcile migrations for tenant schemas"
      description: "Applies new migrations to existing tenant schemas. Safe to call multiple times."
    };
  }
}
