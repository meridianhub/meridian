syntax = "proto3";

package meridian.position_keeping.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "meridian/common/v1/types.proto";
import "meridian/quantity/v1/quantity.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/meridianhub/meridian/api/proto/meridian/position_keeping/v1;positionkeepingv1";

// OpenAPI specification metadata for Position Keeping Service
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Meridian Position Keeping Service API"
    version: "1.0"
    description: "BIAN-compliant position keeping operations for tracking financial "
                 "positions, transaction logs, and audit trails."
    contact: {
      name: "Meridian API Team"
      url: "https://github.com/meridianhub/meridian"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "Bearer"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication"
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer"
      value: {}
    }
  }
};

// BalanceType defines the type of balance being queried or reported.
enum BalanceType {
  // BALANCE_TYPE_UNSPECIFIED means the balance type is unknown.
  BALANCE_TYPE_UNSPECIFIED = 0;
  // BALANCE_TYPE_OPENING is the balance at the start of the accounting period.
  BALANCE_TYPE_OPENING = 1;
  // BALANCE_TYPE_CLOSING is the balance at the end of the accounting period.
  BALANCE_TYPE_CLOSING = 2;
  // BALANCE_TYPE_CURRENT is the real-time balance including all posted transactions.
  BALANCE_TYPE_CURRENT = 3;
  // BALANCE_TYPE_AVAILABLE is the balance available for withdrawal or use.
  BALANCE_TYPE_AVAILABLE = 4;
  // BALANCE_TYPE_LEDGER is the balance on the books (may differ from current due to holds).
  BALANCE_TYPE_LEDGER = 5;
  // BALANCE_TYPE_RESERVE is the amount held in reserve (not available for use).
  BALANCE_TYPE_RESERVE = 6;
  // BALANCE_TYPE_FREE is the unencumbered balance (current minus holds and reserves).
  BALANCE_TYPE_FREE = 7;
}

// TransactionLogEntry represents a single entry in the financial position log.
message TransactionLogEntry {
  // entry_id is the unique identifier for this log entry.
  string entry_id = 1 [(buf.validate.field).string.uuid = true];

  // transaction_id is the identifier of the related transaction (UUID format).
  string transaction_id = 2 [(buf.validate.field).string.uuid = true];

  // account_id is the account involved in this transaction (alphanumeric with hyphens/underscores).
  string account_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[a-zA-Z0-9_-]+$"
  }];

  // amount is the monetary amount of this transaction.
  meridian.common.v1.MoneyAmount amount = 4 [(buf.validate.field).required = true];

  // direction indicates whether this is a debit or credit posting.
  meridian.common.v1.PostingDirection direction = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Disallow UNSPECIFIED */
  }];

  // timestamp is when this transaction occurred.
  google.protobuf.Timestamp timestamp = 6 [(buf.validate.field).required = true];

  // description provides additional context for this entry.
  string description = 7 [(buf.validate.field).string.max_len = 500];

  // reference is an external reference number (e.g., invoice number, payment reference).
  // Alphanumeric with hyphens, underscores, slashes for payment references.
  string reference = 8 [(buf.validate.field).string = {
    max_len: 255
    pattern: "^[a-zA-Z0-9_/-]*$"
  }];

  // attributes stores flexible metadata for the transaction (e.g., valuation_analysis for audit trails).
  // Optional field for storing JSON-serialized data like valuation method details, degraded mode flags, etc.
  map<string, string> attributes = 9;
}

// TransactionLineage captures the relationship between transactions.
message TransactionLineage {
  // transaction_id is the current transaction identifier (UUID format).
  string transaction_id = 1 [(buf.validate.field).string.uuid = true];

  // parent_transaction_id is the identifier of the parent transaction (optional, UUID format when present).
  string parent_transaction_id = 2 [(buf.validate.field).string.uuid = true];

  // child_transaction_ids are identifiers of any child transactions (UUID format).
  repeated string child_transaction_ids = 3 [(buf.validate.field).repeated.items.string.uuid = true];

  // related_transaction_ids are identifiers of related transactions (UUID format, e.g., reversals, adjustments).
  repeated string related_transaction_ids = 4 [(buf.validate.field).repeated.items.string.uuid = true];

  // transaction_type describes the type of transaction (e.g., "payment", "reversal", "adjustment").
  string transaction_type = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // created_at is when this lineage record was created.
  google.protobuf.Timestamp created_at = 6 [(buf.validate.field).required = true];
}

// AuditTrailEntry captures audit information for compliance.
message AuditTrailEntry {
  // audit_id is the unique identifier for this audit entry.
  string audit_id = 1 [(buf.validate.field).string.uuid = true];

  // timestamp is when this audit event occurred.
  google.protobuf.Timestamp timestamp = 2 [(buf.validate.field).required = true];

  // user_id is the identifier of the user who performed the action.
  string user_id = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // action describes what action was performed (e.g., "created", "updated", "approved").
  string action = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];

  // details provides additional context about the action.
  string details = 5 [(buf.validate.field).string.max_len = 1000];

  // ip_address is the IP address from which the action was performed (IPv4 or IPv6).
  string ip_address = 6 [(buf.validate.field).string = {
    max_len: 45 // IPv6 max: 45 chars
    ip: true
  }];

  // system_context provides additional system-level context (e.g., service name, version).
  map<string, string> system_context = 7 [(buf.validate.field).map.max_pairs = 50];
}

// StatusTracking captures the lifecycle status of the financial position log.
message StatusTracking {
  // current_status is the current status of the transaction.
  meridian.common.v1.TransactionStatus current_status = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Disallow UNSPECIFIED */
  }];

  // previous_status is the previous status before the current one.
  meridian.common.v1.TransactionStatus previous_status = 2;

  // status_updated_at is when the status was last updated.
  google.protobuf.Timestamp status_updated_at = 3 [(buf.validate.field).required = true];

  // status_reason provides context for status changes.
  string status_reason = 4 [(buf.validate.field).string.max_len = 500];

  // failure_reason provides details if the transaction failed.
  string failure_reason = 5 [(buf.validate.field).string.max_len = 1000];
}

// FinancialPositionLog represents a comprehensive log of financial position for an account or transaction set.
message FinancialPositionLog {
  // log_id is the unique identifier for this financial position log.
  string log_id = 1 [(buf.validate.field).string.uuid = true];

  // account_id is the account this log pertains to.
  string account_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // transaction_log_entries contains all transaction entries for this position.
  repeated TransactionLogEntry transaction_log_entries = 3 [(buf.validate.field).repeated.max_items = 10000];

  // transaction_lineage captures the relationship between transactions.
  TransactionLineage transaction_lineage = 4;

  // audit_trail contains the complete audit history.
  repeated AuditTrailEntry audit_trail = 5 [(buf.validate.field).repeated.max_items = 10000];

  // status_tracking contains the current and historical status information.
  StatusTracking status_tracking = 6 [(buf.validate.field).required = true];

  // created_at is when this log was created.
  google.protobuf.Timestamp created_at = 7 [(buf.validate.field).required = true];

  // updated_at is when this log was last updated.
  google.protobuf.Timestamp updated_at = 8 [(buf.validate.field).required = true];

  // version is used for optimistic concurrency control.
  int64 version = 9 [(buf.validate.field).int64.gte = 0];

  // account_service_domain identifies which BIAN Service Domain manages the account.
  // Resolved during account validation and persisted for downstream consumers (e.g., UI routing).
  meridian.common.v1.AccountServiceDomain account_service_domain = 10;
}

// InitiateFinancialPositionLogRequest initiates a new financial position log.
message InitiateFinancialPositionLogRequest {
  // account_id is the account for which to create the log.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];

  // initial_entry is the first transaction entry (optional).
  TransactionLogEntry initial_entry = 2;

  // transaction_lineage captures initial lineage information.
  TransactionLineage transaction_lineage = 3;

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 4;
}

// InitiateFinancialPositionLogResponse returns the created log.
message InitiateFinancialPositionLogResponse {
  // log is the created financial position log (always present on success).
  FinancialPositionLog log = 1 [(buf.validate.field).required = true];
}

// BatchInitiateRequest represents a single log creation request in a batch.
message BatchInitiateRequest {
  // account_id is the account for which to create the log.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];

  // initial_entry is the first transaction entry (optional).
  TransactionLogEntry initial_entry = 2;

  // transaction_lineage captures initial lineage information.
  TransactionLineage transaction_lineage = 3;
}

// InitiateFinancialPositionLogBatchRequest creates multiple logs atomically.
message InitiateFinancialPositionLogBatchRequest {
  // requests are the individual log creation requests (1-10,000 items).
  repeated BatchInitiateRequest requests = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 10000
  }];

  // idempotency_key ensures exactly-once processing for the entire batch.
  meridian.common.v1.IdempotencyKey idempotency_key = 2;

  // batch_id is an optional client-provided batch identifier for tracking.
  string batch_id = 3 [(buf.validate.field).string.uuid = true];
}

// BatchInitiateResult contains the result for a single log creation in a batch.
message BatchInitiateResult {
  // success indicates whether this individual log was created successfully.
  bool success = 1;

  // log is the created log (present only if success is true).
  FinancialPositionLog log = 2;

  // error_message provides details if success is false.
  string error_message = 3;

  // account_id is the account ID from the request for easy correlation.
  string account_id = 4;
}

// InitiateFinancialPositionLogBatchResponse returns results for all log creations.
message InitiateFinancialPositionLogBatchResponse {
  // results contains the outcome for each log creation request (same order as input).
  repeated BatchInitiateResult results = 1 [(buf.validate.field).repeated.min_items = 1];

  // batch_id is the batch identifier (client-provided or server-generated).
  string batch_id = 2 [(buf.validate.field).string.uuid = true];

  // total_count is the total number of requests in the batch.
  int32 total_count = 3;

  // success_count is the number of logs successfully created.
  int32 success_count = 4;

  // failure_count is the number of logs that failed to create.
  int32 failure_count = 5;
}

// InitiateWithOpeningBalanceRequest initiates a new financial position log with an opening balance.
// This is used for migrating existing accounts from legacy systems where the full transaction
// history is not available. The opening balance represents the account's balance at the
// effective date.
message InitiateWithOpeningBalanceRequest {
  // account_id is the account for which to create the log with opening balance.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
      pattern: "^[a-zA-Z0-9_-]+$"
    }
  ];

  // opening_balance is the initial balance amount. May be negative for overdrawn accounts.
  meridian.common.v1.MoneyAmount opening_balance = 2 [(buf.validate.field).required = true];

  // effective_date is when the opening balance becomes effective (cannot be in the future).
  google.protobuf.Timestamp effective_date = 3 [(buf.validate.field).required = true];

  // migration_reference is an optional reference identifying the migration source or batch.
  string migration_reference = 4 [(buf.validate.field).string = {max_len: 255}];

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 5;

  // instrument_code is the instrument code for CEL validation (optional).
  // When provided, the opening balance attributes are validated against the instrument's
  // validation expression (e.g., "USD", "EUR_ELECTRICITY_KWH").
  // If empty, validation is skipped for backwards compatibility with legacy migrations.
  string instrument_code = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {
      max_len: 32
      pattern: "^[A-Z][A-Z0-9_]*$"
    }
  ];

  // attributes are optional key-value pairs for CEL validation (e.g., batch_id, grade, vintage).
  // These are validated against the instrument's validation expression when instrument_code is set.
  map<string, string> attributes = 7 [(buf.validate.field).map.max_pairs = 50];
}

// InitiateWithOpeningBalanceResponse returns the created log with opening balance.
message InitiateWithOpeningBalanceResponse {
  // log is the created financial position log (always present on success).
  FinancialPositionLog log = 1 [(buf.validate.field).required = true];
}

// UpdateFinancialPositionLogRequest updates an existing financial position log.
message UpdateFinancialPositionLogRequest {
  // log_id is the identifier of the log to update.
  string log_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // new_entry is a new transaction entry to add (optional).
  TransactionLogEntry new_entry = 2;

  // status_update is a status change to apply (optional).
  StatusTracking status_update = 3;

  // audit_entry is an audit trail entry to add.
  AuditTrailEntry audit_entry = 4;

  // version is used for optimistic concurrency control.
  int64 version = 5 [(buf.validate.field).int64.gte = 0];

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 6;
}

// UpdateFinancialPositionLogResponse returns the updated log.
message UpdateFinancialPositionLogResponse {
  // log is the updated financial position log (always present on success).
  FinancialPositionLog log = 1 [(buf.validate.field).required = true];
}

// RetrieveFinancialPositionLogRequest retrieves a financial position log.
message RetrieveFinancialPositionLogRequest {
  // log_id is the identifier of the log to retrieve.
  string log_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

// RetrieveFinancialPositionLogResponse returns the requested log.
message RetrieveFinancialPositionLogResponse {
  // log is the requested financial position log (always present on success).
  FinancialPositionLog log = 1 [(buf.validate.field).required = true];
}

// BulkImportTransactionsRequest imports multiple transactions at once.
message BulkImportTransactionsRequest {
  // log_id is the identifier of the log to import transactions into.
  string log_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // entries are the transaction entries to import.
  repeated TransactionLogEntry entries = 2 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 1000 // Limit bulk imports
  }];

  // audit_entry is an audit trail entry for this bulk import (required for compliance).
  AuditTrailEntry audit_entry = 3 [(buf.validate.field).required = true];

  // version is used for optimistic concurrency control.
  int64 version = 4 [(buf.validate.field).int64.gte = 0];
}

// BulkImportTransactionsResponse returns the result of the bulk import.
message BulkImportTransactionsResponse {
  // log is the updated financial position log after import (always present on success).
  FinancialPositionLog log = 1 [(buf.validate.field).required = true];

  // imported_count is the number of transactions successfully imported.
  int32 imported_count = 2;

  // failed_count is the number of transactions that failed to import.
  int32 failed_count = 3;

  // failure_details provides details about any failures.
  repeated string failure_details = 4;
}

// ListFinancialPositionLogsRequest lists financial position logs with filtering.
message ListFinancialPositionLogsRequest {
  // account_id filters logs by account (optional).
  string account_id = 1 [(buf.validate.field).string.max_len = 255];

  // status filters logs by current status (optional).
  meridian.common.v1.TransactionStatus status = 2;

  // date_range filters logs by creation date (optional).
  meridian.common.v1.DateRange date_range = 3;

  // pagination controls the page size and offset.
  meridian.common.v1.Pagination pagination = 4;
}

// ListFinancialPositionLogsResponse returns a list of logs.
message ListFinancialPositionLogsResponse {
  // logs are the matching financial position logs.
  repeated FinancialPositionLog logs = 1;

  // pagination provides pagination metadata.
  meridian.common.v1.PaginationResponse pagination = 2;
}

// RecordMeasurementRequest records a physical measurement against a position state.
// Used for multi-asset tracking (energy, compute, carbon credits, etc.).
message RecordMeasurementRequest {
  // measurement_type identifies what is being measured (e.g., "kWh", "GPU-Hours", "Carbon-Credits").
  string measurement_type = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 100
      pattern: "^[a-zA-Z0-9_-]+$"
    }
  ];

  // value is the measurement value as a decimal string for precision preservation.
  // Format: optional sign, digits, optional decimal point and fractional digits (e.g., "123.456", "-789.012").
  string value = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 50
      pattern: "^-?\\d+(\\.\\d+)?$"
    }
  ];

  // unit is the unit of measurement (e.g., "kWh", "hours", "tonnes").
  string unit = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 50
      pattern: "^[a-zA-Z0-9_/-]+$"
    }
  ];

  // timestamp is when the measurement occurred.
  google.protobuf.Timestamp timestamp = 4 [(buf.validate.field).required = true];

  // metadata contains optional key-value pairs for additional context.
  map<string, string> metadata = 5 [(buf.validate.field).map.max_pairs = 50];

  // position_state_id is the target position state to record the measurement against.
  string position_state_id = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // idempotency_key ensures exactly-once processing.
  meridian.common.v1.IdempotencyKey idempotency_key = 7;
}

// RecordMeasurementResponse returns the result of recording a measurement.
message RecordMeasurementResponse {
  // measurement_id is the unique identifier for this measurement (for idempotency and reference).
  string measurement_id = 1 [(buf.validate.field).string.uuid = true];

  // position_state_id is the position state that was updated.
  string position_state_id = 2 [(buf.validate.field).string.uuid = true];

  // recorded_at is the server-side timestamp when the measurement was recorded.
  google.protobuf.Timestamp recorded_at = 3 [(buf.validate.field).required = true];
}

// GetAccountBalanceRequest retrieves a specific balance type for an account.
message GetAccountBalanceRequest {
  // account_id is the account to retrieve the balance for.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
      pattern: "^[a-zA-Z0-9_-]+$"
    }
  ];

  // balance_type is the type of balance to retrieve.
  BalanceType balance_type = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0] /* Disallow UNSPECIFIED */
  }];

  // instrument_code filters the balance by instrument (optional).
  // Supports ISO 4217 currency codes (USD, GBP) and extended asset codes (KWH, GPU_HOUR, CARBON_TONNE).
  string instrument_code = 3 [(buf.validate.field).string = {
    max_len: 32
    pattern: "^[A-Z][A-Z0-9_]*$"
  }];
}

// GetAccountBalanceResponse returns the requested balance.
message GetAccountBalanceResponse {
  // account_id is the account the balance pertains to.
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // balance_type is the type of balance returned.
  BalanceType balance_type = 2 [(buf.validate.field).enum.defined_only = true];

  // amount is the balance amount expressed as an InstrumentAmount.
  // Supports both currency amounts (USD, GBP) and multi-asset amounts (KWH, GPU_HOUR).
  meridian.quantity.v1.InstrumentAmount amount = 3 [(buf.validate.field).required = true];

  // as_of is the timestamp representing when this balance was calculated.
  google.protobuf.Timestamp as_of = 4 [(buf.validate.field).required = true];
}

// GetAccountBalancesRequest retrieves all balance types for an account.
message GetAccountBalancesRequest {
  // account_id is the account to retrieve balances for.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
      pattern: "^[a-zA-Z0-9_-]+$"
    }
  ];

  // instrument_code filters balances by instrument (optional).
  // Supports ISO 4217 currency codes (USD, GBP) and extended asset codes (KWH, GPU_HOUR, CARBON_TONNE).
  string instrument_code = 2 [(buf.validate.field).string = {
    max_len: 32
    pattern: "^[A-Z][A-Z0-9_]*$"
  }];
}

// BalanceEntry represents a single balance type and its amount.
message BalanceEntry {
  // balance_type is the type of this balance.
  BalanceType balance_type = 1 [(buf.validate.field).enum.defined_only = true];

  // amount is the balance amount expressed as an InstrumentAmount.
  // Supports both currency amounts (USD, GBP) and multi-asset amounts (KWH, GPU_HOUR).
  meridian.quantity.v1.InstrumentAmount amount = 2 [(buf.validate.field).required = true];
}

// GetAccountBalancesResponse returns all balances for an account.
message GetAccountBalancesResponse {
  // account_id is the account the balances pertain to.
  string account_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];

  // balances contains all available balance types for this account.
  repeated BalanceEntry balances = 2 [(buf.validate.field).repeated.max_items = 100];

  // as_of is the timestamp representing when these balances were calculated.
  google.protobuf.Timestamp as_of = 3 [(buf.validate.field).required = true];
}

// PositionKeepingService provides operations for managing financial position logs.
service PositionKeepingService {
  // InitiateFinancialPositionLog creates a new financial position log.
  rpc InitiateFinancialPositionLog(InitiateFinancialPositionLogRequest) returns (InitiateFinancialPositionLogResponse) {
    option (google.api.http) = {
      post: "/v1/position-logs"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Financial position log created successfully"
        }
      }
    };
  }

  // InitiateFinancialPositionLogBatch creates multiple logs atomically in a single transaction.
  rpc InitiateFinancialPositionLogBatch(InitiateFinancialPositionLogBatchRequest) returns (InitiateFinancialPositionLogBatchResponse) {
    option (google.api.http) = {
      post: "/v1/position-logs/batch"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Financial position logs created successfully"
        }
      }
    };
  }

  // InitiateWithOpeningBalance creates a new financial position log with an opening balance.
  // This RPC is used for migrating existing accounts from legacy systems where the full
  // transaction history is not available. The opening balance is immediately posted.
  rpc InitiateWithOpeningBalance(InitiateWithOpeningBalanceRequest) returns (InitiateWithOpeningBalanceResponse) {
    option (google.api.http) = {
      post: "/v1/position-logs/migrate"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Financial position log with opening balance created successfully"
        }
      }
    };
  }

  // UpdateFinancialPositionLog updates an existing financial position log.
  rpc UpdateFinancialPositionLog(UpdateFinancialPositionLogRequest) returns (UpdateFinancialPositionLogResponse) {
    option (google.api.http) = {
      put: "/v1/position-logs/{log_id}"
      body: "*"
    };
  }

  // RetrieveFinancialPositionLog retrieves a specific financial position log.
  rpc RetrieveFinancialPositionLog(RetrieveFinancialPositionLogRequest) returns (RetrieveFinancialPositionLogResponse) {
    option (google.api.http) = {
      get: "/v1/position-logs/{log_id}"
    };
  }

  // BulkImportTransactions imports multiple transactions into a log at once.
  rpc BulkImportTransactions(BulkImportTransactionsRequest) returns (BulkImportTransactionsResponse) {
    option (google.api.http) = {
      post: "/v1/position-logs/{log_id}/transactions/bulk"
      body: "*"
    };
  }

  // ListFinancialPositionLogs lists financial position logs with filtering.
  rpc ListFinancialPositionLogs(ListFinancialPositionLogsRequest) returns (ListFinancialPositionLogsResponse) {
    option (google.api.http) = {
      get: "/v1/position-logs"
    };
  }

  // RecordMeasurement records a physical measurement against a position state.
  // Used for multi-asset tracking (energy, compute, carbon credits, etc.).
  rpc RecordMeasurement(RecordMeasurementRequest) returns (RecordMeasurementResponse) {
    option (google.api.http) = {
      post: "/v1/position-states/{position_state_id}/measurements"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Measurement recorded successfully"
        }
      }
    };
  }

  // GetAccountBalance retrieves a specific balance type for an account.
  rpc GetAccountBalance(GetAccountBalanceRequest) returns (GetAccountBalanceResponse) {
    option (google.api.http) = {
      get: "/v1/accounts/{account_id}/balance/{balance_type}"
    };
  }

  // GetAccountBalances retrieves all balance types for an account.
  rpc GetAccountBalances(GetAccountBalancesRequest) returns (GetAccountBalancesResponse) {
    option (google.api.http) = {
      get: "/v1/accounts/{account_id}/balances"
    };
  }

  // UpdatePosition is UNIMPLEMENTED - positions use append-only semantics.
  // Position updates are forbidden to ensure O(1) write performance and audit trail integrity.
  // To modify a position, create a new position record with the adjustment amount.
  // Returns: UNIMPLEMENTED status code.
  rpc UpdatePosition(UpdatePositionRequest) returns (UpdatePositionResponse) {
    option (google.api.http) = {
      put: "/v1/positions/{position_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      deprecated: true
      responses: {
        key: "501"
        value: {
          description: "Position updates are not implemented - append-only mode enforced"
        }
      }
    };
  }

  // MergePositions is UNIMPLEMENTED - positions use append-only semantics.
  // Position merging is forbidden at write time to ensure O(1) write performance.
  // Position consolidation is deferred to read-time aggregation or background compaction.
  // Returns: UNIMPLEMENTED status code.
  rpc MergePositions(MergePositionsRequest) returns (MergePositionsResponse) {
    option (google.api.http) = {
      post: "/v1/positions/merge"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      deprecated: true
      responses: {
        key: "501"
        value: {
          description: "Position merging is not implemented - append-only mode enforced"
        }
      }
    };
  }

  // RecordReservation creates a reservation linked to a lien for projected balance calculations.
  // Idempotent by lien_id - duplicate calls return the existing reservation.
  rpc RecordReservation(RecordReservationRequest) returns (RecordReservationResponse) {
    option (google.api.http) = {
      post: "/v1/reservations"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "201"
        value: {
          description: "Reservation recorded successfully"
        }
      }
    };
  }

  // ReleaseReservation transitions a reservation to EXECUTED or TERMINATED.
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse) {
    option (google.api.http) = {
      post: "/v1/reservations/{lien_id}/release"
      body: "*"
    };
  }

  // GetProjectedBalance calculates the projected balance accounting for active reservations.
  rpc GetProjectedBalance(GetProjectedBalanceRequest) returns (GetProjectedBalanceResponse) {
    option (google.api.http) = {
      get: "/v1/accounts/{account_id}/projected-balance/{instrument_code}"
    };
  }
}

