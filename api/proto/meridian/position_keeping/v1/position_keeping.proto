  // new_amount is the updated position amount.
  string new_amount = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^-?\\d+(\\.\\d+)?$"
  }];
}

// UpdatePositionResponse is reserved for future use.
