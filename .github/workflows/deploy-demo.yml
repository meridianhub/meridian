name: Deploy Demo

# Required secrets:
#   DEPLOY_SSH_KEY  - Private SSH key (Ed25519 or RSA 4096+) for the root user on the Droplet
#   DROPLET_IP      - IP address of the DigitalOcean Droplet (e.g. 143.198.xxx.xxx)

on:
  push:
    branches: [demo]
  workflow_dispatch:

concurrency:
  group: deploy-demo
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf files
        run: buf generate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=demo
            type=sha,prefix=demo-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cmd/meridian/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate protobuf TypeScript clients
        working-directory: frontend
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          buf generate --template buf.gen.yaml ../api/proto

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://demo.meridianhub.cloud
          VITE_DEMO_MODE: "true"
          VITE_BUILD_VERSION: ${{ github.ref_name }}
          VITE_BUILD_COMMIT: ${{ github.sha }}
        run: npx vite build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to Demo Droplet
    needs: [build-and-push, build-frontend]
    runs-on: ubuntu-latest
    environment:
      name: demo
      url: https://demo.meridianhub.cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download frontend artifact
        uses: actions/download-artifact@v6
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Deploy frontend via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "frontend-dist/*"
          target: /opt/meridian/frontend/
          strip_components: 1
          overwrite: true

      - name: Deploy config files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/demo/Caddyfile,deploy/demo/docker-compose.yml,deploy/demo/dex.yaml,deploy/demo/init-databases.sql"
          target: /opt/meridian/
          strip_components: 2
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/meridian
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile
            docker image prune -f

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            max_attempts=30
            attempt=0
            until [ $attempt -ge $max_attempts ]; do
              attempt=$((attempt+1))
              echo "Health check attempt $attempt/$max_attempts"
              if curl -sf http://localhost:80/healthz -H 'Host: demo.meridianhub.cloud' > /dev/null 2>&1; then
                echo "Service is healthy"
                exit 0
              fi
              sleep 5
            done
            echo "Health check failed after $max_attempts attempts"
            cd /opt/meridian && docker compose logs --tail=50
            exit 1
