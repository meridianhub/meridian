name: Deploy Demo

# Required secrets:
#   DEPLOY_SSH_KEY  - Private SSH key (Ed25519 or RSA 4096+) for the deploy user on the Droplet
#   DROPLET_IP      - IP address of the DigitalOcean Droplet (e.g. 143.198.xxx.xxx)
#
# The deploy user is created by deploy/demo/provision.sh with docker group membership
# and ownership of /opt/meridian/. Run provision.sh once as root to set up the server.

on:
  push:
    branches: [demo]
  workflow_dispatch:

concurrency:
  group: deploy-demo
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for cosign keyless signing via OIDC
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf files
        run: buf generate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=demo
            type=sha,prefix=demo-,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cmd/meridian/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate protobuf TypeScript clients
        working-directory: frontend
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          buf generate --template buf.gen.yaml ../api/proto

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://demo.meridianhub.cloud
          VITE_BASE_DOMAIN: demo.meridianhub.cloud
          VITE_BUILD_VERSION: ${{ github.ref_name }}
          VITE_BUILD_COMMIT: ${{ github.sha }}
        run: npx vite build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to Demo Droplet
    needs: [build-and-push, build-frontend]
    runs-on: ubuntu-latest
    environment:
      name: demo
      url: https://demo.meridianhub.cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify container image signature
        run: |
          cosign verify \
            --certificate-identity="https://github.com/${{ github.repository }}/.github/workflows/deploy-demo.yml@refs/heads/demo" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ghcr.io/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Deploy frontend via SCP
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "frontend-dist/*"
          target: /opt/meridian/frontend/
          strip_components: 1
          overwrite: true

      - name: Deploy config files via SCP
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/demo/Caddyfile,deploy/demo/docker-compose.yml,deploy/demo/dex.yaml,deploy/demo/init-databases.sql"
          target: /opt/meridian/
          strip_components: 2
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image-digest }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_DIGEST
          script: |
            cd /opt/meridian
            # Pull the exact verified digest to prevent TOCTOU between verify and deploy
            docker pull ghcr.io/meridianhub/meridian@${IMAGE_DIGEST}
            docker tag ghcr.io/meridianhub/meridian@${IMAGE_DIGEST} ghcr.io/meridianhub/meridian:demo
            docker compose up -d --remove-orphans
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile
            docker image prune -f

      - name: Ensure databases exist
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Docker init scripts only run on first volume creation. When new
            # databases are added to init-databases.sql, existing volumes
            # won't have them. Create any missing databases so the app can start.
            cd /opt/meridian
            created=0
            for db in $(grep -oP 'CREATE DATABASE \K\w+' init-databases.sql); do
              exists=$(docker exec meridian-postgres-1 psql -U meridian -tAc \
                "SELECT 1 FROM pg_database WHERE datname = '${db}'")
              if [ "$exists" != "1" ]; then
                docker exec meridian-postgres-1 createdb -U meridian "${db}"
                echo "Created missing database: ${db}"
                created=1
              fi
            done
            if [ "$created" = "1" ]; then
              echo "New databases created - restarting app to pick up connections"
              docker compose restart meridian
            fi
            # Wait for the container to be running (not restarting) before migrations.
            # The app image is distroless - no shell utilities - so use docker inspect.
            for i in $(seq 1 30); do
              status=$(docker inspect --format='{{.State.Status}}' meridian-meridian-1 2>/dev/null || echo "missing")
              if [ "$status" = "running" ]; then
                echo "Container is running"
                exit 0
              fi
              echo "Waiting for container (status: $status)... ($i/30)"
              sleep 2
            done
            echo "Container failed to start after 60s"
            exit 1

      - name: Run migrations
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker exec meridian-meridian-1 /meridian --migrate

      - name: Bootstrap master tenant
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker exec meridian-meridian-1 /meridian --bootstrap

      - name: Seed demo data
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker exec meridian-meridian-1 /seed-dev \
              --gateway-url=http://localhost:8090 \
              --grpc-addr=localhost:50051 \
              --tenant-id=volterra_energy \
              --tenant-slug=volterra \
              --display-name='Volterra Energy' \
              --subdomain=volterra.demo.meridianhub.cloud \
              --manifest=/app/examples/manifests/energy.json \
              --with-fixtures

      - name: Verify deployment health
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            max_attempts=30
            attempt=0
            until [ $attempt -ge $max_attempts ]; do
              attempt=$((attempt+1))
              echo "Health check attempt $attempt/$max_attempts"
              if curl -sf http://localhost:80/healthz -H 'Host: demo.meridianhub.cloud' > /dev/null 2>&1; then
                echo "Service is healthy"
                exit 0
              fi
              sleep 5
            done
            echo "Health check failed after $max_attempts attempts"
            cd /opt/meridian && docker compose logs --tail=50
            exit 1
