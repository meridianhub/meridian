name: Claude Code Review

on:
  workflow_run:
    workflows: ["Test", "Build", "Quality"]
    types: [completed]

# Prevent concurrent Claude Code installations which cause lock conflicts
# Only one Claude review can run at a time per repo
concurrency:
  group: claude-code-review-${{ github.repository }}
  cancel-in-progress: false

jobs:
  claude-review:
    # Only run when ALL conditions are met:
    # 1. The triggering workflow succeeded
    # 2. It was triggered by a pull request (not push to develop/main)
    # 3. Not a Dependabot PR (they're automated dependency updates)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login != 'dependabot[bot]'

    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });

            // Get PR number from the workflow run
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open'
            });

            if (pulls.data.length === 0) {
              console.log('No open PR found for this branch');
              return;
            }

            const prNumber = pulls.data[0].number;
            console.log(`Found PR #${prNumber}`);
            core.setOutput('number', prNumber);

      # SECURITY: Checkout the default branch, NOT the PR's head_sha
      # This prevents malicious PRs from executing untrusted code in a privileged workflow_run context
      # Claude Code can still review the PR diff via gh CLI commands
      - name: Checkout repository (default branch)
        if: steps.pr.outputs.number
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Get current date
        if: steps.pr.outputs.number
        id: date
        run: echo "current_date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        if: steps.pr.outputs.number
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}

            IMPORTANT CONTEXT:
            - Today's date is ${{ steps.date.outputs.current_date }}
            - Go version: This project uses Go 1.25+ which is the current stable release
            - Do not flag Go version references (like "Go 1.25") as errors or future versions
            - CI has already passed (tests, build, linting) - focus on code quality

            Review this pull request. Structure your feedback as:

            ## Must Fix
            Issues that should be addressed before merge (bugs, security issues, correctness problems).

            ## Should Fix
            Improvements worth making in this PR (race conditions, error handling, edge cases, performance).
            If you mention it here, it's worth implementing - not a footnote.

            ## Future Work
            Larger refactors or enhancements that belong in a separate PR.

            REVIEW STANDARDS:
            - Be direct. "Consider using X" → "Use X because Y"
            - No "low priority" labels. Either it's worth fixing or don't mention it.
            - Race conditions, concurrency issues, edge cases = Should Fix, not optional
            - If a section is empty, omit it. Don't pad with low-value suggestions.
            - Assume the author will implement your suggestions. Be worth implementing.

            VERIFY BEFORE FLAGGING:
            - Before claiming a race condition, trace the actual code flow - is the lock really missing?
            - Before claiming an issue, check if the code already handles it
            - One accurate finding beats six repeated incorrect ones
            - If you're uncertain, say "verify this:" rather than stating it as fact

            PROJECT CONTEXT (read what's helpful):
            - CONTRIBUTING.md - development guidelines and conventions
            - docs/adr/ - Architecture Decision Records for design context
            - docs/prd/ - Product Requirements for feature context
            - docs/skills/ - available automation skills
            - Service-specific README.md files for local conventions

            LEAVE INLINE COMMENTS on specific lines where possible. Use this format for each inline comment:

            ```
            **Issue**: Brief description of the problem

            **Suggestion**: What to do instead

            <details>
            <summary>🤖 AI Instructions</summary>

            Category: must-fix | should-fix | future-work
            File: path/to/file.go
            Line: 42
            Action: Replace X with Y / Add error handling / etc.

            </details>
            ```

            To submit inline comments, use `gh api` to create a review:
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/reviews \
              --method POST \
              -f event="COMMENT" \
              -f 'comments=[{"path":"path/to/file.go","line":42,"body":"Your comment with AI instructions"}]'
            ```

            For general summary, use `gh pr comment ${{ steps.pr.outputs.number }}`.

          # Using Opus 4.5 for higher quality code reviews
          claude_args: '--model claude-opus-4-5-20251101 --allowed-tools "Bash(gh api:*),Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

      - name: Report Final Status
        if: always() && steps.pr.outputs.number
        run: |
          echo "## Claude Code Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ steps.pr.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.claude-review.outcome }}" == "success" ]; then
            echo "### Result: Success" >> $GITHUB_STEP_SUMMARY
            echo "Claude Code review completed successfully." >> $GITHUB_STEP_SUMMARY
            echo "::notice::Claude Code review completed successfully for PR #${{ steps.pr.outputs.number }}"
          elif [ "${{ steps.claude-review.outcome }}" == "failure" ]; then
            echo "### Result: Failed" >> $GITHUB_STEP_SUMMARY
            echo "Claude Code review failed - this is non-blocking." >> $GITHUB_STEP_SUMMARY
            echo "::warning::Claude Code review failed for PR #${{ steps.pr.outputs.number }} - this is non-blocking"
          elif [ "${{ steps.claude-review.outcome }}" == "cancelled" ]; then
            echo "### Result: Cancelled" >> $GITHUB_STEP_SUMMARY
            echo "Claude Code review was cancelled." >> $GITHUB_STEP_SUMMARY
            echo "::warning::Claude Code review was cancelled for PR #${{ steps.pr.outputs.number }}"
          elif [ "${{ steps.claude-review.outcome }}" == "skipped" ]; then
            echo "### Result: Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Claude Code review was skipped." >> $GITHUB_STEP_SUMMARY
          fi
          exit 0
