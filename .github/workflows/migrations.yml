name: Database Migrations

on:
  push:
    branches: [develop, main]
    paths:
      - 'services/*/migrations/**'
      - 'services/*/atlas/**'
      - 'shared/atlas/**'
      - 'utilities/atlas-loader/**'
      - 'shared/domain/models/**'
      - 'scripts/migrate-all-orgs.sh'
  pull_request:
    branches: [develop, main]
    paths:
      - 'services/*/migrations/**'
      - 'services/*/atlas/**'
      - 'shared/atlas/**'
      - 'utilities/atlas-loader/**'
      - 'shared/domain/models/**'
      - 'scripts/migrate-all-orgs.sh'

permissions:
  contents: read

jobs:
  verify-migrations:
    name: Verify Migration Checksums
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Atlas CLI
        run: |
          curl -sSf https://atlasgo.sh | sh -s -- --yes
          atlas version
        timeout-minutes: 5

      - name: Verify migration checksums
        run: |
          echo "Verifying migration checksums..."
          atlas migrate hash --env ci --config file://services/current-account/atlas/atlas.hcl
          atlas migrate hash --env ci --config file://services/position-keeping/atlas/atlas.hcl
          atlas migrate hash --env ci --config file://services/financial-accounting/atlas/atlas.hcl
          atlas migrate hash --env ci --config file://services/payment-order/atlas/atlas.hcl
          atlas migrate hash --env ci --config file://services/party/atlas/atlas.hcl
          echo "✓ All migration checksums verified"

  test-multi-org-migrations:
    name: Test Multi-Organization Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meridian_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Atlas CLI
        run: |
          curl -sSf https://atlasgo.sh | sh -s -- --yes
          atlas version
        timeout-minutes: 5

      - name: Create test organization schemas
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/meridian_test?sslmode=disable
        run: |
          echo "Creating test organization schemas..."
          # Create schemas directly for CI testing (no Organization Service needed)
          psql "$DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS org_acme_bank;"
          psql "$DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS org_test_org;"
          echo "✓ Test organization schemas created"

      - name: Apply migrations to test organizations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/meridian_test?sslmode=disable
        run: |
          echo "Applying migrations to test organizations..."
          FAILED=0
          for ORG in acme_bank test_org; do
            ORG_SCHEMA="org_${ORG}"
            echo "Migrating $ORG_SCHEMA..."
            # Exclude current-account due to pending checksum fix on develop
            for CONFIG in services/financial-accounting/atlas/atlas.hcl services/party/atlas/atlas.hcl services/payment-order/atlas/atlas.hcl services/position-keeping/atlas/atlas.hcl; do
              SERVICE=$(basename $(dirname $(dirname "$CONFIG")))
              echo "  Service: $SERVICE"
              # --allow-dirty allows multiple services to share the same org schema
              # Each service creates its own tables with unqualified names, so
              # other services' tables may exist in the schema
              if ! atlas migrate apply \
                --env ci \
                --config "file://$CONFIG" \
                --url "${DATABASE_URL}&search_path=${ORG_SCHEMA}" \
                --tx-mode none \
                --allow-dirty; then
                echo "    ✗ Migration failed for $SERVICE in $ORG_SCHEMA"
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Some migrations failed"
            exit 1
          fi
          echo "✓ Migrations applied successfully"

      - name: Verify organization isolation
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/meridian_test?sslmode=disable
        run: |
          echo "Verifying migration tracking..."
          # Services with schema-qualified migrations use dedicated _revisions schemas
          # Services with unqualified migrations (like party) track revisions in target schema

          # Check that services with dedicated revisions schemas have them
          REVISION_SCHEMAS=$(psql "$DATABASE_URL" -t -c "
            SELECT COUNT(DISTINCT table_schema) FROM information_schema.tables
            WHERE table_schema LIKE '%_revisions' AND table_name = 'atlas_schema_revisions';
          " | xargs)

          if [ "$REVISION_SCHEMAS" -lt 1 ]; then
            echo "❌ No dedicated revision tracking schemas found!"
            exit 1
          fi
          echo "  ✓ Found $REVISION_SCHEMAS service revision tracking schemas"

          # Check that org schemas have Atlas revision tracking (for services with unqualified names)
          for ORG in acme_bank test_org; do
            ORG_SCHEMA="org_${ORG}"
            echo "Checking revision tracking in: $ORG_SCHEMA"
            REVISIONS=$(psql "$DATABASE_URL" -t -c "
              SELECT COUNT(*) FROM information_schema.tables
              WHERE table_schema = '$ORG_SCHEMA' AND table_name = 'atlas_schema_revisions';
            " | xargs)
            if [ "$REVISIONS" -lt 1 ]; then
              echo "  ⚠ No atlas_schema_revisions in $ORG_SCHEMA (expected for unqualified migrations)"
            else
              echo "  ✓ atlas_schema_revisions present in $ORG_SCHEMA"
            fi
          done

          # Verify org schemas have tables from services with unqualified migrations
          # Services like party use unqualified table names (search_path routing)
          echo ""
          echo "Verifying organization schemas have tables..."
          for ORG in acme_bank test_org; do
            ORG_SCHEMA="org_${ORG}"
            TABLE_COUNT=$(psql "$DATABASE_URL" -t -c "
              SELECT COUNT(*) FROM information_schema.tables
              WHERE table_schema = '$ORG_SCHEMA';
            " | xargs)
            if [ "$TABLE_COUNT" -lt 1 ]; then
              echo "❌ Organization schema $ORG_SCHEMA has no tables!"
              exit 1
            fi
            echo "  ✓ $ORG_SCHEMA has $TABLE_COUNT tables"
          done

          # Verify services with schema-qualified migrations still have their schemas
          # These services haven't migrated to unqualified names yet
          echo ""
          echo "Verifying service schemas (schema-qualified migrations)..."
          for SCHEMA in financial_accounting payment_order position_keeping; do
            TABLE_COUNT=$(psql "$DATABASE_URL" -t -c "
              SELECT COUNT(*) FROM information_schema.tables
              WHERE table_schema = '$SCHEMA';
            " | xargs)
            if [ "$TABLE_COUNT" -lt 1 ]; then
              echo "❌ Schema $SCHEMA has no tables!"
              exit 1
            fi
            echo "  ✓ $SCHEMA has $TABLE_COUNT tables"
          done

          echo ""
          echo "✓ Multi-organization migration infrastructure verified"
