name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out | tail -n 1
          echo "Coverage report: coverage.out"

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m

  migrations:
    name: Migration Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Atlas CLI
        run: |
          curl -sSf https://atlasgo.sh | sh -s -- --yes
          atlas version

      - name: Lint shared migrations
        run: |
          echo "Linting shared migrations..."
          atlas migrate lint \
            --env ci \
            --config file://atlas.shared.hcl \
            --latest 1 \
            --log '{{ json . }}'

      - name: Lint current_account migrations
        run: |
          echo "Linting current_account migrations..."
          atlas migrate lint \
            --env ci \
            --config file://atlas.current_account.hcl \
            --latest 1 \
            --log '{{ json . }}'

      - name: Lint position_keeping migrations
        run: |
          echo "Linting position_keeping migrations..."
          atlas migrate lint \
            --env ci \
            --config file://atlas.position_keeping.hcl \
            --latest 1 \
            --log '{{ json . }}'

      - name: Verify migration checksums
        run: |
          echo "Verifying migration checksums..."
          atlas migrate hash --env ci --config file://atlas.shared.hcl
          atlas migrate hash --env ci --config file://atlas.current_account.hcl
          atlas migrate hash --env ci --config file://atlas.position_keeping.hcl
          echo "✓ All migration checksums verified"

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build services
        run: |
          make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
