name: Benchmarks

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'shared/domain/models/**'
      - 'shared/platform/audit/**'
      - 'services/internal-account/**'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf files
        run: buf generate

      - name: Download dependencies
        run: go mod download

      - name: Run audit outbox benchmarks
        run: |
          echo "## Audit Outbox Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ADR-0009 target: <5ms per operation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -bench=BenchmarkAuditOutboxOverhead -benchmem -benchtime=5s -count=3 \
            ./shared/domain/models/ 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run audit worker benchmarks
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Audit Worker Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ADR-0009 target: >1000 records/sec" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -bench=BenchmarkAuditWorker -benchmem -benchtime=3s -count=3 \
            ./shared/platform/audit/ 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Internal Account benchmarks
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Internal Account Service Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**NFR Targets:**" >> $GITHUB_STEP_SUMMARY
          echo "- Balance queries: P99 < 50ms" >> $GITHUB_STEP_SUMMARY
          echo "- Account creation: P99 < 50ms" >> $GITHUB_STEP_SUMMARY
          echo "- Account lookups: P99 < 5ms" >> $GITHUB_STEP_SUMMARY
          echo "- Concurrent operations: 1000 simultaneous" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -bench=. -benchmem -benchtime=5s -timeout=30m \
            ./services/internal-account/benchmarks/ 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Internal Account NFR validation
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Internal Account NFR Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -v -run TestNFR -timeout=10m \
            ./services/internal-account/benchmarks/ 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      # Note: Benchmark comparison against base branch moved to nightly.yml
      # to reduce PR CI time. PRs run basic benchmarks, nightly runs full comparison.
