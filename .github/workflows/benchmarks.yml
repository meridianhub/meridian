name: Benchmarks

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'shared/domain/models/**'
      - 'shared/platform/audit/**'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf files
        run: buf generate

      - name: Download dependencies
        run: go mod download

      - name: Run audit outbox benchmarks
        run: |
          echo "## Audit Outbox Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ADR-0009 target: <5ms per operation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -bench=BenchmarkAuditOutboxOverhead -benchmem -benchtime=5s -count=3 \
            ./shared/domain/models/ 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run audit worker benchmarks
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Audit Worker Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ADR-0009 target: >1000 records/sec" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -bench=BenchmarkAuditWorker -benchmem -benchtime=3s -count=3 \
            ./shared/platform/audit/ 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      # Note: Benchmark comparison against base branch moved to nightly.yml
      # to reduce PR CI time. PRs run basic benchmarks, nightly runs full comparison.
