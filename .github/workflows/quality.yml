name: Code Quality

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf files
        run: buf generate

      - name: Install golangci-lint v2
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.5.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run golangci-lint
        run: |
          golangci-lint run --timeout=5m --config=.golangci.yml

  tiltfile-syntax:
    name: Tiltfile Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tilt
        run: |
          # Pin to v0.35.2 for reproducible CI builds
          curl -fsSL https://raw.githubusercontent.com/tilt-dev/tilt/v0.35.2/scripts/install.sh | bash
        timeout-minutes: 2

      - name: Create minimal kubeconfig
        run: |
          # Tilt requires a kubeconfig even for syntax validation
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'EOF'
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://127.0.0.1:6443
            name: kind-meridian-local
          contexts:
          - context:
              cluster: kind-meridian-local
              user: kind-meridian-local
            name: kind-meridian-local
          current-context: kind-meridian-local
          users:
          - name: kind-meridian-local
          EOF

      - name: Validate Tiltfile syntax
        run: |
          # Run tilt ci with a short timeout to validate syntax
          set +e
          timeout 10s tilt ci 2>&1 | tee tilt-output.txt
          EXIT_CODE=$?
          set -e

          # Check for syntax errors
          if grep -q "got illegal token\|syntax error\|Traceback (most recent call last)" tilt-output.txt; then
            echo "❌ Tiltfile has syntax errors!"
            grep -A 5 "got illegal token\|syntax error\|Traceback" tilt-output.txt || true
            exit 1
          fi

          # Check if it loaded successfully
          if grep -q "Successfully loaded Tiltfile" tilt-output.txt; then
            echo "✅ Tiltfile syntax is valid!"
            exit 0
          fi

          # Timeout is expected without a real cluster
          if [ $EXIT_CODE -eq 124 ]; then
            if grep -q "Loading Tiltfile" tilt-output.txt; then
              echo "✅ Tiltfile syntax is valid!"
              exit 0
            fi
          fi

          echo "❌ Unexpected validation result"
          cat tilt-output.txt
          exit 1
        timeout-minutes: 1

      - name: Upload validation output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tilt-validation-output
          path: tilt-output.txt
          retention-days: 7

  license-validation:
    name: License File Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate LICENSE file hash
        run: |
          # Expected SHA256 hash of canonical Apache 2.0 license with our copyright
          EXPECTED_HASH="c6261ed6933fba6e919c3faff2dabeb8ac2f19ddcc20dcf4f7473fa7273aca2b"
          ACTUAL_HASH=$(sha256sum LICENSE | awk '{print $1}')

          echo "Expected LICENSE hash: $EXPECTED_HASH"
          echo "Actual LICENSE hash:   $ACTUAL_HASH"

          if [[ "$ACTUAL_HASH" == "$EXPECTED_HASH" ]]; then
            echo "✅ LICENSE file matches canonical Apache 2.0 format"
            exit 0
          else
            echo "❌ LICENSE file hash mismatch!"
            echo ""
            echo "This indicates the LICENSE file has been modified from canonical format."
            echo "Changes to LICENSE must maintain exact Apache 2.0 format for proper detection."
            echo ""
            echo "If you intentionally updated the copyright year or holder:"
            echo "  1. Verify the file still matches Apache 2.0 canonical text"
            echo "  2. Update EXPECTED_HASH in .github/workflows/quality.yml"
            echo "  3. Test with: make docs (http://localhost:6060)"
            echo ""
            echo "See: https://github.com/meridianhub/meridian/pull/118"
            exit 1
          fi
