version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # dex uses a pseudo-version (v0.0.0-...) pinned to their main branch.
      # Dependabot sees the old tagged release v2.13.0+incompatible as "newer"
      # but that pre-modules version lacks server/signer and breaks the build.
      - dependency-name: "github.com/dexidp/dex"
    groups:
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "google.golang.org/*"
          - "k8s.io/*"
      google-cloud:
        patterns:
          - "google.golang.org/*"
          - "cloud.google.com/*"
      kubernetes:
        patterns:
          - "k8s.io/*"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"

  # Docker images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"

  # npm (for protobuf tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
